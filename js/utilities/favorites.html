<div class="utility-tool">
  <style>
    .utility-tool {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem;
      font-family: var(--font-family, 'Segoe UI', sans-serif);
      position: relative;
    }
    
    /* ===== CARTOON EYES ANIMATION ===== */
    .fav-eyes {
      position: absolute;
      top: 0.5rem;
      right: 1rem;
      display: flex;
      gap: 0.4rem;
      pointer-events: none;
      z-index: 10;
      animation: bounce 2s ease-in-out infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    
    .fav-eye {
      width: 30px;
      height: 30px;
      background: var(--bg-card, #fff);
      border: 2px solid var(--accent, #6366f1);
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(99, 102, 241, 0.3);
    }
    
    .fav-pupil {
      width: 14px;
      height: 14px;
      background: var(--accent, #6366f1);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease-out;
    }
    
    .fav-pupil::after {
      content: '';
      position: absolute;
      width: 5px;
      height: 5px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      right: 3px;
    }
    
    .fav-eye.blink {
      animation: blink 0.2s ease;
    }
    
    @keyframes blink {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.1); }
    }
    
    /* ===== HEADER ===== */
    .fav-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    
    .fav-title {
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-primary, #1e293b);
    }
    
    .fav-title .star {
      animation: twinkle 1.5s ease-in-out infinite;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.9); }
    }
    
    .fav-stats {
      display: flex;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--text-secondary, #64748b);
    }
    
    .fav-stat {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    /* ===== CONTROLS BAR ===== */
    .fav-controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    
    .fav-search {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    
    .fav-search input {
      width: 100%;
      padding: 0.7rem 1rem 0.7rem 2.5rem;
      border-radius: 12px;
      border: 2px solid var(--glass-border, #e2e8f0);
      background: var(--bg-card, #f8fafc);
      color: var(--text-primary, #1e293b);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    
    .fav-search input:focus {
      border-color: var(--accent, #6366f1);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }
    
    .fav-search-icon {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 1rem;
    }
    
    .fav-filter {
      padding: 0.7rem 1rem;
      border-radius: 12px;
      border: 2px solid var(--glass-border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 130px;
    }
    
    .fav-filter:hover {
      border-color: var(--accent);
    }
    
    .fav-btn {
      padding: 0.7rem 1rem;
      border-radius: 12px;
      border: 2px solid var(--glass-border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
    }
    
    .fav-btn:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(99, 102, 241, 0.2);
    }
    
    .fav-btn.primary {
      background: var(--gradient-main, linear-gradient(135deg, #6366f1, #8b5cf6));
      color: #fff;
      border: none;
    }
    
    .fav-btn.primary:hover {
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }
    
    .fav-btn.danger {
      border-color: #ef4444;
      color: #ef4444;
    }
    
    .fav-btn.danger:hover {
      background: #fef2f2;
    }
    
    .fav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    /* ===== BULK ACTIONS BAR ===== */
    .bulk-bar {
      display: none;
      align-items: center;
      gap: 0.8rem;
      padding: 0.8rem 1rem;
      background: rgba(99, 102, 241, 0.1);
      border: 2px solid var(--accent);
      border-radius: 12px;
      margin-bottom: 1rem;
      animation: slideIn 0.3s ease;
    }
    
    .bulk-bar.show {
      display: flex;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .bulk-count {
      font-weight: 600;
      color: var(--accent);
    }
    
    .bulk-actions {
      display: flex;
      gap: 0.5rem;
      margin-left: auto;
    }
    
    .bulk-btn {
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .bulk-btn.delete {
      background: #ef4444;
      color: #fff;
    }
    
    .bulk-btn.export {
      background: var(--accent);
      color: #fff;
    }
    
    .bulk-btn:hover {
      transform: scale(1.05);
    }
    
    .bulk-close {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-secondary);
      margin-left: 0.5rem;
    }
    
    /* ===== FAVORITES LIST ===== */
    .fav-list {
      display: grid;
      gap: 0.7rem;
    }
    
    .fav-item {
      background: var(--bg-card, #f8fafc);
      border: 2px solid var(--glass-border, #e2e8f0);
      border-radius: 14px;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      position: relative;
    }
    
    .fav-item:hover {
      border-color: var(--accent, #6366f1);
      transform: translateX(5px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.15);
    }
    
    .fav-item.selected {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.08);
    }
    
    .fav-item.dragging {
      opacity: 0.5;
      transform: scale(1.02);
    }
    
    .fav-checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--glass-border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    
    .fav-checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    
    .fav-icon {
      font-size: 1.8rem;
      min-width: 40px;
      text-align: center;
      transition: transform 0.3s ease;
    }
    
    .fav-item:hover .fav-icon {
      transform: scale(1.15) rotate(5deg);
    }
    
    .fav-info {
      flex: 1;
      min-width: 0;
    }
    
    .fav-name {
      font-weight: 600;
      color: var(--text-primary, #1e293b);
      font-size: 1rem;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .fav-cat {
      font-size: 0.8rem;
      color: var(--text-secondary, #64748b);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .fav-cat-badge {
      padding: 0.2rem 0.5rem;
      background: rgba(99, 102, 241, 0.15);
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    
    .fav-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.3rem;
    }
    
    .fav-actions {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
    }
    
    .fav-action-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: var(--bg-primary, #fff);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      opacity: 0;
    }
    
    .fav-item:hover .fav-action-btn {
      opacity: 1;
    }
    
    .fav-action-btn:hover {
      transform: scale(1.1);
      background: var(--accent);
      color: #fff;
    }
    
    .fav-action-btn.delete:hover {
      background: #ef4444;
    }
    
    /* ===== EMPTY STATE ===== */
    .fav-empty {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-secondary);
      animation: fadeIn 0.4s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fav-empty-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .fav-empty h4 {
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    
    .fav-empty p {
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    
    .explore-btn {
      padding: 0.8rem 1.5rem;
      background: var(--gradient-main);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .explore-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }
    
    /* ===== CATEGORY CHIPS ===== */
    .category-chips {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      overflow-x: auto;
      padding-bottom: 0.3rem;
    }
    
    .category-chips::-webkit-scrollbar {
      height: 4px;
    }
    
    .category-chips::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 2px;
    }
    
    .chip {
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      border: 2px solid var(--glass-border);
      background: var(--bg-card);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .chip:hover, .chip.active {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent);
    }
    
    .chip .count {
      background: var(--accent);
      color: #fff;
      padding: 0.1rem 0.4rem;
      border-radius: 10px;
      font-size: 0.7rem;
    }
    
    /* ===== TOAST NOTIFICATION ===== */
    .fav-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--bg-card);
      border: 2px solid var(--accent);
      border-radius: 14px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      z-index: 1000;
      transform: translateX(400px);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 350px;
    }
    
    .fav-toast.show {
      transform: translateX(0);
    }
    
    .fav-toast.success { border-color: #22c55e; }
    .fav-toast.error { border-color: #ef4444; }
    .fav-toast.info { border-color: #3b82f6; }
    
    .toast-icon { font-size: 1.5rem; }
    .toast-msg { flex: 1; font-size: 0.95rem; color: var(--text-primary); }
    .toast-close {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 0.3rem;
      border-radius: 50%;
    }
    .toast-close:hover { background: rgba(0,0,0,0.1); }
    
    /* ===== DRAG DROP VISUALS ===== */
    .drag-over {
      border-color: var(--accent) !important;
      background: rgba(99, 102, 241, 0.15) !important;
    }
    
    .drop-indicator {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 0.3rem 0;
      display: none;
    }
    
    .drop-indicator.show {
      display: block;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .utility-tool { padding: 1.5rem 1rem; }
      .fav-header { flex-direction: column; align-items: flex-start; }
      .fav-controls { width: 100%; }
      .fav-search { min-width: 100%; }
      .fav-item { padding: 0.9rem; }
      .fav-actions { opacity: 1; }
      .fav-action-btn { opacity: 1; }
      .bulk-bar { flex-wrap: wrap; }
      .bulk-actions { margin-left: 0; width: 100%; justify-content: flex-end; }
    }
  </style>

  <!-- Cartoon Eyes -->
  <div class="fav-eyes" id="favEyes">
    <div class="fav-eye"><div class="fav-pupil" id="pupil1"></div></div>
    <div class="fav-eye"><div class="fav-pupil" id="pupil2"></div></div>
  </div>

  <!-- Header -->
  <div class="fav-header">
    <h3 class="fav-title"><span class="star">⭐</span> Your Favorites</h3>
    <div class="fav-stats">
      <span class="fav-stat">📦 <span id="totalCount">0</span> total</span>
      <span class="fav-stat">📁 <span id="catCount">0</span> categories</span>
    </div>
  </div>

  <!-- Search & Controls -->
  <div class="fav-controls">
    <div class="fav-search">
      <span class="fav-search-icon">🔍</span>
      <input type="text" id="favSearch" placeholder="Search favorites...">
    </div>
    <select class="fav-filter" id="favFilter">
      <option value="all">📋 All</option>
      <option value="finance">🧮 Finance</option>
      <option value="productivity">📚 Productivity</option>
      <option value="ai">🤖 AI & Tech</option>
    </select>
    <button class="fav-btn" id="bulkToggle" onclick="toggleBulkMode()">

    </button>

  <!-- Category Chips -->
  <div class="category-chips" id="categoryChips">
    <span class="chip active" data-cat="all" onclick="filterByChip('all')">
      All <span class="count" id="chip-all">0</span>
    </span>
    <span class="chip" data-cat="finance" onclick="filterByChip('finance')">
      🧮 Finance <span class="count" id="chip-finance">0</span>
    </span>
    <span class="chip" data-cat="productivity" onclick="filterByChip('productivity')">
      📚 Productivity <span class="count" id="chip-productivity">0</span>
    </span>
    <span class="chip" data-cat="ai" onclick="filterByChip('ai')">
      🤖 AI & Tech <span class="count" id="chip-ai">0</span>
    </span>

  <!-- Bulk Actions Bar -->
  <div class="bulk-bar" id="bulkBar">
    <span class="bulk-count"><span id="selectedCount">0</span> selected</span>
    <div class="bulk-actions">
      <button class="bulk-btn export" onclick="exportSelected()">📤 Export</button>
      <button class="bulk-btn delete" onclick="deleteSelected()">🗑️ Delete</button>
      <button class="bulk-close" onclick="toggleBulkMode()">×</button>
    </div>
  </div>

  <!-- Favorites List -->
  <div class="fav-list" id="favList">
    <!-- Dynamic content -->
  </div>

  <!-- Empty State -->
  <div class="fav-empty" id="favEmpty" style="display:none;">
    <div class="fav-empty-icon">⭐</div>
    <h4>No favorites yet!</h4>
    <p>Click the ⭐ icon on any tool to add it to your favorites for quick access.</p>
    <button class="explore-btn" onclick="exploreTools()">
      🔍 Explore Tools
    </button>
  </div>

  <!-- Toast Notification -->
  <div class="fav-toast" id="toast">
    <span class="toast-icon" id="toastIcon">✅</span>
    <span class="toast-msg" id="toastMsg">Notification</span>
    <button class="toast-close" onclick="hideToast()">×</button>
  </div>

  <script>
    // ===== CONFIGURATION =====
    const FAV_CONFIG = {
      categories: {
        finance: { name: 'Finance', icon: '🧮', color: '#22c55e' },
        productivity: { name: 'Productivity', icon: '📚', color: '#3b82f6' },
        ai: { name: 'AI & Tech', icon: '🤖', color: '#8b5cf6' }
      },
      sampleTools: [
        { id: 'loan-calc', name: 'Loan Calculator', icon: '🏦', category: 'finance', added: Date.now() - 86400000 },
        { id: 'tip-calc', name: 'Tip Calculator', icon: '💰', category: 'finance', added: Date.now() - 172800000 },
        { id: 'budget', name: 'Budget Planner', icon: '📊', category: 'finance', added: Date.now() - 259200000 },
        { id: 'pomodoro', name: 'Pomodoro Timer', icon: '⏱️', category: 'productivity', added: Date.now() - 345600000 },
        { id: 'notes', name: 'Quick Notes', icon: '📝', category: 'productivity', added: Date.now() - 432000000 },
        { id: 'ai-writer', name: 'AI Content Helper', icon: '✨', category: 'ai', added: Date.now() - 518400000 },
        { id: 'qr-gen', name: 'QR Generator', icon: '📱', category: 'ai', added: Date.now() - 604800000 },
        { id: 'pass-gen', name: 'Password Generator', icon: '🔐', category: 'ai', added: Date.now() - 691200000 }
      ]
    };

    // ===== STATE =====
    let state = {
      favorites: JSON.parse(localStorage.getItem('ab-favorites') || '[]'),
      bulkMode: false,
      selected: new Set(),
      filter: 'all',
      search: '',
      dragItem: null
    };

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      initEyes();
      initBlink();
      render();
      initDragDrop();
      initKeyboardShortcuts();
    });

    // ===== EYES ANIMATION =====
    function initEyes() {
      document.addEventListener('mousemove', (e) => {
        const pupils = document.querySelectorAll('.fav-pupil');
        const eyes = document.getElementById('favEyes');
        const rect = eyes.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const angle = Math.atan2(e.clientY - cy, e.clientX - cx);
        const dist = Math.min(6, Math.hypot(e.clientX - cx, e.clientY - cy) / 30);
        const x = Math.cos(angle) * dist;
        const y = Math.sin(angle) * dist;
        pupils.forEach(p => p.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`);
      });
    }

    function initBlink() {
      setInterval(() => {
        document.querySelectorAll('.fav-eye').forEach(eye => {
          eye.classList.add('blink');
          setTimeout(() => eye.classList.remove('blink'), 180);
        });
      }, 3500 + Math.random() * 4000);
    }

    // ===== RENDER =====
    function render() {
      const list = document.getElementById('favList');
      const empty = document.getElementById('favEmpty');
      const filtered = getFilteredFavorites();
      
      // Update stats
      document.getElementById('totalCount').textContent = state.favorites.length;
      const cats = new Set(state.favorites.map(f => f.category));
      document.getElementById('catCount').textContent = cats.size;
      
      // Update chip counts
      ['all', 'finance', 'productivity', 'ai'].forEach(cat => {
        const count = cat === 'all' ? state.favorites.length : 
          state.favorites.filter(f => f.category === cat).length;
        document.getElementById(`chip-${cat}`).textContent = count;
      });
      
      // Show/hide empty state
      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.style.display = state.favorites.length === 0 ? 'block' : 'none';
        if (state.favorites.length > 0 && state.search) {
          empty.innerHTML = `<div class="fav-empty-icon">🔍</div><h4>No matches</h4><p>Try different search terms or clear filters.</p><button class="explore-btn" onclick="clearFilters()">Clear Filters</button>`;
          empty.style.display = 'block';
        }
        return;
      }
      
      empty.style.display = 'none';
      list.innerHTML = filtered.map((fav, idx) => `
        <div class="fav-item" data-id="${fav.id}" draggable="true">
          <div class="fav-checkbox ${state.bulkMode && state.selected.has(fav.id) ? 'checked' : ''}" 
               onclick="${state.bulkMode ? `toggleSelect('${fav.id}')` : `openTool('${fav.id}')`}">
            ${state.bulkMode && state.selected.has(fav.id) ? '✓' : ''}
          </div>
          <div class="fav-icon">${fav.icon || '🔧'}</div>
          <div class="fav-info" onclick="${!state.bulkMode ? `openTool('${fav.id}')` : ''}">
            <div class="fav-name">${fav.name}</div>
            <div class="fav-cat">
              <span class="fav-cat-badge">${FAV_CONFIG.categories[fav.category]?.icon || '📦'} ${FAV_CONFIG.categories[fav.category]?.name || fav.category}</span>
              <span class="fav-meta">Added ${formatDate(fav.added)}</span>
            </div>
          </div>
          <div class="fav-actions">
            <button class="fav-action-btn" onclick="event.stopPropagation(); shareFavorite('${fav.id}')" title="Share">🔗</button>
            <button class="fav-action-btn" onclick="event.stopPropagation(); moveFavorite('${fav.id}', ${idx})" title="Move">📋</button>
            <button class="fav-action-btn delete" onclick="event.stopPropagation(); removeFavorite('${fav.id}')" title="Remove">🗑️</button>
          </div>
        </div>
        <div class="drop-indicator" id="drop-${idx}"></div>
      `).join('');
      
      // Re-init drag events after render
      initDragDrop();
    }

    function getFilteredFavorites() {
      return state.favorites.filter(fav => {
        const matchCat = state.filter === 'all' || fav.category === state.filter;
        const matchSearch = !state.search || 
          fav.name.toLowerCase().includes(state.search.toLowerCase()) ||
          fav.category.toLowerCase().includes(state.search.toLowerCase());
        return matchCat && matchSearch;
      });
    }

    function formatDate(timestamp) {
      const diff = Date.now() - timestamp;
      const days = Math.floor(diff / 86400000);
      if (days === 0) return 'Today';
      if (days === 1) return 'Yesterday';
      if (days < 7) return `${days} days ago`;
      return new Date(timestamp).toLocaleDateString();
    }

    // ===== SEARCH & FILTER =====
    document.getElementById('favSearch').addEventListener('input', (e) => {
      state.search = e.target.value;
      render();
    });

    document.getElementById('favFilter').addEventListener('change', (e) => {
      state.filter = e.target.value;
      render();
    });

    function filterByChip(cat) {
      state.filter = cat;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      document.querySelector(`.chip[data-cat="${cat}"]`).classList.add('active');
      document.getElementById('favFilter').value = cat;
      render();
    }

    function clearFilters() {
      state.search = '';
      state.filter = 'all';
      document.getElementById('favSearch').value = '';
      document.getElementById('favFilter').value = 'all';
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      document.querySelector('.chip[data-cat="all"]').classList.add('active');
      render();
    }

    // ===== BULK MODE =====
    function toggleBulkMode() {
      state.bulkMode = !state.bulkMode;
      state.selected.clear();
      document.getElementById('bulkBar').classList.toggle('show', state.bulkMode);
      document.getElementById('bulkToggle').innerHTML = state.bulkMode ? '✖️ Cancel' : '☑️ Select';
      document.getElementById('bulkToggle').className = `fav-btn ${state.bulkMode ? 'danger' : ''}`;
      render();
    }

    function toggleSelect(id) {
      if (state.selected.has(id)) state.selected.delete(id);
      else state.selected.add(id);
      document.getElementById('selectedCount').textContent = state.selected.size;
      render();
    }

    function deleteSelected() {
      if (state.selected.size === 0) return;
      if (!confirm(`Delete ${state.selected.size} favorite(s)?`)) return;
      
      state.favorites = state.favorites.filter(f => !state.selected.has(f.id));
      localStorage.setItem('ab-favorites', JSON.stringify(state.favorites));
      showToast(`🗑️ Deleted ${state.selected.size} item(s)`, 'success');
      
      state.selected.clear();
      toggleBulkMode();
      render();
    }

    function exportSelected() {
      const items = state.favorites.filter(f => state.selected.has(f.id));
      if (items.length === 0) return;
      exportData(items, 'selected-favorites');
    }

    // ===== FAVORITE ACTIONS =====
    function removeFavorite(id) {
      const fav = state.favorites.find(f => f.id === id);
      state.favorites = state.favorites.filter(f => f.id !== id);
      localStorage.setItem('ab-favorites', JSON.stringify(state.favorites));
      showToast(`❌ Removed "${fav?.name}"`, 'info');
      render();
    }

    function openTool(id) {
      if (state.bulkMode) { toggleSelect(id); return; }
      
      // Update recent & usage (simulate)
      const fav = state.favorites.find(f => f.id === id);
      showToast(`🚀 Opening ${fav?.name}...`, 'success');
      
      // Track usage
      const recent = JSON.parse(localStorage.getItem('ab-recent') || '[]');
      if (fav) {
        const exists = recent.findIndex(r => r.id === id);
        if (exists > -1) recent.splice(exists, 1);
        recent.unshift({ ...fav, timestamp: Date.now() });
        localStorage.setItem('ab-recent', JSON.stringify(recent.slice(0, 20)));
      }
      
      // Navigate (replace with actual routing)
      setTimeout(() => console.log(`Navigate to /tools/${id}`), 500);
    }

    function shareFavorite(id) {
      const fav = state.favorites.find(f => f.id === id);
      if (!fav) return;
      
      const url = `${window.location.origin}/tools/${id}`;
      if (navigator.share) {
        navigator.share({ title: fav.name, text: `Check out ${fav.name}!`, url });
      } else {
        navigator.clipboard.writeText(url);
        showToast('🔗 Link copied to clipboard!', 'success');
      }
    }

    function moveFavorite(id, currentIndex) {
      showToast('📋 Drag to reorder or use ↑↓ arrows', 'info');
    }

    // ===== DRAG & DROP REORDER =====
    function initDragDrop() {
      const items = document.querySelectorAll('.fav-item');
      
      items.forEach(item => {
        item.addEventListener('dragstart', (e) => {
          state.dragItem = item.dataset.id;
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        
        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          document.querySelectorAll('.drop-indicator').forEach(d => d.classList.remove('show'));
          state.dragItem = null;
        });
        
        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (!state.dragItem || state.dragItem === item.dataset.id) return;
          
          const rect = item.getBoundingClientRect();
          const midY = rect.top + rect.height / 2;
          const indicator = document.getElementById(`drop-${item.dataset.id}`);
          
          if (indicator) {
            indicator.classList.add('show');
          }
        });
        
        item.addEventListener('drop', (e) => {
          e.preventDefault();
          if (!state.dragItem || state.dragItem === item.dataset.id) return;
          
          const fromIdx = state.favorites.findIndex(f => f.id === state.dragItem);
          const toIdx = state.favorites.findIndex(f => f.id === item.dataset.id);
          
          if (fromIdx > -1 && toIdx > -1 && fromIdx !== toIdx) {
            const [moved] = state.favorites.splice(fromIdx, 1);
            state.favorites.splice(toIdx, 0, moved);
            localStorage.setItem('ab-favorites', JSON.stringify(state.favorites));
            showToast('🔄 Order updated!', 'success');
            render();
          }
        });
      });
    }

    // ===== EXPORT =====
    function exportFavorites() {
      if (state.favorites.length === 0) {
        showToast('⚠️ No favorites to export', 'error');
        return;
      }
      exportData(state.favorites, 'all-favorites');
    }

    function exportData(data, filename) {
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ab-favorites-${filename}-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast(`📤 Exported ${data.length} item(s)!`, 'success');
    }

    // ===== UTILITIES =====
    function exploreTools() {
      showToast('🔍 Opening tools library...', 'info');
      // window.location.href = '/tools';
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      document.getElementById('toastIcon').textContent = 
        type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
      document.getElementById('toastMsg').textContent = msg;
      toast.className = `fav-toast ${type} show`;
      setTimeout(hideToast, 4000);
    }

    function hideToast() {
      document.getElementById('toast').classList.remove('show');
    }

    // ===== KEYBOARD SHORTCUTS =====
    function initKeyboardShortcuts() {
      document.addEventListener('keydown', (e) => {
        // Ctrl/Cmd + A: Select all in bulk mode
        if ((e.ctrlKey || e.metaKey) && e.key === 'a' && state.bulkMode) {
          e.preventDefault();
          getFilteredFavorites().forEach(f => state.selected.add(f.id));
          document.getElementById('selectedCount').textContent = state.selected.size;
          render();
        }
        // Escape: Exit bulk mode or clear search
        if (e.key === 'Escape') {
          if (state.bulkMode) toggleBulkMode();
          else if (state.search) {
            state.search = '';
            document.getElementById('favSearch').value = '';
            render();
          }
        }
        // Delete: Remove selected in bulk mode
        if (e.key === 'Delete' && state.bulkMode && state.selected.size > 0) {
          e.preventDefault();
          deleteSelected();
        }
      });
    }

    // ===== EXTERNAL API =====
    window.addFavorite = function(tool) {
      if (!state.favorites.find(f => f.id === tool.id)) {
        state.favorites.unshift({ ...tool, added: Date.now() });
        localStorage.setItem('ab-favorites', JSON.stringify(state.favorites));
        showToast(`⭐ Added "${tool.name}" to favorites!`, 'success');
        render();
        return true;
      }
      showToast('ℹ️ Already in favorites', 'info');
      return false;
    };

    window.isFavorite = function(toolId) {
      return state.favorites.some(f => f.id === toolId);
    };

    window.getFavorites = function() {
      return [...state.favorites];
    };
  </script>
</div>

<div class="snake-pro">
  <style>
    .snake-pro {
      --sp-bg: #0f172a;
      --sp-panel: #1e293b;
      --sp-border: #334155;
      --sp-accent: #22c55e;
      --sp-danger: #ef4444;
      --sp-text: #f8fafc;
      --sp-muted: #94a3b8;
      max-width: 440px; margin: 2rem auto; padding: 1.2rem;
      background: var(--sp-panel); border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.3); border: 1px solid var(--sp-border);
      font-family: system-ui, -apple-system, sans-serif; color: var(--sp-text);
      position: relative; overflow: hidden; text-align: center;
    }
    .sp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
    .sp-title { font-weight: 800; font-size: 1.3rem; color: var(--sp-accent); margin: 0; }
    .sp-btn { padding: 0.5rem 0.8rem; background: #334155; border: 1px solid var(--sp-border); color: #fff; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
    .sp-btn:hover { background: #475569; }
    
    .sp-stats { display: flex; justify-content: space-around; margin-bottom: 1rem; gap: 0.5rem; }
    .sp-stat { background: rgba(255,255,255,0.05); padding: 0.4rem 0.8rem; border-radius: 10px; border: 1px solid var(--sp-border); min-width: 90px; }
    .sp-stat span { display: block; font-size: 0.65rem; color: var(--sp-muted); text-transform: uppercase; }
    .sp-stat b { font-size: 1rem; display: block; margin-top: 2px; }
    
    .sp-canvas-wrap { position: relative; width: 100%; aspect-ratio: 1; background: #0b1120; border-radius: 14px; overflow: hidden; border: 2px solid var(--sp-border); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); margin-bottom: 1rem; }
    .sp-canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    
    .sp-pad { display: grid; grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(2, 48px); gap: 8px; justify-content: center; margin-bottom: 1rem; }
    .sp-dir { background: #334155; border: 1px solid var(--sp-border); border-radius: 12px; color: #fff; font-size: 1.4rem; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; user-select: none; }
    .sp-dir:active { background: var(--sp-accent); color: #000; transform: scale(0.92); }
    
    .sp-overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.92); backdrop-filter: blur(8px); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 10; border-radius: 16px; }
    .sp-overlay.active { opacity: 1; pointer-events: auto; }
    .sp-overlay h2 { font-size: 1.8rem; margin: 0 0 0.5rem; }
    .sp-overlay p { color: var(--sp-muted); margin: 0 0 1.5rem; line-height: 1.5; }
    .sp-btn.primary { background: linear-gradient(135deg, var(--sp-accent), #10b981); color: #000; border: none; padding: 0.9rem 2rem; font-weight: 700; box-shadow: 0 4px 15px rgba(34,197,94,0.4); }
    .sp-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34,197,94,0.5); }
    
    .sp-confetti { position: absolute; width: 6px; height: 6px; border-radius: 2px; pointer-events: none; animation: spFall linear forwards; }
    @keyframes spFall { to { transform: translateY(400px) rotate(720deg); opacity: 0; } }
  </style>

  <div class="sp-header">
    <div class="sp-title">🐍 Snake Pro</div>
    <button class="sp-btn" id="sp-pause">⏸ Pause</button>
  </div>

  <div class="sp-stats">
    <div class="sp-stat"><span>Score</span><b id="sp-sc">0</b></div>
    <div class="sp-stat"><span>Speed</span><b id="sp-spd">1x</b></div>
    <div class="sp-stat"><span>Best</span><b id="sp-hs">0</b></div>
  </div>

  <div class="sp-canvas-wrap">
    <canvas class="sp-canvas" id="sp-canvas"></canvas>
  </div>

  <div class="sp-pad">
    <div></div><button class="sp-dir" data-d="up">↑</button><div></div>
    <button class="sp-dir" data-d="left">←</button>
    <button class="sp-dir" data-d="down">↓</button>
    <button class="sp-dir" data-d="right">→</button>
  </div>

  <div class="sp-overlay active" id="sp-start">
    <h2>🎮 Ready?</h2>
    <p>Use Arrow Keys, WASD, or Swipe to move.<br>Eat food to grow & speed up. Don't hit walls or yourself!</p>
    <button class="sp-btn primary" id="sp-play">▶ Start Game</button>
  </div>

  <div class="sp-overlay" id="sp-pause-screen">
    <h2>⏸ Paused</h2>
    <p>Take a break. The snake is resting.</p>
    <button class="sp-btn primary" id="sp-resume">▶ Resume</button>
  </div>

  <div class="sp-overlay" id="sp-over">
    <h2>💥 Game Over</h2>
    <p>Final Score: <b id="sp-fsc">0</b><br>High Score: <b id="sp-hsf">0</b></p>
    <button class="sp-btn primary" id="sp-restart">🔄 Play Again</button>
  </div>

  <div id="sp-confetti-box" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:16px;"></div>

  <script>
    (function() {
      'use strict';
      const CFG = { grid: 20, baseSpeed: 130, minSpeed: 55, speedDrop: 1.8 };
      const canvas = document.getElementById('sp-canvas');
      const ctx = canvas.getContext('2d');
      const wrap = canvas.parentElement;

      const state = {
        snake: [], dir: {x:1,y:0}, nextDir: {x:1,y:0},
        food: {x:5,y:5}, score: 0, speed: CFG.baseSpeed,
        running: false, paused: false, lastTs: 0, acc: 0,
        audioCtx: null, highScore: 0
      };

      const $ = id => document.getElementById(id);
      const el = {
        sc: $('sp-sc'), spd: $('sp-spd'), hs: $('sp-hs'), pause: $('sp-pause'),
        start: $('sp-start'), pauseScreen: $('sp-pause-screen'), over: $('sp-over'),
        fsc: $('sp-fsc'), hsf: $('sp-hsf'), confetti: $('sp-confetti-box')
      };

      // Audio
      const initAudio = () => {
        if(!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(state.audioCtx.state==='suspended') state.audioCtx.resume();
      };
      const beep = (f,t,d,del=0) => {
        if(!state.audioCtx) return;
        const o = state.audioCtx.createOscillator(), g = state.audioCtx.createGain();
        o.type=t; o.frequency.value=f;
        g.gain.setValueAtTime(0.08, state.audioCtx.currentTime+del);
        g.gain.exponentialRampToValueAtTime(0.01, state.audioCtx.currentTime+del+d);
        o.connect(g).connect(state.audioCtx.destination);
        o.start(state.audioCtx.currentTime+del); o.stop(state.audioCtx.currentTime+del+d);
      };
      const sfx = t => {
        if(t==='eat') beep(600,'sine',0.06); beep(900,'sine',0.06,0.04);
        if(t==='die') beep(150,'sawtooth',0.2);
        if(t==='ui') beep(400,'sine',0.03);
      };

      // Storage
      const loadHS = () => { try { state.highScore = parseInt(localStorage.getItem('sp_hs')) || 0; el.hs.textContent = state.highScore; } catch {} };
      const saveHS = () => { try { if(state.score > state.highScore) localStorage.setItem('sp_hs', state.score); } catch {} };

      // Canvas Setup
      const resize = () => {
        const dpr = window.devicePixelRatio || 1;
        const rect = wrap.getBoundingClientRect();
        canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
      };
      window.addEventListener('resize', resize);
      resize();

      // Game Logic
      const cellSize = () => Math.min(canvas.width, canvas.height) / CFG.grid / (window.devicePixelRatio||1);
      const reset = () => {
        state.snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
        state.dir = {x:1,y:0}; state.nextDir = {x:1,y:0};
        state.score = 0; state.speed = CFG.baseSpeed; state.acc = 0; state.paused = false;
        placeFood(); ui();
      };
      const placeFood = () => {
        do { state.food = {x: Math.floor(Math.random()*CFG.grid), y: Math.floor(Math.random()*CFG.grid)}; }
        while(state.snake.some(s => s.x === state.food.x && s.y === state.food.y));
      };
      const ui = () => {
        el.sc.textContent = state.score;
        el.spd.textContent = (CFG.baseSpeed / state.speed).toFixed(1) + 'x';
      };
      const confetti = () => {
        el.confetti.innerHTML = '';
        const cols = ['#f43f5e','#10b981','#3b82f6','#f59e0b','#8b5cf6','#ffffff'];
        for(let i=0;i<25;i++){
          const c = document.createElement('div'); c.className='sp-confetti';
          c.style.left = Math.random()*100+'%'; c.style.top='-10px';
          c.style.background = cols[Math.floor(Math.random()*cols.length)];
          c.style.animationDuration = (1+Math.random())+'s';
          el.confetti.appendChild(c); setTimeout(()=>c.remove(), 1500);
        }
      };

      const update = () => {
        state.dir = state.nextDir;
        const head = {x: state.snake[0].x + state.dir.x, y: state.snake[0].y + state.dir.y};
        
        // Collision
        if(head.x<0 || head.x>=CFG.grid || head.y<0 || head.y>=CFG.grid || 
           state.snake.some(s => s.x===head.x && s.y===head.y)) {
          return gameOver();
        }

        state.snake.unshift(head);
        if(head.x === state.food.x && head.y === state.food.y) {
          state.score++; state.speed = Math.max(CFG.minSpeed, CFG.baseSpeed - state.score * CFG.speedDrop);
          sfx('eat'); placeFood(); ui();
        } else {
          state.snake.pop();
        }
      };

      const draw = () => {
        const cs = cellSize();
        const w = canvas.width/(window.devicePixelRatio||1), h = canvas.height/(window.devicePixelRatio||1);
        ctx.clearRect(0,0,w,h);

        // Grid
        ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
        for(let i=1;i<CFG.grid;i++){
          ctx.beginPath(); ctx.moveTo(i*cs,0); ctx.lineTo(i*cs,h); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(0,i*cs); ctx.lineTo(w,i*cs); ctx.stroke();
        }

        // Food (pulsing)
        const pulse = 1 + Math.sin(Date.now()/150)*0.1;
        ctx.fillStyle = '#ef4444';
        ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(state.food.x*cs+cs/2, state.food.y*cs+cs/2, cs/2.5*pulse, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // Snake
        state.snake.forEach((seg,i) => {
          const r = cs * 0.25;
          const x = seg.x*cs+2, y = seg.y*cs+2, w2 = cs-4, h2 = cs-4;
          ctx.fillStyle = i===0 ? '#4ade80' : '#22c55e';
          ctx.beginPath();
          ctx.roundRect(x,y,w2,h2,r); ctx.fill();
          // Eyes on head
          if(i===0) {
            ctx.fillStyle = '#000';
            const ex = x + w2*0.3, ey = y + h2*0.3;
            ctx.fillRect(ex, ey, 3, 3); ctx.fillRect(x + w2*0.7, ey, 3, 3);
          }
        });
      };

      const loop = (ts) => {
        if(!state.lastTs) state.lastTs = ts;
        const dt = ts - state.lastTs; state.lastTs = ts;
        if(state.running && !state.paused) {
          state.acc += dt;
          while(state.acc >= state.speed) { update(); state.acc -= state.speed; }
        }
        draw();
        requestAnimationFrame(loop);
      };

      const showScreen = (name) => {
        el.start.classList.toggle('active', name==='start');
        el.pauseScreen.classList.toggle('active', name==='pause');
        el.over.classList.toggle('active', name==='over');
        el.pause.disabled = name!=='play';
      };

      const startGame = () => {
        initAudio(); reset(); state.running = true;
        showScreen('play');
      };
      const togglePause = () => {
        if(!state.running) return;
        state.paused = !state.paused;
        showScreen(state.paused ? 'pause' : 'play');
        sfx('ui');
      };
      const gameOver = () => {
        state.running = false; sfx('die'); saveHS();
        el.fsc.textContent = state.score;
        el.hsf.textContent = Math.max(state.score, state.highScore);
        showScreen('over');
      };

      // Controls
      const changeDir = (d) => {
        const map = {up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
        const nd = map[d];
        if(!nd || (state.dir.x + nd.x === 0 && state.dir.y + nd.y === 0)) return;
        state.nextDir = nd;
      };

      document.addEventListener('keydown', e => {
        if(e.key==='ArrowUp'||e.key==='w') { e.preventDefault(); changeDir('up'); }
        if(e.key==='ArrowDown'||e.key==='s') { e.preventDefault(); changeDir('down'); }
        if(e.key==='ArrowLeft'||e.key==='a') { e.preventDefault(); changeDir('left'); }
        if(e.key==='ArrowRight'||e.key==='d') { e.preventDefault(); changeDir('right'); }
        if(e.key===' '||e.key==='Escape') { e.preventDefault(); togglePause(); }
      });

      // Swipe
      let tx=0, ty=0;
      canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
      canvas.addEventListener('touchend', e => {
        const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
        if(Math.abs(dx)<30 && Math.abs(dy)<30) return;
        if(Math.abs(dx)>Math.abs(dy)) changeDir(dx>0?'right':'left');
        else changeDir(dy>0?'down':'up');
      });

      document.querySelectorAll('.sp-dir').forEach(b => b.onclick = () => changeDir(b.dataset.d));
      $('sp-play').onclick = startGame;
      $('sp-pause').onclick = togglePause;
      $('sp-resume').onclick = togglePause;
      $('sp-restart').onclick = startGame;

      // Init
      loadHS();
      showScreen('start');
      requestAnimationFrame(loop);
    })();
  </script>
</div>

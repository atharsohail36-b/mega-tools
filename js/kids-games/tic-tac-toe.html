<div class="ttt-app">
  <style>
    .ttt-app {
      --ttt-bg: #0f172a;
      --ttt-panel: #1e293b;
      --ttt-border: #334155;
      --ttt-x: #3b82f6;
      --ttt-o: #ec4899;
      --ttt-accent: #10b981;
      --ttt-text: #f8fafc;
      --ttt-muted: #94a3b8;
      max-width: 460px; margin: 2rem auto; padding: 1.5rem;
      background: var(--ttt-panel); border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.3); border: 1px solid var(--ttt-border);
      font-family: system-ui, -apple-system, sans-serif; color: var(--ttt-text);
      position: relative; overflow: hidden; text-align: center;
    }
    .ttt-header { font-size: 1.4rem; font-weight: 800; margin: 0 0 1rem; background: linear-gradient(90deg, var(--ttt-x), var(--ttt-o)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    
    .ttt-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 0.5rem; flex-wrap: wrap; }
    .ttt-select { padding: 0.5rem 0.8rem; border-radius: 8px; background: #334155; color: #fff; border: 1px solid var(--ttt-border); cursor: pointer; font-size: 0.85rem; outline: none; }
    .ttt-select:focus { border-color: var(--ttt-x); }
    .ttt-btn-sm { background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; padding: 0.2rem; transition: 0.2s; }
    .ttt-btn-sm:hover { transform: scale(1.1); }
    
    .ttt-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .ttt-stat { background: rgba(255,255,255,0.05); padding: 0.5rem; border-radius: 10px; border: 1px solid var(--ttt-border); }
    .ttt-stat span { display: block; font-size: 0.65rem; color: var(--ttt-muted); text-transform: uppercase; }
    .ttt-stat b { font-size: 1rem; display: block; margin-top: 2px; }
    
    .ttt-status { font-size: 1.1rem; margin-bottom: 1rem; min-height: 1.6rem; font-weight: 600; color: var(--ttt-muted); transition: color 0.2s; }
    .ttt-status.win { color: var(--ttt-accent); }
    .ttt-status.draw { color: #f59e0b; }
    
    .ttt-grid { display: grid; gap: 10px; margin-bottom: 1.2rem; perspective: 1000px; }
    .ttt-cell { aspect-ratio: 1; background: #111827; border: 2px solid var(--ttt-border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; cursor: pointer; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); user-select: none; }
    .ttt-cell:hover:not(.taken) { background: #1e293b; transform: scale(0.96); }
    .ttt-cell.x { color: var(--ttt-x); border-color: rgba(59,130,246,0.3); }
    .ttt-cell.o { color: var(--ttt-o); border-color: rgba(236,72,153,0.3); }
    .ttt-cell.win { background: rgba(16,185,129,0.15); border-color: var(--ttt-accent); animation: tttPop 0.4s ease; }
    @keyframes tttPop { 50% { transform: scale(1.05); } }
    
    .ttt-btn { padding: 0.9rem 2rem; background: linear-gradient(135deg, var(--ttt-x), #8b5cf6); border: none; border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(59,130,246,0.4); transition: 0.2s; }
    .ttt-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.5); }
    .ttt-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .ttt-note { font-size: 0.75rem; color: var(--ttt-muted); margin-top: 0.5rem; }
  </style>

  <div class="ttt-header">🎮 Tic Tac Toe Pro</div>
  
  <div class="ttt-controls">
    <select class="ttt-select" id="ttt-mode">
      <option value="pve">🤖 vs Computer</option>
      <option value="pvp">👥 2 Players</option>
    </select>
    <select class="ttt-select" id="ttt-size">
      <option value="3">3×3 (3 in a Row)</option>
      <option value="5">5×5 (4 in a Row)</option>
    </select>
    <button class="ttt-btn-sm" id="ttt-sound" title="Toggle Sound">🔊</button>
  </div>

  <div class="ttt-stats">
    <div class="ttt-stat"><span>X Wins</span><b id="ttt-x">0</b></div>
    <div class="ttt-stat"><span>Draws</span><b id="ttt-d">0</b></div>
    <div class="ttt-stat"><span>O Wins</span><b id="ttt-o">0</b></div>
  </div>

  <div class="ttt-status" id="ttt-status">X's Turn</div>
  <div class="ttt-grid" id="ttt-grid"></div>
  <button class="ttt-btn" id="ttt-reset">↻ New Game</button>
  <p class="ttt-note">💡 Select mode & size. Computer plays automatically.</p>

  <script>
    (function() {
      'use strict';
      const state = {
        board: [], size: 3, mode: 'pve', turn: 'X', gameOver: false, sound: true,
        scores: {X:0, O:0, D:0}, winLen: 3, aiThinking: false, audioCtx: null
      };

      const $ = id => document.getElementById(id);
      const el = {
        mode: $('ttt-mode'), size: $('ttt-size'), sound: $('ttt-sound'),
        x: $('ttt-x'), o: $('ttt-o'), d: $('ttt-d'),
        status: $('ttt-status'), grid: $('ttt-grid'), reset: $('ttt-reset')
      };

      // Audio
      const initAudio = () => {
        if(!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(state.audioCtx.state==='suspended') state.audioCtx.resume();
      };
      const beep = (f,t,d,del=0) => {
        if(!state.audioCtx || !state.sound) return;
        const o = state.audioCtx.createOscillator(), g = state.audioCtx.createGain();
        o.type=t; o.frequency.value=f;
        g.gain.setValueAtTime(0.06, state.audioCtx.currentTime+del);
        g.gain.exponentialRampToValueAtTime(0.01, state.audioCtx.currentTime+del+d);
        o.connect(g).connect(state.audioCtx.destination);
        o.start(state.audioCtx.currentTime+del); o.stop(state.audioCtx.currentTime+del+d);
      };
      const sfx = t => {
        if(t==='x') beep(320,'sine',0.06);
        if(t==='o') beep(420,'sine',0.06);
        if(t==='win') [400,500,600,800].forEach((f,i)=>beep(f,'sine',0.08,i*0.06));
        if(t==='draw') beep(250,'triangle',0.12);
      };

      // Storage
      const loadScores = () => {
        try { state.scores = JSON.parse(localStorage.getItem('ttt_hs')) || state.scores; } catch {}
        updateStats();
      };
      const saveScores = () => { try { localStorage.setItem('ttt_hs', JSON.stringify(state.scores)); } catch {} };
      const updateStats = () => { el.x.textContent=state.scores.X; el.o.textContent=state.scores.O; el.d.textContent=state.scores.D; };

      // Win Detection (Generalized for 3×3 & 5×5)
      const checkWin = (board, player, size, winLen) => {
        const directions = [
          [0,1], [1,0], [1,1], [1,-1] // horizontal, vertical, diag-down, diag-up
        ];
        for(let r=0; r<size; r++){
          for(let c=0; c<size; c++){
            for(const [dr,dc] of directions){
              let count=0, line=[];
              for(let k=0; k<winLen; k++){
                const nr=r+dr*k, nc=c+dc*k;
                if(nr>=0 && nr<size && nc>=0 && nc<size && board[nr*size+nc]===player){
                  count++; line.push(nr*size+nc);
                } else break;
              }
              if(count===winLen) return line;
            }
          }
        }
        return null;
      };

      // AI Logic
      const getEmpty = () => state.board.map((v,i)=>v===''?i:-1).filter(i=>i!==-1);
      
      const minimax = (board, depth, isMax, alpha, beta) => {
        const winLineX = checkWin(board, 'X', state.size, state.winLen);
        if(winLineX) return isMax ? -10+depth : 10-depth;
        const winLineO = checkWin(board, 'O', state.size, state.winLen);
        if(winLineO) return isMax ? 10-depth : -10+depth;
        if(getEmpty().length===0) return 0;

        if(isMax) {
          let best = -Infinity;
          for(const idx of getEmpty()){
            board[idx]='O';
            best = Math.max(best, minimax(board, depth+1, false, alpha, beta));
            board[idx]=''; alpha = Math.max(alpha, best);
            if(beta<=alpha) break;
          }
          return best;
        } else {
          let best = Infinity;
          for(const idx of getEmpty()){
            board[idx]='X';
            best = Math.min(best, minimax(board, depth+1, true, alpha, beta));
            board[idx]=''; beta = Math.min(beta, best);
            if(beta<=alpha) break;
          }
          return best;
        }
      };

      const aiMove = () => {
        if(state.turn!=='O' || state.gameOver || state.mode!=='pve') return;
        state.aiThinking = true;
        el.status.textContent = '🤖 Computer is thinking...';
        
        setTimeout(() => {
          let move = -1;
          const empty = getEmpty();
          if(empty.length===0) return;

          if(state.size===3) {
            // Unbeatable Minimax for 3x3
            let bestVal = -Infinity, bestMove = empty[0];
            for(const idx of empty){
              state.board[idx]='O';
              const val = minimax(state.board, 0, false, -Infinity, Infinity);
              state.board[idx]='';
              if(val>bestVal){bestVal=val; bestMove=idx;}
            }
            move = bestMove;
          } else {
            // Smart Heuristic for 5x5 (Win > Block > Center > Corners > Edges)
            const priorities = [
              p => checkWin(state.board, 'O', 5, 4) !== null ? 1000 : 0, // Win
              p => { const tmp=[...state.board]; tmp[p]='X'; return checkWin(tmp,'X',5,4)!==null?900:0; }, // Block
              p => p===12 ? 80 : 0, // Center
              p => [0,4,20,24].includes(p) ? 60 : 0, // Corners
              p => [2,6,8,10,14,16,18,22].includes(p) ? 40 : 0 // Strategic
            ];
            let bestScore = -1, bestMoves = [];
            for(const p of empty){
              let score = priorities.reduce((sum,fn)=>sum+fn(p),0);
              if(score>bestScore){bestScore=score; bestMoves=[p];}
              else if(score===bestScore) bestMoves.push(p);
            }
            move = bestMoves[Math.floor(Math.random()*bestMoves.length)];
          }

          state.board[move]='O';
          renderBoard();
          handleTurnEnd();
          state.aiThinking = false;
        }, 400);
      };

      // Game Flow
      const renderBoard = () => {
        el.grid.style.gridTemplateColumns = `repeat(${state.size}, 1fr)`;
        el.grid.innerHTML = '';
        state.board.forEach((v,i)=>{
          const c = document.createElement('div');
          c.className = `ttt-cell ${v.toLowerCase()} ${v?'taken':''}`;
          c.textContent = v;
          c.onclick = () => play(i);
          el.grid.appendChild(c);
        });
      };

      const play = (idx) => {
        if(state.gameOver || state.board[idx] || state.aiThinking) return;
        state.board[idx] = state.turn;
        renderBoard();
        sfx(state.turn.toLowerCase());
        handleTurnEnd();
      };

      const handleTurnEnd = () => {
        const winLine = checkWin(state.board, state.turn, state.size, state.winLen);
        if(winLine) {
          state.gameOver = true;
          state.scores[state.turn]++;
          el.status.textContent = `🎉 ${state.turn} Wins!`;
          el.status.classList.add('win');
          sfx('win');
          winLine.forEach(i => el.grid.children[i].classList.add('win'));
          saveScores(); updateStats(); return;
        }
        if(getEmpty().length===0) {
          state.gameOver = true;
          state.scores.D++;
          el.status.textContent = "🤝 It's a Draw!";
          el.status.classList.add('draw');
          sfx('draw');
          saveScores(); updateStats(); return;
        }
        state.turn = state.turn==='X'?'O':'X';
        el.status.textContent = `${state.turn}'s Turn`;
        if(state.mode==='pve' && state.turn==='O') aiMove();
      };

      const resetGame = () => {
        state.board = Array(state.size*state.size).fill('');
        state.turn = 'X'; state.gameOver = false; state.aiThinking = false;
        el.status.textContent = "X's Turn"; el.status.classList.remove('win','draw');
        renderBoard();
      };

      const init = () => {
        state.size = parseInt(el.size.value);
        state.mode = el.mode.value;
        state.winLen = state.size===3?3:4;
        resetGame();
      };

      // Events
      el.mode.onchange = init;
      el.size.onchange = init;
      el.sound.onclick = function(){ state.sound=!state.sound; this.textContent=state.sound?'🔊':'🔇'; };
      el.reset.onclick = resetGame;

      // Init
      loadScores(); init();
    })();
  </script>
</div>

<div class="professional-tool">
  <style>
    .professional-tool {
      --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
      --text: #0f172a; --text-sec: #64748b; --accent: #3b82f6;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --low: #3b82f6; --med: #f59e0b; --high: #ef4444;
      --shadow: 0 4px 12px rgba(0,0,0,0.05); --radius: 12px;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      max-width: 1000px; margin: 0 auto; padding: 1.8rem;
      background: var(--bg); border-radius: 16px; box-shadow: var(--shadow);
      box-sizing: border-box; position: relative;
    }
    .professional-tool * { box-sizing: border-box; }
    .g-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.8rem; }
    .g-header h3 { margin: 0; font-size: 1.45rem; color: var(--text); }
    .g-actions { display: flex; gap: 0.6rem; }
    .g-form { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 0.8rem; align-items: end; margin-bottom: 1.5rem; }
    .g-input, .g-select { padding: 0.8rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); color: var(--text); outline: none; transition: all 0.2s; }
    .g-input:focus, .g-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .g-range { width: 100%; accent-color: var(--accent); }
    .g-btn { padding: 0.8rem 1rem; border: none; border-radius: var(--radius); font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; justify-content: center; }
    .g-btn-primary { background: var(--accent); color: #fff; }
    .g-btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
    .g-btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text-sec); }
    .g-btn-secondary:hover { background: #f1f5f9; }
    .g-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .g-chart-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; margin-bottom: 1.2rem; position: relative; }
    .g-timeline-header { display: flex; position: sticky; top: 0; z-index: 2; background: var(--card); border-bottom: 1px solid var(--border); }
    .g-day-col { min-width: 40px; flex: 1; text-align: center; padding: 0.4rem 0; font-size: 0.72rem; color: var(--text-sec); border-right: 1px dashed var(--border); }
    .g-day-col.weekend { background: #f1f5f9; }
    .g-timeline-body { position: relative; min-height: 180px; }
    .g-row { position: relative; height: 44px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
    .g-bar {
      position: absolute; height: 28px; border-radius: 6px; display: flex; align-items: center; padding: 0 0.6rem;
      color: #fff; font-size: 0.78rem; font-weight: 600; white-space: nowrap; overflow: hidden; cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: transform 0.2s, filter 0.2s; z-index: 1;
    }
    .g-bar:hover { transform: scaleY(1.08); filter: brightness(1.15); z-index: 3; }
    .g-progress { position: absolute; left: 0; top: 0; height: 100%; background: rgba(0,0,0,0.25); border-radius: 6px; }
    .g-empty { padding: 2rem; text-align: center; color: var(--text-sec); font-style: italic; }
    .g-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .g-item { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
    .g-item-left { display: flex; flex-direction: column; gap: 0.2rem; }
    .g-item-title { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
    .g-badge { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 6px; color: #fff; }
    .g-item-meta { font-size: 0.8rem; color: var(--text-sec); }
    .g-item-actions { display: flex; gap: 0.5rem; }
    .g-icon-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .g-icon-btn:hover { background: #f1f5f9; }
    .g-icon-btn.del:hover { background: rgba(239,68,68,0.1); color: var(--danger); border-color: var(--danger); }
    .g-toast {
      position: absolute; bottom: 1.2rem; right: 1.2rem; background: var(--text); color: #fff;
      padding: 0.75rem 1.1rem; border-radius: 10px; font-size: 0.85rem; transform: translateY(120%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); z-index: 10; pointer-events: none;
    }
    .g-toast.show { transform: translateY(0); }
    @media (max-width: 800px) {
      .g-form { grid-template-columns: 1fr 1fr; }
      .g-btn-primary { grid-column: 1 / -1; }
    }
    @media print {
      .professional-tool { box-shadow: none; padding: 0; background: #fff; }
      .g-form, .g-actions, .g-icon-btn, .g-toast { display: none !important; }
      .g-chart-wrap { border: none; overflow: visible; }
      .g-timeline-header, .g-row { page-break-inside: avoid; }
      body { background: #fff !important; }
    }
  </style>

  <div class="g-header">
    <h3>📊 Gantt Project Planner</h3>
    <div class="g-actions">
      <button class="g-btn g-btn-secondary" id="g-export">🖨️ Print / PDF</button>
      <button class="g-btn g-btn-secondary" id="g-clear">🗑️ Clear All</button>
    </div>
  </div>

  <form id="g-form" class="g-form">
    <input class="g-input" id="g-task" placeholder="Task Name" required>
    <input class="g-input" type="date" id="g-start" required>
    <input class="g-input" type="number" id="g-days" placeholder="Days" min="1" value="3" required>
    <select class="g-select" id="g-priority">
      <option value="low">Low Priority</option>
      <option value="medium" selected>Medium Priority</option>
      <option value="high">High Priority</option>
    </select>
    <input type="range" class="g-range" id="g-progress" min="0" max="100" value="0" title="Progress: 0%">
    <button type="submit" class="g-btn g-btn-primary">+ Add Task</button>
  </form>

  <div class="g-chart-wrap">
    <div class="g-timeline-header" id="g-header-row"></div>
    <div class="g-timeline-body" id="g-chart">
      <div class="g-empty">Add tasks to generate your timeline</div>
    </div>
  </div>

  <div class="g-list" id="g-list"></div>
  <div class="g-toast" id="g-toast"></div>

  <script>
    (function(){
      // State
      let tasks = JSON.parse(localStorage.getItem('gantt_tasks') || '[]');
      const els = {
        form: document.getElementById('g-form'), task: document.getElementById('g-task'),
        start: document.getElementById('g-start'), days: document.getElementById('g-days'),
        priority: document.getElementById('g-priority'), progress: document.getElementById('g-progress'),
        headerRow: document.getElementById('g-header-row'), chart: document.getElementById('g-chart'),
        list: document.getElementById('g-list'), toast: document.getElementById('g-toast'),
        exportBtn: document.getElementById('g-export'), clearBtn: document.getElementById('g-clear')
      };

      // Utils
      const toast = msg => { els.toast.textContent = msg; els.toast.classList.add('show'); setTimeout(()=>els.toast.classList.remove('show'), 2000); };
      const save = () => localStorage.setItem('gantt_tasks', JSON.stringify(tasks));
      const genId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
      const fmtDate = d => new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric'});
      const dayOfWeek = d => d.getDay(); // 0=Sun, 6=Sat

      // Core Render
      const render = () => {
        if(!tasks.length) {
          els.headerRow.innerHTML = '';
          els.chart.innerHTML = '<div class="g-empty">Add tasks to generate your timeline</div>';
          els.list.innerHTML = '';
          return;
        }

        // Date Range Calc
        const starts = tasks.map(t => new Date(t.start).getTime());
        const ends = tasks.map(t => new Date(t.start).getTime() + (t.days-1)*864e5);
        let min = Math.min(...starts), max = Math.max(...ends);
        // Add padding
        min -= 2*864e5; max += 3*864e5;
        const totalDays = Math.round((max-min)/864e5) + 1;

        // Header
        els.headerRow.innerHTML = '';
        for(let i=0; i<totalDays; i++){
          const d = new Date(min + i*864e5);
          const isWeekend = dayOfWeek(d)===0 || dayOfWeek(d)===6;
          els.headerRow.innerHTML += `<div class="g-day-col ${isWeekend?'weekend':''}">${d.getDate()}</div>`;
        }

        // Chart Bars
        els.chart.innerHTML = '';
        tasks.forEach(t => {
          const startMs = new Date(t.start).getTime();
          const left = ((startMs - min) / (totalDays * 864e5)) * 100;
          const width = (t.days / totalDays) * 100;
          const color = t.priority==='high'?'var(--high)':t.priority==='medium'?'var(--med)':'var(--low)';
          
          els.chart.innerHTML += `
            <div class="g-row">
              <div class="g-bar" style="left:${left}%;width:${width}%;background:${color}" data-id="${t.id}">
                <div class="g-progress" style="width:${t.progress}%"></div>
                <span style="position:relative;z-index:2">${t.name}</span>
              </div>
            </div>`;
        });

        // List
        els.list.innerHTML = tasks.map(t => `
          <div class="g-item" data-id="${t.id}">
            <div class="g-item-left">
              <div class="g-item-title">
                ${t.name}
                <span class="g-badge" style="background:${t.priority==='high'?'var(--high)':t.priority==='medium'?'var(--med)':'var(--low)'}">${t.priority}</span>
              </div>
              <div class="g-item-meta">${fmtDate(t.start)} • ${t.days}d • ${t.progress}% Complete</div>
            </div>
            <div class="g-item-actions">
              <button class="g-icon-btn del" data-action="del" title="Delete">🗑️</button>
            </div>
          </div>
        `).join('');
      };

      // Actions
      const addTask = e => {
        e.preventDefault();
        const name = els.task.value.trim();
        const start = els.start.value;
        const days = parseInt(els.days.value);
        const priority = els.priority.value;
        const progress = parseInt(els.progress.value);

        if(!name || !start || days<1) return toast('⚠️ Fill all fields correctly');
        
        tasks.push({ id: genId(), name, start, days, priority, progress });
        save(); render();
        els.form.reset();
        els.progress.value = 0;
        toast('✅ Task added');
      };

      const delTask = id => {
        tasks = tasks.filter(t => t.id !== id);
        save(); render(); toast('🗑️ Task removed');
      };

      const updateProgress = (id, val) => {
        const t = tasks.find(x => x.id === id);
        if(t) { t.progress = val; save(); render(); }
      };

      // Events
      els.form.addEventListener('submit', addTask);
      els.progress.addEventListener('input', e => e.target.nextElementSibling.nextElementSibling.textContent = `Progress: ${e.target.value}%`);
      
      els.chart.addEventListener('click', e => {
        const bar = e.target.closest('.g-bar');
        if(!bar) return;
        const id = bar.dataset.id;
        const newProg = prompt(`Update progress for "${tasks.find(t=>t.id===id)?.name}" (0-100):`, tasks.find(t=>t.id===id)?.progress || 0);
        if(newProg !== null) updateProgress(id, Math.min(100, Math.max(0, parseInt(newProg))));
      });

      els.list.addEventListener('click', e => {
        const del = e.target.closest('[data-action="del"]');
        if(del) delTask(del.closest('.g-item').dataset.id);
      });

      els.exportBtn.addEventListener('click', () => window.print());
      els.clearBtn.addEventListener('click', () => {
        if(confirm('Clear all tasks?')) { tasks = []; save(); render(); toast('🗑️ All cleared'); }
      });

      // Set default date to today
      els.start.valueAsDate = new Date();
      render();
    })();
  </script>
</div>

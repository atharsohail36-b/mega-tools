<div class="tax-tool" lang="en">
  <style>
    :root {
      --bg-main: #0b0e11; --bg-card: #161a21; --bg-input: #1e232c;
      --border: rgba(255,255,255,0.08); --text: #f1f5f9; --text-sec: #94a3b8;
      --accent: #38bdf8; --accent-glow: rgba(56,189,248,0.2);
      --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
      --new-regime: rgba(56,189,248,0.15); --old-regime: rgba(168,85,247,0.15);
      --grad: linear-gradient(135deg, #38bdf8, #818cf8); --radius: 14px;
      --trans: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tax-tool { max-width: 780px; margin: 0 auto; padding: 1.5rem; font-family: system-ui, -apple-system, sans-serif; color: var(--text); }
    .tax-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.8rem; }
    .tax-header h3 { margin: 0; font-size: 1.3rem; font-weight: 700; background: var(--grad); -webkit-background-clip: text; color: transparent; }
    .regime-toggle { display: flex; background: var(--bg-input); border-radius: 10px; padding: 4px; border: 1px solid var(--border); }
    .regime-btn { padding: 0.45rem 0.9rem; border: none; border-radius: 8px; background: transparent; color: var(--text-sec); cursor: pointer; transition: var(--trans); font-size: 0.85rem; font-weight: 500; }
    .regime-btn.active { background: var(--accent); color: #0b0e11; }
    .regime-btn.both { background: var(--grad); color: #0b0e11; }

    .tax-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.9rem; margin-bottom: 0.8rem; }
    .input-wrap { position: relative; }
    .tax-label { display: block; margin-bottom: 0.4rem; color: var(--text-sec); font-size: 0.85rem; font-weight: 500; }
    .tax-input { width: 100%; padding: 0.9rem 1rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 1rem; outline: none; transition: var(--trans); }
    .tax-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .input-hint { position: absolute; right: 10px; top: 38px; font-size: 0.75rem; color: var(--text-sec); pointer-events: none; }
    .error-msg { color: var(--danger); font-size: 0.75rem; margin-top: 4px; display: none; }
    .error-msg.show { display: block; }

    .adv-toggle { background: transparent; border: 1px dashed var(--border); border-radius: 10px; padding: 0.6rem; color: var(--text-sec); cursor: pointer; transition: var(--trans); font-size: 0.9rem; width: 100%; margin: 0.5rem 0 1rem; }
    .adv-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .adv-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.9rem; margin-bottom: 1rem; padding: 1rem; background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); display: none; }
    .adv-options.show { display: grid; }

    .calc-btn { width: 100%; padding: 1.1rem; background: var(--grad); border: none; border-radius: var(--radius); color: #0b0e11; font-weight: 700; font-size: 1.05rem; cursor: pointer; transition: var(--trans); margin: 0.5rem 0 1.2rem; }
    .calc-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px var(--accent-glow); }
    .calc-btn:active { transform: scale(0.99); }

    .results-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 1.2rem; }
    .regime-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; transition: var(--trans); position: relative; overflow: hidden; }
    .regime-card.best { border: 2px solid var(--success); box-shadow: 0 0 0 3px rgba(34,197,94,0.1); }
    .regime-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--grad); }
    .regime-card.old::before { background: linear-gradient(135deg, #a855f7, #8b5cf6); }
    .regime-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
    .regime-title { font-weight: 700; font-size: 1.05rem; }
    .best-badge { background: var(--success); color: #fff; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; }
    .tax-main { font-size: 2rem; font-weight: 800; color: var(--accent); margin: 0.3rem 0; }
    .tax-sub { font-size: 0.85rem; color: var(--text-sec); margin-bottom: 0.8rem; }
    .tax-breakdown { border-top: 1px solid var(--border); padding-top: 0.8rem; }
    .break-row { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.85rem; }
    .break-row.total { font-weight: 700; color: var(--accent); border-top: 1px dashed var(--border); padding-top: 0.6rem; margin-top: 0.4rem; }

    .chart-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1.2rem; }
    .chart-title { font-size: 0.9rem; color: var(--text-sec); margin-bottom: 0.8rem; }
    .tax-bars { display: flex; height: 24px; border-radius: 12px; overflow: hidden; background: var(--bg-input); }
    .bar-seg { display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; color: #0b0e11; transition: width 0.5s ease; }
    .bar-new { background: var(--grad); }
    .bar-old { background: linear-gradient(135deg, #a855f7, #8b5cf7); }
    .bar-cess { background: var(--warning); }
    .chart-legend { display: flex; justify-content: center; gap: 1rem; margin-top: 0.8rem; font-size: 0.75rem; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

    .monthly-calc { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; }
    .monthly-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.8rem; }
    .monthly-item { text-align: center; }
    .monthly-val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .monthly-lbl { font-size: 0.75rem; color: var(--text-sec); margin-top: 0.2rem; }

    .tips-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; border-left: 4px solid var(--warning); }
    .tips-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px; }
    .tips-list { margin: 0; padding-left: 1.2rem; font-size: 0.9rem; color: var(--text-sec); line-height: 1.6; }

    .actions { display: flex; justify-content: flex-end; gap: 0.6rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .act-btn { padding: 0.5rem 0.9rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-sec); cursor: pointer; transition: var(--trans); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .act-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }

    .history-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
    .history-panel.open { max-height: 160px; padding: 0.7rem; overflow-y: auto; }
    .hist-item { display: flex; justify-content: space-between; padding: 0.5rem; border-radius: 8px; cursor: pointer; transition: var(--trans); font-size: 0.85rem; color: var(--text-sec); border-bottom: 1px solid var(--border); }
    .hist-item:last-child { border-bottom: none; }
    .hist-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .empty-hist { text-align: center; color: var(--text-sec); padding: 0.8rem 0; font-size: 0.8rem; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.35s ease-out forwards; }

    @media (max-width: 600px) {
      .tax-tool { padding: 1rem 0.8rem; }
      .tax-inputs { grid-template-columns: 1fr; }
      .results-container { grid-template-columns: 1fr; }
      .tax-main { font-size: 1.6rem; }
    }
  </style>

  <div class="tax-header">
    <h3>🇮🇳 Income Tax Calculator FY 2024-25</h3>
    <div class="regime-toggle">
      <button class="regime-btn active" data-regime="new">New</button>
      <button class="regime-btn" data-regime="old">Old</button>
      <button class="regime-btn both" data-regime="both">Compare Both</button>
    </div>
  </div>

  <div class="tax-inputs">
    <div class="input-wrap">
      <label class="tax-label" for="t-gross">Annual Gross Income (₹)</label>
      <input class="tax-input" type="number" id="t-gross" value="1200000" min="0" step="1000">
      <span class="input-hint">Before deductions</span>
      <div class="error-msg" id="gross-err">Enter valid income</div>
    </div>
    <div class="input-wrap">
      <label class="tax-label" for="t-ded">Total Deductions (₹)</label>
      <input class="tax-input" type="number" id="t-ded" value="150000" min="0" step="1000">
      <span class="input-hint">80C, 80D, HRA, etc.</span>
    </div>
    <div class="input-wrap">
      <label class="tax-label" for="t-age">Age Group</label>
      <select class="tax-input" id="t-age">
        <option value="below60">Below 60 Years</option>
        <option value="60-80">60-80 Years (Senior)</option>
        <option value="above80">Above 80 Years (Super Senior)</option>
      </select>
    </div>
    <div class="input-wrap">
      <label class="tax-label" for="t-employment">Employment Type</label>
      <select class="tax-input" id="t-employment">
        <option value="salaried">Salaried</option>
        <option value="business">Business/Professional</option>
      </select>
    </div>
  </div>

  <button class="adv-toggle" id="adv-toggle">⚙️ Advanced Options (Surcharge, Cess, etc.)</button>
  <div class="adv-options" id="adv-options">
    <div class="input-wrap">
      <label class="tax-label" for="t-surcharge">Surcharge Applicable (%)</label>
      <select class="tax-input" id="t-surcharge">
        <option value="0">None (Income ≤ ₹50L)</option>
        <option value="10">10% (₹50L - ₹1Cr)</option>
        <option value="15">15% (₹1Cr - ₹2Cr)</option>
        <option value="25">25% (₹2Cr - ₹5Cr)</option>
        <option value="37">37% (Income > ₹5Cr)</option>
      </select>
    </div>
    <div class="input-wrap">
      <label class="tax-label" for="t-cess">Health & Education Cess (%)</label>
      <input class="tax-input" type="number" id="t-cess" value="4" min="0" max="10" step="0.1">
    </div>
    <div class="input-wrap">
      <label class="tax-label" for="t-pf">Employee PF Contribution (₹)</label>
      <input class="tax-input" type="number" id="t-pf" value="0" min="0" step="100">
    </div>
    <div class="input-wrap">
      <label class="tax-label" for="t-hra">HRA Exemption (₹)</label>
      <input class="tax-input" type="number" id="t-hra" value="0" min="0" step="100">
    </div>
  </div>

  <button class="calc-btn" id="calc-btn">Calculate Tax Liability</button>

  <div class="results-container" id="results"></div>

  <div class="chart-wrap">
    <div class="chart-title">Tax Composition (New Regime)</div>
    <div class="tax-bars" id="tax-bars"></div>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--grad)"></div> Base Tax</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--warning)"></div> Cess/Surcharge</div>
    </div>
  </div>

  <div class="monthly-calc">
    <div style="font-weight:600; margin-bottom:0.8rem; color:var(--text-sec)">💰 Monthly Take-Home Estimate</div>
    <div class="monthly-grid">
      <div class="monthly-item"><div class="monthly-val" id="m-gross">₹0</div><div class="monthly-lbl">Gross Salary</div></div>
      <div class="monthly-item"><div class="monthly-val" id="m-tax">₹0</div><div class="monthly-lbl">Tax Deducted</div></div>
      <div class="monthly-item"><div class="monthly-val" id="m-pf">₹0</div><div class="monthly-lbl">PF Contribution</div></div>
      <div class="monthly-item"><div class="monthly-val" id="m-net" style="color:var(--success)">₹0</div><div class="monthly-lbl">Net Take-Home</div></div>
    </div>
  </div>

  <div class="tips-box">
    <div class="tips-title">💡 Tax Saving Tips</div>
    <ul class="tips-list" id="tips-list"></ul>
  </div>

  <div class="actions">
    <button class="act-btn" id="clear-btn">🗑️ Reset</button>
    <button class="act-btn" id="save-btn">💾 Save</button>
    <button class="act-btn" id="copy-btn">📋 Copy</button>
    <button class="act-btn" id="hist-btn">📜 History</button>
  </div>

  <div class="history-panel" id="history-panel">
    <div class="empty-hist">No saved calculations</div>
  </div>

  <script>
    (function(){
      const $ = id => document.getElementById(id);
      const fmt = n => '₹' + Math.round(n).toLocaleString('en-IN');
      const fmtDec = (n,d=2) => parseFloat(n.toFixed(d));
      
      // FY 2024-25 Tax Slabs (New Regime - Default)
      const slabsNew = [
        { upto: 300000, rate: 0 },
        { upto: 700000, rate: 0.05 },
        { upto: 1000000, rate: 0.10 },
        { upto: 1200000, rate: 0.15 },
        { upto: 1500000, rate: 0.20 },
        { upto: Infinity, rate: 0.30 }
      ];
      
      // Old Regime Slabs (Below 60)
      const slabsOld = {
        below60: [
          { upto: 250000, rate: 0 },
          { upto: 500000, rate: 0.05 },
          { upto: 1000000, rate: 0.20 },
          { upto: Infinity, rate: 0.30 }
        ],
        '60-80': [
          { upto: 300000, rate: 0 },
          { upto: 500000, rate: 0.05 },
          { upto: 1000000, rate: 0.20 },
          { upto: Infinity, rate: 0.30 }
        ],
        above80: [
          { upto: 500000, rate: 0 },
          { upto: 1000000, rate: 0.20 },
          { upto: Infinity, rate: 0.30 }
        ]
      };

      let regime = 'new';
      let history = JSON.parse(localStorage.getItem('tax_history') || '[]');

      const calcTax = (income, slabs, isOld=false, deductions=0, age='below60', stdDed=50000, isSalaried=true) => {
        // Standard Deduction (New: ₹50k for salaried, Old: ₹50k for salaried)
        let taxable = income;
        if(isSalaried) taxable -= stdDed;
        if(isOld) taxable -= deductions; // Old regime allows deductions
        taxable = Math.max(0, taxable);

        // Slab-wise calculation
        let tax = 0, prev = 0, breakdown = [];
        for(const slab of slabs) {
          if(taxable <= prev) break;
          const slabIncome = Math.min(taxable, slab.upto) - prev;
          const slabTax = slabIncome * slab.rate;
          if(slabTax > 0) {
            breakdown.push({ range: `₹${(prev/1e5).toFixed(1)}L-₹${(slab.upto/1e5).toFixed(1)}L`, tax: slabTax, rate: slab.rate*100 });
          }
          tax += slabTax;
          prev = slab.upto;
        }

        // Rebate u/s 87A
        const rebateLimit = isOld ? 500000 : 700000;
        if(taxable <= rebateLimit && tax <= 25000) {
          tax = Math.max(0, tax - 25000); // Max rebate ₹25,000
        }

        return { taxable, tax, breakdown };
      };

      const applyCessSurcharge = (tax, cessRate, surchargeRate) => {
        let withSurcharge = tax * (1 + surchargeRate/100);
        let withCess = withSurcharge * (1 + cessRate/100);
        return { base: tax, surcharge: withSurcharge - tax, cess: withCess - withSurcharge, total: withCess };
      };

      const generateTips = (income, regime, tax) => {
        const tips = [];
        if(regime === 'new' && income > 700000) {
          tips.push('Consider switching to Old Regime if you have high 80C/80D deductions');
          tips.push('NPS (Section 80CCD) can provide additional ₹50,000 deduction in Old Regime');
        }
        if(income > 1000000) {
          tips.push('Explore ELSS mutual funds for tax-saving + wealth creation (80C)');
          tips.push('Health insurance premium (80D) can save up to ₹25,000 (₹50,000 for senior parents)');
        }
        if(income > 1500000) {
          tips.push('Consider HRA exemption if you pay rent (requires rent receipts)');
          tips.push('Home loan interest deduction (Section 24) can save up to ₹2L annually');
        }
        if(tax > 100000) {
          tips.push('Consult a CA for optimal tax planning and advance tax scheduling');
        }
        return tips.length ? tips : ['Your tax liability is optimized for current inputs.'];
      };

      const renderResults = (data, regimeType, isBest=false) => {
        const card = document.createElement('div');
        card.className = `regime-card animate-in ${regimeType} ${isBest ? 'best' : ''}`;
        card.innerHTML = `
          <div class="regime-header">
            <span class="regime-title">${regimeType==='new'?'🆕 New Regime':'📜 Old Regime'}</span>
            ${isBest ? '<span class="best-badge">✅ Recommended</span>' : ''}
          </div>
          <div class="tax-sub">Taxable Income: ${fmt(data.taxable)}</div>
          <div class="tax-main">${fmt(data.finalTax)}</div>
          <div class="tax-sub">Effective Rate: ${data.effectiveRate}%</div>
          <div class="tax-breakdown">
            ${data.breakdown.map(b => `<div class="break-row"><span>${b.range} @ ${b.rate}%</span><span>${fmt(b.tax)}</span></div>`).join('')}
            ${data.surcharge > 0 ? `<div class="break-row"><span>Surcharge</span><span>${fmt(data.surcharge)}</span></div>` : ''}
            ${data.cess > 0 ? `<div class="break-row"><span>Cess (${data.cessRate}%)</span><span>${fmt(data.cess)}</span></div>` : ''}
            <div class="break-row total"><span>Total Tax Payable</span><span>${fmt(data.finalTax)}</span></div>
          </div>
        `;
        return card;
      };

      const calculate = () => {
        const gross = parseFloat($('t-gross').value) || 0;
        const deductions = parseFloat($('t-ded').value) || 0;
        const age = $('t-age').value;
        const employment = $('t-employment').value;
        const isSalaried = employment === 'salaried';
        const cessRate = parseFloat($('t-cess').value) || 4;
        const surchargeRate = parseFloat($('t-surcharge').value) || 0;
        const pf = parseFloat($('t-pf').value) || 0;

        if(gross <= 0) { $('gross-err').classList.add('show'); return; }
        $('gross-err').classList.remove('show');

        const resultsContainer = $('results');
        resultsContainer.innerHTML = '';

        const regimesToCalc = regime === 'both' ? ['new', 'old'] : [regime];
        let bestRegime = null, lowestTax = Infinity;

        regimesToCalc.forEach(r => {
          const slabs = r === 'new' ? slabsNew : slabsOld[age];
          const isOld = r === 'old';
          const { taxable, tax, breakdown } = calcTax(gross, slabs, isOld, deductions, age, 50000, isSalaried);
          const { base, surcharge, cess, total } = applyCessSurcharge(tax, cessRate, surchargeRate);
          const effectiveRate = gross > 0 ? ((total/gross)*100).toFixed(1) : '0.0';

          const result = { taxable, breakdown, base, surcharge, cess, cessRate, finalTax: total, effectiveRate };
          
          // Track best
          if(total < lowestTax) { lowestTax = total; bestRegime = r; }
          
          resultsContainer.appendChild(renderResults(result, r, regime==='both' && r===bestRegime));
        });

        // Chart for New Regime
        if(regime !== 'old') {
          const { taxable, tax } = calcTax(gross, slabsNew, false, deductions, age, 50000, isSalaried);
          const { base, surcharge, cess, total } = applyCessSurcharge(tax, cessRate, surchargeRate);
          const bars = $('tax-bars');
          bars.innerHTML = '';
          const totalTax = total || 1;
          const basePct = (base/totalTax)*100;
          const cessPct = ((surcharge+cess)/totalTax)*100;
          bars.innerHTML = `
            <div class="bar-seg bar-new" style="width:${basePct}%">${basePct.toFixed(0)}%</div>
            ${cessPct>0 ? `<div class="bar-seg bar-cess" style="width:${cessPct}%">${cessPct.toFixed(0)}%</div>` : ''}
          `;
        }

        // Monthly Take-Home
        const annualTax = regime==='both' ? lowestTax : (regime==='new' ? 
          applyCessSurcharge(calcTax(gross, slabsNew, false, deductions, age, 50000, isSalaried).tax, cessRate, surchargeRate).total :
          applyCessSurcharge(calcTax(gross, slabsOld[age], true, deductions, age, 50000, isSalaried).tax, cessRate, surchargeRate).total);
        $('m-gross').textContent = fmt(gross/12);
        $('m-tax').textContent = fmt(annualTax/12);
        $('m-pf').textContent = fmt(pf/12);
        $('m-net').textContent = fmt((gross - annualTax - pf)/12);

        // Tips
        const activeRegime = regime==='both' ? bestRegime : regime;
        const activeTax = regime==='both' ? lowestTax : (activeRegime==='new' ? 
          applyCessSurcharge(calcTax(gross, slabsNew, false, deductions, age, 50000, isSalaried).tax, cessRate, surchargeRate).total :
          applyCessSurcharge(calcTax(gross, slabsOld[age], true, deductions, age, 50000, isSalaried).tax, cessRate, surchargeRate).total);
        $('tips-list').innerHTML = generateTips(gross, activeRegime, activeTax).map(t=>`<li>${t}</li>`).join('');
      };

      const saveCalc = () => {
        const gross = $('t-gross').value;
        const tax = regime==='both' ? $('results').querySelector('.best .tax-main').textContent : $('results').querySelector('.tax-main').textContent;
        history.unshift({ gross, tax, regime, ts: new Date().toLocaleDateString() });
        if(history.length > 10) history.pop();
        localStorage.setItem('tax_history', JSON.stringify(history));
        renderHistory();
        $('save-btn').innerHTML = '✅ Saved!'; setTimeout(() => $('save-btn').innerHTML = '💾 Save', 1500);
      };

      const renderHistory = () => {
        $('history-panel').innerHTML = history.length ? history.map(h => 
          `<div class="hist-item"><span>₹${parseInt(h.gross).toLocaleString()} → ${h.tax}</span><span style="color:var(--text-sec)">${h.ts}</span></div>`
        ).join('') : '<div class="empty-hist">No saved calculations</div>';
      };

      const copyResults = async () => {
        const text = `🇮🇳 Income Tax Summary FY 2024-25\nGross Income: ₹${$('t-gross').value}\nRegime: ${regime.toUpperCase()}\nTax Payable: ${$('results').querySelector('.tax-main')?.textContent || 'N/A'}\nEffective Rate: ${$('results').querySelector('.tax-sub')?.textContent.split(': ')[1] || 'N/A'}\nDate: ${new Date().toLocaleString()}`;
        try {
          await navigator.clipboard.writeText(text);
          $('copy-btn').innerHTML = '✅ Copied!'; setTimeout(() => $('copy-btn').innerHTML = '📋 Copy', 1500);
        } catch(e){}
      };

      // Events
      document.querySelectorAll('.regime-btn').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.regime-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        regime = btn.dataset.regime;
        calculate();
      }));

      $('calc-btn').addEventListener('click', calculate);
      $('adv-toggle').addEventListener('click', () => {
        $('adv-options').classList.toggle('show');
        $('adv-toggle').textContent = $('adv-options').classList.contains('show') ? '🔼 Hide Advanced' : '⚙️ Advanced Options';
      });
      $('clear-btn').addEventListener('click', () => {
        $('t-gross').value=1200000; $('t-ded').value=150000; $('t-pf').value=0; $('t-hra').value=0;
        calculate();
      });
      $('save-btn').addEventListener('click', saveCalc);
      $('copy-btn').addEventListener('click', copyResults);
      $('hist-btn').addEventListener('click', () => {
        $('history-panel').classList.toggle('open');
        $('hist-btn').innerHTML = $('history-panel').classList.contains('open') ? '🔽 Close' : '📜 History';
      });

      // Auto-calc debounce
      let timeout;
      document.querySelectorAll('.tax-input').forEach(el => el.addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(calculate, 300);
      }));

      // Keyboard
      document.addEventListener('keydown', e => {
        if(e.key==='Enter' && document.activeElement.classList.contains('tax-input')) {
          e.preventDefault(); calculate();
        }
      });

      // Init
      renderHistory();
      calculate();
    })();
  </script>
</div>

      const getAllFacts = () => {
        let all = [];
        Object.entries(factsDB).forEach(([cat, facts]) => {
          facts.forEach(f => all.push({...f, id: `${cat}-${all.length}`}));
        });
        return all;
      };

      const filterFacts = () => {
        let facts = state.currentCat === 'all' ? getAllFacts() : factsDB[state.currentCat].map((f,i) => ({...f, id: `${state.currentCat}-${i}`}));
        if(state.searchQuery) {
          const q = state.searchQuery.toLowerCase();
          facts = facts.filter(f => 
            f.t.toLowerCase().includes(q) || 
            f.tags.some(t => t.includes(q)) ||
            f.cat.includes(q)
          );
        }
        return facts;
      };

      const updateStats = () => {
        els.total.textContent = getAllFacts().length;
        els.favCount.textContent = state.favorites.length;
        els.streak.textContent = state.streak;
      };

      const getDailyFact = () => {
        const today = new Date().toDateString();
        const all = getAllFacts();
        // Simple hash based on date for consistent daily fact
        const hash = today.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
        return all[hash % all.length];
      };

      const showFact = (fact) => {
        els.category.innerHTML = `⚛️ ${fact.cat.charAt(0).toUpperCase() + fact.cat.slice(1)}`;
        els.category.className = `sf-category ${fact.cat}`;
        els.difficulty.textContent = fact.diff.charAt(0).toUpperCase() + fact.diff.slice(1);
        els.difficulty.className = `sf-difficulty ${fact.diff}`;
        els.fact.textContent = fact.t;
        els.tags.innerHTML = fact.tags.map(tag => `<span class="sf-tag">#${tag}</span>`).join('');
        els.extra.textContent = fact.extra || '';
        els.extra.classList.remove('show');
        
        // Update bookmark button
        const isFav = state.favorites.some(f => f.id === fact.id);
        els.bookmark.textContent = isFav ? '🔖 Saved' : '🔖 Save';
        els.bookmark.classList.toggle('bookmarked', isFav);
        
        // Hide quiz if showing regular fact
        if(!state.quizMode) els.quiz.classList.remove('show');
      };

        if(facts.length === 0) {
          els.fact.textContent = 'No facts found. Try different search or category.';
          return;
        }
        state.currentIndex = (state.currentIndex + 1) % facts.length;
        showFact(facts[state.currentIndex]);
      };

      const toggleBookmark = (fact) => {
        const idx = state.favorites.findIndex(f => f.id === fact.id);
        if(idx > -1) {
          state.favorites.splice(idx, 1);
        } else {
          state.favorites.push(fact);
          triggerConfetti();
        }
        localStorage.setItem('sf-favorites', JSON.stringify(state.favorites));
        updateStats();

        showFact(fact); // Refresh button state

        try {
          if(navigator.share) await navigator.share({ title: 'Science Fact', text });
          else {
            await navigator.clipboard.writeText(text);
            alert('✅ Fact copied to clipboard!');
          }
        } catch(e) {}
      };

          const utterance = new SpeechSynthesisUtterance(fact.t);
          utterance.rate = 0.9;

        } else {
          alert('🔊 Text-to-speech not supported in this browser.');
        }

          return;

        state.currentQuiz = fact;
        
        els.quizContent.innerHTML = `

          <div class="sf-quiz-opts">
            ${fact.quiz.o.map((opt, i) => `<button class="sf-quiz-opt" data-idx="${i}">${opt}</button>`).join('')}
          </div>
        `;
        
        els.quizContent.querySelectorAll('.sf-quiz-opt').forEach(btn => {
          btn.onclick = () => handleQuizAnswer(btn, parseInt(btn.dataset.idx), fact.quiz.a);
        });
        
        els.quiz.classList.add('show');
        els.fact.textContent = 'Answer the quiz question above!';
      };

      const handleQuizAnswer = (btn, selected, correct) => {
        // Disable all options
        els.quizContent.querySelectorAll('.sf-quiz-opt').forEach(b => {
          b.disabled = true;
          if(parseInt(b.dataset.idx) === correct) b.classList.add('correct');
          if(parseInt(b.dataset.idx) === selected && selected !== correct) b.classList.add('wrong');
        });
        
        // Show result
        const result = document.createElement('div');
        result.className = `sf-quiz-result ${selected === correct ? 'pass' : 'fail'}`;
        result.innerHTML = selected === correct 
          ? '🎉 Correct! Great science knowledge!' 
          : `❌ Not quite. The correct answer was: ${state.currentQuiz.quiz.o[correct]}`;
        els.quizContent.appendChild(result);
        
        // Auto-return to facts after delay
        setTimeout(() => {
          state.quizMode = false;
          els.quiz.classList.remove('show');
          nextFact();
        }, 3000);
      };

            state.favorites = state.favorites.filter(f => f.id !== id);

            updateStats();
            renderFavorites();

          return;
        }
        const text = `🔬 My Saved Science Facts:\n\n${state.favorites.map((f,i) => `${i+1}. [${f.cat.toUpperCase()}] ${f.t}\n   💡 ${f.extra}`).join('\n\n')}`;
        try {
          await navigator.clipboard.writeText(text);
          alert('✅ Exported to clipboard! Paste anywhere to save.');
        } catch(e) {
          alert('❌ Copy failed. Please select and copy manually.');
        }
      };

      const triggerConfetti = () => {
        const colors = ['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ec4899'];
        for(let i=0; i<30; i++) {
          const c = document.createElement('div');
          c.className = 'sf-confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          c.style.animationDelay = Math.random() * 2 + 's';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 3000);
        }
      };

      const updateStreak = () => {
        const today = new Date().toDateString();
        if(state.lastVisit !== today) {
          const yesterday = new Date(Date.now() - 86400000).toDateString();
          state.streak = state.lastVisit === yesterday ? state.streak + 1 : 1;
          state.lastVisit = today;
          localStorage.setItem('sf-streak', state.streak.toString());
          localStorage.setItem('sf-lastVisit', today);
          updateStats();
        }
      };

      // ====== EVENTS ======
      els.search.oninput = (e) => {
        state.searchQuery = e.target.value;
        state.currentIndex = 0;
        nextFact();
      };

      els.tabs.forEach(tab => {
        tab.onclick = () => {
          els.tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          state.currentCat = tab.dataset.cat;
          state.currentIndex = 0;
          nextFact();
        };
      });

      els.next.onclick = () => {
        if(state.quizMode) {
          state.quizMode = false;
          els.quiz.classList.remove('show');
        }
        nextFact();
      };

      els.bookmark.onclick = () => {
        const facts = filterFacts();
        if(facts[state.currentIndex]) toggleBookmark(facts[state.currentIndex]);
      };

      els.share.onclick = () => {
        const facts = filterFacts();
        if(facts[state.currentIndex]) shareFact(facts[state.currentIndex]);
      };

      els.speak.onclick = () => {
        const facts = filterFacts();
        if(facts[state.currentIndex]) speakFact(facts[state.currentIndex]);
      };

      els.details.onclick = () => {
        const facts = filterFacts();
        if(facts[state.currentIndex]) showDetails(facts[state.currentIndex]);
      };

      els.daily.onclick = () => {
        if(state.dailyFact) showFact(state.dailyFact);
      };

      els.exportFavs.onclick = exportFavorites;

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if(e.target.tagName === 'INPUT') return;
        if(e.code === 'Space') { e.preventDefault(); els.next.click(); }
        if(e.key.toLowerCase() === 'b') els.bookmark.click();
        if(e.key.toLowerCase() === 's') els.share.click();
        if(e.key.toLowerCase() === 'r') els.speak.click();
        if(e.key.toLowerCase() === 'q') {
          const facts = filterFacts();
          if(facts[state.currentIndex]) startQuiz(facts[state.currentIndex]);
        }
      });

      // Init
      updateStreak();
      state.dailyFact = getDailyFact();
      els.dailyText.textContent = state.dailyFact.t;
      updateStats();
      renderFavorites();
      nextFact();
    })();
  </script>
</div>

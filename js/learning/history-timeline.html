        {id:8, year:'2014', title:'APS Peshawar Attack', desc:'Terrorist attack on Army Public School Peshawar killed 149 people, mostly children.', fact:'This tragedy led to the formation of the National Action Plan against terrorism.', tags:['pakistan','tragedy'], era:'contemporary', cat:'pakistan'},
        {id:9, year:'2018', title:'First Democratic Transition', desc:'Pakistan completed its first democratic transition of power between civilian governments.', fact:'This marked a significant milestone in Pakistan\'s democratic journey.', tags:['pakistan','democracy'], era:'contemporary', cat:'pakistan'},
        {id:10, year:'2022', title:'Devastating Floods', desc:'Unprecedented monsoon floods affected 33 million people across Pakistan.', fact:'The floods caused over $30 billion in damages and highlighted climate change impacts.', tags:['pakistan','climate','disaster'], era:'contemporary', cat:'pakistan'},
        
        // 🏛️ ANCIENT HISTORY (-3000 BCE to 500 CE)
        {id:11, year:'-3100', title:'Unification of Egypt', desc:'King Narmer unified Upper and Lower Egypt, establishing the First Dynasty.', fact:'The Narmer Palette, discovered in 1898, depicts this unification.', tags:['world','ancient','egypt'], era:'ancient', cat:'world'},
        {id:12, year:'-2600', title:'Indus Valley Civilization', desc:'One of the world\'s earliest urban civilizations flourished in modern-day Pakistan and India.', fact:'Mohenjo-daro and Harappa had advanced drainage systems and urban planning.', tags:['pakistan','ancient','civilization'], era:'ancient', cat:'pakistan'},
        {id:13, year:'-2560', title:'Great Pyramid Completed', desc:'The Great Pyramid of Giza was completed as a tomb for Pharaoh Khufu.', fact:'It remained the tallest man-made structure for over 3,800 years.', tags:['world','ancient','egypt'], era:'ancient', cat:'culture'},
        {id:14, year:'-1200', title:'Trojan War (Legendary)', desc:'Legendary war between Greeks and Trojans, basis for Homer\'s Iliad.', fact:'Archaeological evidence suggests a real conflict at Hisarlik, Turkey around this time.', tags:['world','ancient','war'], era:'ancient', cat:'war'},
        {id:15, year:'-500', title:'Buddha\'s Enlightenment', desc:'Siddhartha Gautama attained enlightenment and founded Buddhism.', fact:'Buddhism would later spread across Asia, becoming one of the world\'s major religions.', tags:['world','ancient','religion'], era:'ancient', cat:'culture'},
        {id:16, year:'-326', title:'Alexander in Pakistan', desc:'Alexander the Great reached the Indus River, fighting King Porus at the Battle of Hydaspes.', fact:'Despite losing, Porus impressed Alexander so much he was reinstated as ruler.', tags:['pakistan','ancient','war'], era:'ancient', cat:'war'},
        {id:17, year:'-260', title:'Ashoka\'s Conversion', desc:'Emperor Ashoka converted to Buddhism after the bloody Kalinga War.', fact:'Ashoka\'s edicts, carved on rocks and pillars, spread across the Indian subcontinent.', tags:['world','ancient','religion'], era:'ancient', cat:'culture'},
        {id:18, year:'-44', title:'Assassination of Julius Caesar', desc:'Roman dictator Julius Caesar was assassinated by senators on the Ides of March.', fact:'His death led to the end of the Roman Republic and rise of the Roman Empire.', tags:['world','ancient','politics'], era:'ancient', cat:'world'},
        
        // 🏰 MEDIEVAL HISTORY (500-1500 CE)
        {id:19, year:'622', title:'Hijra - Islamic Calendar Begins', desc:'Prophet Muhammad migrated from Mecca to Medina, marking year 1 of Islamic calendar.', fact:'The Hijra is considered the beginning of the Muslim community (Ummah).', tags:['world','medieval','religion'], era:'medieval', cat:'culture'},
        {id:20, year:'711', title:'Arab Conquest of Sindh', desc:'Muhammad bin Qasim conquered Sindh, bringing Islam to the Indian subcontinent.', fact:'This established the first Muslim rule in South Asia, influencing culture for centuries.', tags:['pakistan','medieval','islam'], era:'medieval', cat:'pakistan'},
        {id:21, year:'1000', title:'Ghaznavid Empire', desc:'Mahmud of Ghazni established an empire spanning parts of modern Afghanistan, Pakistan, and India.', fact:'Mahmud conducted 17 raids into India, notably plundering the Somnath temple.', tags:['pakistan','medieval','empire'], era:'medieval', cat:'pakistan'},
        {id:22, year:'1206', title:'Delhi Sultanate Founded', desc:'Qutb-ud-din Aibak established the Delhi Sultanate, beginning Muslim rule in North India.', fact:'The Qutub Minar in Delhi was started during his reign.', tags:['world','medieval','empire'], era:'medieval', cat:'world'},
        {id:23, year:'1219', title:'Mongol Invasion', desc:'Genghis Khan\'s Mongols invaded Central Asia, reaching the Indus River.', fact:'The Mongol invasions reshaped the political landscape of Asia for centuries.', tags:['world','medieval','war'], era:'medieval', cat:'war'},
        {id:24, year:'1398', title:'Timur Invades India', desc:'Turkic conqueror Timur (Tamerlane) sacked Delhi, causing massive destruction.', fact:'Timur\'s invasion weakened the Delhi Sultanate, paving way for future powers.', tags:['world','medieval','war'], era:'medieval', cat:'war'},
        {id:25, year:'1492', title:'Columbus Reaches Americas', desc:'Christopher Columbus landed in the Caribbean, opening European colonization of the Americas.', fact:'This event marked the beginning of the Columbian Exchange of goods, people, and ideas.', tags:['world','medieval','exploration'], era:'medieval', cat:'world'},
        
        // 🔫 MODERN HISTORY (1500-1900)
        {id:26, year:'1526', title:'Battle of Panipat - Mughal Empire', desc:'Babur defeated Ibrahim Lodi, establishing the Mughal Empire in India.', fact:'The Mughals would rule much of the subcontinent for over 300 years.', tags:['pakistan','modern','empire'], era:'modern', cat:'pakistan'},
        {id:27, year:'1600', title:'British East India Company', desc:'Company received royal charter, beginning British commercial presence in India.', fact:'What started as trade would evolve into colonial rule over the subcontinent.', tags:['pakistan','modern','colonial'], era:'modern', cat:'pakistan'},
        {id:28, year:'1757', title:'Battle of Plassey', desc:'British East India Company defeated Nawab of Bengal, beginning political control in India.', fact:'This battle is considered the start of British colonial rule in India.', tags:['world','modern','colonial'], era:'modern', cat:'world'},
        {id:29, year:'1857', title:'War of Independence (Sepoy Mutiny)', desc:'Major uprising against British rule in India, involving soldiers and civilians.', fact:'Though suppressed, it led to the end of Company rule and direct British Crown control.', tags:['pakistan','modern','war'], era:'modern', cat:'war'},
        {id:30, year:'1876', title:'Quaid-e-Azam Born', desc:'Muhammad Ali Jinnah, founder of Pakistan, was born in Karachi.', fact:'Jinnah would later be honored as Quaid-e-Azam (Great Leader) for his role in creating Pakistan.', tags:['pakistan','modern','biography'], era:'modern', cat:'pakistan'},
        {id:31, year:'1885', title:'Indian National Congress Founded', desc:'Political party established to seek greater Indian participation in government.', fact:'The INC would later lead the independence movement under Gandhi and Nehru.', tags:['world','modern','politics'], era:'modern', cat:'world'},
        {id:32, year:'1906', title:'All-India Muslim League', desc:'Political party founded to protect Muslim interests in British India.', fact:'The League would later demand and achieve the creation of Pakistan.', tags:['pakistan','modern','politics'], era:'modern', cat:'pakistan'},
        
        // 🚀 CONTEMPORARY HISTORY (1900-Present)
        {id:33, year:'1916', title:'Lucknow Pact', desc:'Congress and Muslim League agreed on constitutional reforms and separate electorates.', fact:'This temporary Hindu-Muslim unity was significant but short-lived.', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        {id:34, year:'1930', title:'Allahabad Address', desc:'Allama Iqbal proposed the idea of a separate Muslim state in northwestern India.', fact:'Iqbal\'s vision laid the philosophical foundation for Pakistan.', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        {id:35, year:'1940', title:'Lahore Resolution', desc:'Muslim League formally demanded independent states for Muslims in northwestern India.', fact:'March 23 is now celebrated as Pakistan Day (Yaum-e-Pakistan).', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        {id:36, year:'1945', title:'End of World War II', desc:'Allied victory over Axis powers; atomic bombs dropped on Japan.', fact:'The war\'s end accelerated decolonization movements worldwide, including in South Asia.', tags:['world','contemporary','war'], era:'contemporary', cat:'war'},
        {id:37, year:'1947', title:'Partition of India', desc:'British India divided into independent dominions of India and Pakistan.', fact:'Partition caused one of history\'s largest migrations and tragic communal violence.', tags:['pakistan','contemporary','independence'], era:'contemporary', cat:'pakistan'},
        {id:38, year:'1948', title:'Death of Quaid-e-Azam', desc:'Muhammad Ali Jinnah, founder of Pakistan, passed away in Karachi.', fact:'Jinnah\'s death just a year after independence was a major blow to the new nation.', tags:['pakistan','contemporary','biography'], era:'contemporary', cat:'pakistan'},
        {id:39, year:'1957', title:'Sputnik Launch', desc:'Soviet Union launched the first artificial satellite, beginning the Space Age.', fact:'Sputnik sparked the Space Race between USA and USSR.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:40, year:'1969', title:'Moon Landing', desc:'Apollo 11 mission landed Neil Armstrong and Buzz Aldrin on the Moon.', fact:'Armstrong\'s words: "That\'s one small step for man, one giant leap for mankind."', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:41, year:'1971', title:'Internet Born (ARPANET)', desc:'First email sent; foundations of modern internet established.', fact:'The internet would revolutionize communication, commerce, and society globally.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:42, year:'1989', title:'Fall of Berlin Wall', desc:'Symbolic end of Cold War; wall dividing East and West Berlin demolished.', fact:'The fall led to German reunification and the collapse of Soviet influence in Eastern Europe.', tags:['world','contemporary','politics'], era:'contemporary', cat:'world'},
        {id:43, year:'1991', title:'Dissolution of USSR', desc:'Soviet Union officially dissolved, ending the Cold War era.', fact:'15 independent nations emerged from the former Soviet Union.', tags:['world','contemporary','politics'], era:'contemporary', cat:'world'},
        {id:44, year:'2001', title:'9/11 Terror Attacks', desc:'Terrorist attacks on USA changed global politics and security forever.', fact:'Led to the War on Terror, affecting Pakistan\'s foreign policy significantly.', tags:['world','contemporary','war'], era:'contemporary', cat:'war'},
        {id:45, year:'2007', title:'iPhone Launch', desc:'Apple introduced the iPhone, revolutionizing mobile technology.', fact:'Smartphones would transform how humans communicate, work, and access information.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:46, year:'2015', title:'Paris Climate Agreement', desc:'196 countries agreed to limit global warming to well below 2°C.', fact:'Pakistan is particularly vulnerable to climate change impacts like floods and heatwaves.', tags:['world','contemporary','environment'], era:'contemporary', cat:'world'},
        {id:47, year:'2020', title:'COVID-19 Pandemic', desc:'Global health crisis affected every country, changing daily life worldwide.', fact:'Pakistan implemented one of the world\'s largest social protection programs during lockdowns.', tags:['world','contemporary','health'], era:'contemporary', cat:'world'},
        {id:48, year:'2022', title:'AI Revolution Accelerates', desc:'Large language models and generative AI transform technology and society.', fact:'AI is reshaping industries from healthcare to education globally.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        
        // 🌐 MORE WORLD EVENTS
        {id:49, year:'-5000', title:'Agriculture Developed', desc:'Humans began farming, leading to settled civilizations.', fact:'The Neolithic Revolution changed human society forever.', tags:['world','ancient','culture'], era:'ancient', cat:'culture'},
        {id:50, year:'-3000', title:'Writing Invented', desc:'Cuneiform in Mesopotamia and hieroglyphs in Egypt emerged.', fact:'Writing enabled record-keeping, literature, and the spread of knowledge.', tags:['world','ancient','culture'], era:'ancient', cat:'culture'},
        {id:51, year:'-500', title:'Democracy in Athens', desc:'First known democratic system established in ancient Athens.', fact:'Athenian democracy was direct, with citizens voting on laws themselves.', tags:['world','ancient','politics'], era:'ancient', cat:'world'},
        {id:52, year:'-27', title:'Roman Empire Founded', desc:'Augustus became first Roman Emperor, beginning the Imperial period.', fact:'The Roman Empire would last nearly 500 years in the West.', tags:['world','ancient','empire'], era:'ancient', cat:'world'},
        {id:53, year:'476', title:'Fall of Western Rome', desc:'Last Western Roman Emperor deposed, marking end of ancient Rome.', fact:'This event is often used to mark the beginning of the Middle Ages.', tags:['world','medieval','empire'], era:'medieval', cat:'world'},
        {id:54, year:'632', title:'Death of Prophet Muhammad', desc:'Founder of Islam passed away; Islamic expansion continued under Caliphs.', fact:'Within 100 years, Islamic rule stretched from Spain to India.', tags:['world','medieval','religion'], era:'medieval', cat:'culture'},
        {id:55, year:'1066', title:'Norman Conquest of England', desc:'William the Conqueror defeated King Harold at Battle of Hastings.', fact:'The conquest transformed English language, culture, and governance.', tags:['world','medieval','war'], era:'medieval', cat:'war'},
        {id:56, year:'1215', title:'Magna Carta Signed', desc:'English nobles forced King John to sign charter limiting royal power.', fact:'Magna Carta became a foundation for constitutional law and human rights.', tags:['world','medieval','politics'], era:'medieval', cat:'world'},
        {id:57, year:'1347', title:'Black Death Pandemic', desc:'Bubonic plague killed an estimated 75-200 million people across Eurasia.', fact:'The pandemic killed 30-60% of Europe\'s population, transforming society.', tags:['world','medieval','health'], era:'medieval', cat:'world'},
        {id:58, year:'1453', title:'Fall of Constantinople', desc:'Ottoman Turks captured Byzantine capital, ending the Roman Empire.', fact:'Greek scholars fleeing to Europe helped spark the Renaissance.', tags:['world','medieval','war'], era:'medieval', cat:'war'},
        {id:59, year:'1492', title:'Reconquista Completed', desc:'Christian forces captured Granada, ending Muslim rule in Spain.', fact:'The same year, Columbus sailed west seeking a route to Asia.', tags:['world','medieval','war'], era:'medieval', cat:'war'},
        {id:60, year:'1517', title:'Protestant Reformation Begins', desc:'Martin Luther posted 95 Theses, challenging Catholic Church practices.', fact:'The Reformation split Western Christianity and sparked religious wars.', tags:['world','modern','religion'], era:'modern', cat:'culture'},
        {id:61, year:'1687', title:'Newton\'s Principia', desc:'Isaac Newton published laws of motion and universal gravitation.', fact:'Newton\'s work laid the foundation for classical physics for 200+ years.', tags:['world','modern','science'], era:'modern', cat:'science'},
        {id:62, year:'1776', title:'American Declaration of Independence', desc:'Thirteen colonies declared independence from Britain.', fact:'The American Revolution inspired democratic movements worldwide.', tags:['world','modern','politics'], era:'modern', cat:'world'},
        {id:63, year:'1789', title:'French Revolution Begins', desc:'Storming of the Bastille marked start of revolutionary change in France.', fact:'The revolution introduced concepts of liberty, equality, and fraternity.', tags:['world','modern','politics'], era:'modern', cat:'world'},
        {id:64, year:'1804', title:'Napoleon Crowns Himself Emperor', desc:'Napoleon Bonaparte declared himself Emperor of the French.', fact:'Napoleon\'s conquests spread revolutionary ideas across Europe.', tags:['world','modern','war'], era:'modern', cat:'war'},
        {id:65, year:'1859', title:'Darwin\'s Origin of Species', desc:'Charles Darwin published theory of evolution by natural selection.', fact:'Darwin\'s work revolutionized biology and our understanding of life.', tags:['world','modern','science'], era:'modern', cat:'science'},
        {id:66, year:'1903', title:'Wright Brothers First Flight', desc:'First powered, controlled airplane flight at Kitty Hawk, North Carolina.', fact:'Aviation would transform warfare, travel, and global connectivity.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:67, year:'1914', title:'World War I Begins', desc:'Assassination of Archduke Franz Ferdinand triggered global conflict.', fact:'WWI introduced trench warfare, tanks, and chemical weapons.', tags:['world','contemporary','war'], era:'contemporary', cat:'war'},
        {id:68, year:'1928', title:'Penicillin Discovered', desc:'Alexander Fleming discovered the first antibiotic, revolutionizing medicine.', fact:'Penicillin has saved hundreds of millions of lives since its discovery.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:69, year:'1939', title:'World War II Begins', desc:'Germany invaded Poland, triggering the deadliest conflict in history.', fact:'WWII resulted in 70-85 million deaths and reshaped the global order.', tags:['world','contemporary','war'], era:'contemporary', cat:'war'},
        {id:70, year:'1945', title:'United Nations Founded', desc:'International organization established to promote peace and cooperation.', fact:'The UN now has 193 member states and addresses global challenges.', tags:['world','contemporary','politics'], era:'contemporary', cat:'world'},
        {id:71, year:'1955', title:'Civil Rights Movement Gains Momentum', desc:'Rosa Parks\' arrest sparked Montgomery Bus Boycott in USA.', fact:'The movement led to landmark civil rights legislation in the 1960s.', tags:['world','contemporary','politics'], era:'contemporary', cat:'world'},
        {id:72, year:'1963', title:'Martin Luther King Jr.\'s "I Have a Dream"', desc:'Iconic speech delivered during March on Washington for civil rights.', fact:'The speech is considered one of the greatest in American history.', tags:['world','contemporary','politics'], era:'contemporary', cat:'culture'},
        {id:73, year:'1969', title:'First Internet Message Sent', desc:'ARPANET transmitted first message between UCLA and Stanford.', fact:'This humble beginning led to the global internet we use today.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:74, year:'1981', title:'First Space Shuttle Launch', desc:'Columbia became first reusable spacecraft to reach orbit.', fact:'The Shuttle program flew 135 missions over 30 years.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:75, year:'1990', title:'World Wide Web Invented', desc:'Tim Berners-Lee created the WWW at CERN, revolutionizing information access.', fact:'The web made the internet accessible to billions of people worldwide.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:76, year:'2001', title:'Wikipedia Launched', desc:'Free online encyclopedia created, changing how knowledge is shared.', fact:'Wikipedia now has over 60 million articles in 300+ languages.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:77, year:'2004', title:'Facebook Founded', desc:'Social media platform launched, transforming online communication.', fact:'Facebook (Meta) now has nearly 3 billion monthly active users.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:78, year:'2008', title:'Global Financial Crisis', desc:'Major economic downturn triggered by housing market collapse.', fact:'The crisis led to significant reforms in global financial regulation.', tags:['world','contemporary','economy'], era:'contemporary', cat:'world'},
        {id:79, year:'2010', title:'Arab Spring Begins', desc:'Protests in Tunisia sparked democratic uprisings across Middle East.', fact:'The movements led to regime changes in several countries.', tags:['world','contemporary','politics'], era:'contemporary', cat:'world'},
        {id:80, year:'2016', title:'First Detection of Gravitational Waves', desc:'LIGO confirmed Einstein\'s prediction of ripples in spacetime.', fact:'This opened a new window for observing the universe.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        
        // 🎨 CULTURE & INNOVATION
        {id:81, year:'-400', title:'Socrates\' Philosophy', desc:'Greek philosopher developed method of questioning to seek truth.', fact:'Socrates\' ideas were preserved by his student Plato.', tags:['world','ancient','culture'], era:'ancient', cat:'culture'},
        {id:82, year:'-200', title:'Great Wall Construction', desc:'Chinese states began building fortifications against northern invasions.', fact:'The Great Wall stretches over 13,000 miles across northern China.', tags:['world','ancient','culture'], era:'ancient', cat:'culture'},
        {id:83, year:'800', title:'Charlemagne Crowned Emperor', desc:'Frankish king crowned Holy Roman Emperor by Pope Leo III.', fact:'Charlemagne\'s reign sparked the Carolingian Renaissance.', tags:['world','medieval','culture'], era:'medieval', cat:'culture'},
        {id:84, year:'1000', title:'Vikings Reach North America', desc:'Leif Erikson and Norse explorers landed in Newfoundland.', fact:'This occurred nearly 500 years before Columbus\' voyage.', tags:['world','medieval','exploration'], era:'medieval', cat:'world'},
        {id:85, year:'1440', title:'Gutenberg Printing Press', desc:'Johannes Gutenberg invented movable type printing in Europe.', fact:'The printing press enabled mass production of books and spread of ideas.', tags:['world','modern','science'], era:'modern', cat:'science'},
        {id:86, year:'1543', title:'Heliocentric Theory Published', desc:'Copernicus proposed that Earth revolves around the Sun.', fact:'This challenged the geocentric view held for over 1,000 years.', tags:['world','modern','science'], era:'modern', cat:'science'},
        {id:87, year:'1609', title:'Galileo\'s Telescope', desc:'Galileo Galilei used telescope to observe moons of Jupiter.', fact:'His observations supported the heliocentric model of the solar system.', tags:['world','modern','science'], era:'modern', cat:'science'},
        {id:88, year:'1765', title:'Steam Engine Improved', desc:'James Watt\'s improvements made steam power practical for industry.', fact:'The steam engine powered the Industrial Revolution.', tags:['world','modern','science'], era:'modern', cat:'science'},
        {id:89, year:'1837', title:'Telegraph Invented', desc:'Samuel Morse developed practical electrical telegraph system.', fact:'The telegraph enabled near-instant communication across long distances.', tags:['world','modern','science'], era:'modern', cat:'science'},
        {id:90, year:'1876', title:'Telephone Patented', desc:'Alexander Graham Bell received patent for the telephone.', fact:'The telephone revolutionized personal and business communication.', tags:['world','modern','science'], era:'modern', cat:'science'},
        {id:91, year:'1901', title:'First Nobel Prizes Awarded', desc:'Alfred Nobel\'s will established prizes for human achievement.', fact:'Nobel Prizes remain the most prestigious awards in multiple fields.', tags:['world','contemporary','culture'], era:'contemporary', cat:'culture'},
        {id:92, year:'1923', title:'Disney Founded', desc:'Walt Disney founded the company that would define animation.', fact:'Disney\'s innovations transformed entertainment and storytelling.', tags:['world','contemporary','culture'], era:'contemporary', cat:'culture'},
        {id:93, year:'1954', title:'First Nuclear Power Plant', desc:'Obninsk in USSR became first plant to generate electricity from nuclear fission.', fact:'Nuclear power now provides about 10% of global electricity.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:94, year:'1961', title:'First Human in Space', desc:'Yuri Gagarin orbited Earth aboard Vostok 1.', fact:'Gagarin\'s flight lasted 108 minutes and made him a global hero.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:95, year:'1975', title:'First Personal Computer', desc:'Altair 8800 sparked the microcomputer revolution.', fact:'The PC would eventually be in nearly every home and office.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:96, year:'1989', title:'World Wide Web Proposed', desc:'Tim Berners-Lee submitted proposal for information management system.', fact:'The WWW is now used by over 5 billion people worldwide.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:97, year:'1995', title:'Amazon Founded', desc:'Jeff Bezos started online bookstore that became e-commerce giant.', fact:'Amazon now dominates online retail and cloud computing.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:98, year:'2005', title:'YouTube Launched', desc:'Video-sharing platform founded, transforming media consumption.', fact:'YouTube now has over 2 billion logged-in monthly users.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:99, year:'2011', title:'Arab Spring Social Media', desc:'Twitter and Facebook played key role in organizing protests.', fact:'Social media\'s political impact became undeniable.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        {id:100, year:'2020', title:'mRNA Vaccines Developed', desc:'First mRNA vaccines authorized for COVID-19, a scientific breakthrough.', fact:'mRNA technology could revolutionize treatment for many diseases.', tags:['world','contemporary','science'], era:'contemporary', cat:'science'},
        
        // 🇵🇰 MORE PAKISTAN EVENTS
        {id:101, year:'1929', title:'Allama Iqbal\'s Allahabad Address', desc:'Poet-philosopher proposed separate Muslim state in northwestern India.', fact:'Iqbal is considered the spiritual father of Pakistan.', tags:['pakistan','modern','politics'], era:'modern', cat:'pakistan'},
        {id:102, year:'1933', title:'Name "Pakistan" Coined', desc:'Choudhry Rahmat Ali proposed name for Muslim homeland.', fact:'"Pakistan" means "Land of the Pure" in Urdu and Persian.', tags:['pakistan','modern','politics'], era:'modern', cat:'pakistan'},
        {id:103, year:'1949', title:'Objective Resolution', desc:'Constituent Assembly passed resolution defining Pakistan\'s Islamic character.', fact:'This resolution later became preamble to Pakistan\'s constitutions.', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        {id:104, year:'1958', title:'First Martial Law', desc:'President Iskander Mirza abrogated constitution; Ayub Khan took power.', fact:'This began a pattern of military interventions in Pakistani politics.', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        {id:105, year:'1962', title:'Mangla Dam Completed', desc:'One of world\'s largest earth-filled dams built on Jhelum River.', fact:'Mangla Dam provides irrigation and hydroelectric power to Pakistan.', tags:['pakistan','contemporary','science'], era:'contemporary', cat:'science'},
        {id:106, year:'1974', title:'Second Islamic Summit in Lahore', desc:'38 Muslim leaders gathered; Pakistan recognized Bangladesh.', fact:'The summit strengthened Pakistan\'s leadership in the Muslim world.', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        {id:107, year:'1977', title:'Operation Fair Play', desc:'Military coup led by General Zia-ul-Haq overthrew elected government.', fact:'Zia\'s rule lasted 11 years and profoundly shaped modern Pakistan.', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        {id:108, year:'1988', title:'Benazir Bhutto Elected PM', desc:'First woman to lead a Muslim-majority nation became Pakistan\'s PM.', fact:'Bhutto\'s election was a milestone for women\'s political participation.', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        {id:109, year:'1999', title:'Kargil Conflict', desc:'Military confrontation between India and Pakistan in Kashmir region.', fact:'The conflict ended with Pakistan withdrawing forces under international pressure.', tags:['pakistan','contemporary','war'], era:'contemporary', cat:'war'},
        {id:110, year:'2008', title:'Democratic Transition', desc:'First time in Pakistan\'s history an elected government completed its term.', fact:'This marked progress in Pakistan\'s democratic development.', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        {id:111, year:'2010', title:'18th Constitutional Amendment', desc:'Major reforms devolved powers from federal to provincial governments.', fact:'The amendment strengthened Pakistan\'s federal parliamentary system.', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        {id:112, year:'2013', title:'First Peaceful Power Transfer', desc:'One elected government handed power to another after elections.', fact:'This was a significant milestone for Pakistani democracy.', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        {id:113, year:'2015', title:'China-Pakistan Economic Corridor', desc:'$62 billion infrastructure project announced under Belt and Road Initiative.', fact:'CPEC aims to transform Pakistan\'s economy through infrastructure development.', tags:['pakistan','contemporary','economy'], era:'contemporary', cat:'pakistan'},
        {id:114, year:'2019', title:'Kartarpur Corridor Opened', desc:'Visa-free border crossing for Sikh pilgrims to Gurdwara Darbar Sahib.', fact:'The corridor symbolizes hope for peace between India and Pakistan.', tags:['pakistan','contemporary','culture'], era:'contemporary', cat:'culture'},
        {id:115, year:'2021', title:'Afghan Taliban Takeover', desc:'Taliban regained control of Afghanistan after US withdrawal.', fact:'The development has major implications for Pakistan\'s security and foreign policy.', tags:['pakistan','contemporary','politics'], era:'contemporary', cat:'pakistan'},
        
        // 🎲 BONUS MIXED EVENTS
        {id:116, year:'-2500', title:'Wheel Invented', desc:'First wheels used for pottery, later adapted for transportation.', fact:'The wheel is considered one of humanity\'s most important inventions.', tags:['world','ancient','science'], era:'ancient', cat:'science'},
        {id:117, year:'-1200', title:'Iron Age Begins', desc:'Iron smelting technology spread, replacing bronze tools and weapons.', fact:'Iron tools were stronger and cheaper, transforming agriculture and warfare.', tags:['world','ancient','science'], era:'ancient', cat:'science'},
        {id:118, year:'100', title:'Paper Invented in China', desc:'Cai Lun improved papermaking process using mulberry bark and rags.', fact:'Paper enabled the spread of literacy and bureaucracy across civilizations.', tags:['world','ancient','science'], era:'ancient', cat:'science'},
        {id:119, year:'600', title:'Zero Concept Developed', desc:'Indian mathematicians formalized the concept of zero as a number.', fact:'Zero revolutionized mathematics and enabled advanced calculations.', tags:['world','medieval','science'], era:'medieval', cat:'science'},
        {id:120, year:'1200', title:'Compass for Navigation', desc:'Magnetic compass adopted for maritime navigation in Europe.', fact:'The compass enabled the Age of Exploration and global trade.', tags:['world','medieval','science'], era:'medieval', cat:'science'}
      ];

      // ====== STATE MANAGEMENT ======
      const state = {
        search: '',
        category: 'all',
        era: 'all',
        bookmarks: JSON.parse(localStorage.getItem('ht-bookmarks') || '[]'),
        currentModal: null,
        filteredEvents: []
      };

      // ====== DOM ELEMENTS ======
      const els = {
        timeline: document.getElementById('ht-timeline'),
        search: document.getElementById('ht-search'),
        filterToggle: document.getElementById('ht-filter-toggle'),
        filterPanel: document.getElementById('ht-filter-panel'),
        catBtns: document.querySelectorAll('.ht-cat-btn'),
        eraBtns: document.querySelectorAll('.ht-era-btn'),
        empty: document.getElementById('ht-empty'),
        total: document.getElementById('ht-total'),
        bookmarks: document.getElementById('ht-bookmarks'),
        pakistanCount: document.getElementById('ht-pakistan-count'),
        worldCount: document.getElementById('ht-world-count'),
        warCount: document.getElementById('ht-war-count'),
        scienceCount: document.getElementById('ht-science-count'),
        modal: document.getElementById('ht-modal'),
        modalClose: document.getElementById('m-close'),
        mYear: document.getElementById('m-year'),
        mTitle: document.getElementById('m-title'),
        mTags: document.getElementById('m-tags'),
        mDesc: document.getElementById('m-desc'),
        mFact: document.getElementById('m-fact'),
        mRelated: document.getElementById('m-related'),
        mRelatedList: document.getElementById('m-related-list'),
        mBookmark: document.getElementById('m-bookmark'),
        mShare: document.getElementById('m-share'),
        mCopy: document.getElementById('m-copy')
      };

      // ====== CATEGORY CONFIG ======
      const catConfig = {
        pakistan: { icon: '🇵🇰', color: '#16a34a' },
        world: { icon: '🌐', color: '#3b82f6' },
        war: { icon: '⚔️', color: '#dc2626' },
        science: { icon: '🔬', color: '#06b6d4' },
        culture: { icon: '🎨', color: '#ec4899' }
      };

      // ====== UTILITIES ======
      const getEra = (year) => {
        const y = parseInt(year.replace('-', ''));
        if(year.startsWith('-')) return y > 3000 ? 'ancient' : y > 500 ? 'ancient' : 'ancient';
        if(y < 500) return 'ancient';
        if(y < 1500) return 'medieval';
        if(y < 1900) return 'modern';
        return 'contemporary';
      };

      const filterEvents = () => {
        let filtered = [...events];
        
        // Search filter
        if(state.search) {
          const s = state.search.toLowerCase();
          filtered = filtered.filter(e => 
            e.year.toLowerCase().includes(s) ||
            e.title.toLowerCase().includes(s) ||
            e.desc.toLowerCase().includes(s) ||
            e.tags.some(t => t.includes(s))
          );
        }
        
        // Category filter
        if(state.category !== 'all') {
          filtered = filtered.filter(e => e.cat === state.category);
        }
        
        // Era filter
        if(state.era !== 'all') {
          filtered = filtered.filter(e => e.era === state.era);
        }
        
        // Sort by year (handle BCE)
        filtered.sort((a, b) => {
          const ay = parseInt(a.year.replace('-', '')) * (a.year.startsWith('-') ? -1 : 1);
          const by = parseInt(b.year.replace('-', '')) * (b.year.startsWith('-') ? -1 : 1);
          return by - ay; // Newest first
        });
        
        return filtered;
      };

      const updateStats = () => {
        els.total.textContent = events.length;
        els.bookmarks.textContent = state.bookmarks.length;
        els.pakistanCount.textContent = events.filter(e => e.cat === 'pakistan').length;
        els.worldCount.textContent = events.filter(e => e.cat === 'world').length;
        els.warCount.textContent = events.filter(e => e.cat === 'war').length;
        els.scienceCount.textContent = events.filter(e => e.cat === 'science').length;
      };

      const createEventCard = (event) => {
        const div = document.createElement('div');
        div.className = `ht-event ${event.cat} ${event.era}`;
        div.dataset.id = event.id;
        
        const tags = event.tags.map(t => {
          const cfg = catConfig[t] || { icon: '', color: '' };
          return `<span class="ht-tag ${t}">${cfg.icon} ${t}</span>`;
        }).join('');
        
        const isBookmarked = state.bookmarks.includes(event.id);
        
        div.innerHTML = `
          <div class="ht-event-header">
            <span class="ht-year">${event.year}</span>
            <span class="ht-title">${event.title}</span>
          </div>
          <div class="ht-tags">${tags}</div>
          <div class="ht-desc">${event.desc}</div>
          <div class="ht-actions">
            <button class="ht-action-btn ${isBookmarked ? 'bookmarked' : ''}" data-action="bookmark">
              ${isBookmarked ? '🔖 Saved' : '🔖 Bookmark'}
            </button>
            <button class="ht-action-btn" data-action="share">📤 Share</button>
            <button class="ht-action-btn" data-action="details">📖 Details</button>
          </div>
        `;
        
        // Toggle expand
        div.querySelector('.ht-event-header').onclick = (e) => {
          if(!e.target.closest('button')) {
            div.classList.toggle('open');
          }
        };
        
        // Action buttons
        div.querySelectorAll('.ht-action-btn').forEach(btn => {
          btn.onclick = (e) => {
            e.stopPropagation();
            handleAction(event, btn.dataset.action);
          };
        });
        
        return div;
      };

      const render = () => {
        state.filteredEvents = filterEvents();
        els.timeline.innerHTML = '';
        
        if(state.filteredEvents.length === 0) {
          els.empty.style.display = 'block';
          els.timeline.style.display = 'none';
          return;
        }
        
        els.empty.style.display = 'none';
        els.timeline.style.display = 'block';
        
        state.filteredEvents.forEach(event => {
          els.timeline.appendChild(createEventCard(event));
        });
        
        updateStats();
      };

      const handleAction = (event, action) => {
        switch(action) {
          case 'bookmark':
            toggleBookmark(event.id);
            render();
            break;
          case 'share':
            shareEvent(event);
            break;
          case 'details':
            showModal(event);
            break;
        }
      };

      const toggleBookmark = (id) => {
        const idx = state.bookmarks.indexOf(id);
        if(idx > -1) {
          state.bookmarks.splice(idx, 1);
        } else {
          state.bookmarks.push(id);
        }
        localStorage.setItem('ht-bookmarks', JSON.stringify(state.bookmarks));
        updateStats();
      };

      const shareEvent = async (event) => {
        const text = `📅 ${event.year}: ${event.title}\n\n${event.desc}\n\n💡 ${event.fact}`;
        if(navigator.share) {
          try {
            await navigator.share({ title: 'History Timeline', text });
          } catch(e) {}
        } else {
          await navigator.clipboard.writeText(text);
          alert('✅ Event details copied to clipboard!');
        }
      };

      const showModal = (event) => {
        state.currentModal = event;
        els.mYear.textContent = event.year;
        els.mTitle.textContent = event.title;
        els.mDesc.textContent = event.desc;
        els.mFact.textContent = `💡 ${event.fact}`;
        
        // Tags
        els.mTags.innerHTML = event.tags.map(t => {
          const cfg = catConfig[t] || { icon: '', color: '' };
          return `<span class="ht-tag ${t}">${cfg.icon} ${t}</span>`;
        }).join('');
        
        // Related events
        const related = events.filter(e => 
          e.id !== event.id && 
          (e.cat === event.cat || e.era === event.era)
        ).slice(0, 4);
        
        if(related.length > 0) {
          els.mRelated.style.display = 'block';
          els.mRelatedList.innerHTML = related.map(r => 
            `<div class="ht-related-item" data-id="${r.id}"><strong>${r.year}:</strong> ${r.title}</div>`
          ).join('');
          els.mRelatedList.querySelectorAll('.ht-related-item').forEach(item => {
            item.onclick = () => {
              const rel = events.find(e => e.id === parseInt(item.dataset.id));
              if(rel) showModal(rel);
            };
          });
        } else {
          els.mRelated.style.display = 'none';
        }
        
        // Bookmark button state
        const isBookmarked = state.bookmarks.includes(event.id);
        els.mBookmark.textContent = isBookmarked ? '🔖 Saved' : '🔖 Bookmark';
        els.mBookmark.classList.toggle('bookmarked', isBookmarked);
        
        els.modal.classList.add('show');
      };

      const closeModal = () => {
        els.modal.classList.remove('show');
        state.currentModal = null;
      };

      // ====== EVENT LISTENERS ======
      els.search.oninput = (e) => {
        state.search = e.target.value;
        render();
      };
      
      els.filterToggle.onclick = () => {
        els.filterPanel.style.display = els.filterPanel.style.display === 'none' ? 'flex' : 'none';
      };
      
      els.catBtns.forEach(btn => {
        btn.onclick = () => {
          els.catBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.category = btn.dataset.filter;
          render();
        };
      });
      
      els.eraBtns.forEach(btn => {
        btn.onclick = () => {
          els.eraBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.era = btn.dataset.era;
          render();
        };
      });
      
      // Modal
      els.modalClose.onclick = closeModal;
      els.modal.onclick = (e) => { if(e.target === els.modal) closeModal(); };
      
      els.mBookmark.onclick = () => {
        if(state.currentModal) {
          toggleBookmark(state.currentModal.id);
          els.mBookmark.textContent = state.bookmarks.includes(state.currentModal.id) ? '🔖 Saved' : '🔖 Bookmark';
          els.mBookmark.classList.toggle('bookmarked', state.bookmarks.includes(state.currentModal.id));
          updateStats();
        }
      };
      
      els.mShare.onclick = () => {
        if(state.currentModal) shareEvent(state.currentModal);
      };
      
      els.mCopy.onclick = async () => {
        if(state.currentModal) {
          const e = state.currentModal;
          const text = `${e.year}: ${e.title}\n\n${e.desc}\n\n💡 ${e.fact}`;
          await navigator.clipboard.writeText(text);
          els.mCopy.textContent = '✅ Copied!';
          setTimeout(() => els.mCopy.textContent = '📋 Copy Text', 2000);
        }
      };
      
      // Keyboard
      document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape' && els.modal.classList.contains('show')) closeModal();
      });
      
      // Initialize
      updateStats();
      render();
    })();
  </script>
</div>

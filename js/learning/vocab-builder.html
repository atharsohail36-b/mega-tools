        // Hard - Literary/Academic

        // More words for variety...
        {id:16, word:"Alacrity", pos:"n", def:"Brisk and cheerful readiness.", example:"She accepted the challenge with alacrity.", diff:"medium", cat:"academic", synonyms:["eagerness","willingness","enthusiasm"], antonyms:["reluctance","hesitation","sluggishness"], etymology:"Latin alacritas = liveliness", quiz:{q:"Doing something with alacrity means:", opts:["Very slowly","With cheerful eagerness","With great difficulty","Without thinking"], a:1}},
        {id:17, word:"Cacophony", pos:"n", def:"A harsh, discordant mixture of sounds.", example:"The cacophony of car horns made it impossible to concentrate.", diff:"medium", cat:"literary", synonyms:["din","racket","discord"], antonyms:["harmony","silence","melody"], etymology:"Greek kakos = bad + phone = sound", quiz:{q:"A cacophony is:", opts:["Beautiful music","Harsh noise","Complete silence","A type of bird"], a:1}},
        {id:18, word:"Debilitate", pos:"v", def:"To make someone weak or infirm.", example:"The illness debilitated him for several weeks.", diff:"medium", cat:"daily", synonyms:["weaken","enfeeble","cripple"], antonyms:["strengthen","invigorate","empower"], etymology:"Latin debilitare = to weaken", quiz:{q:"If something debilitates you, it:", opts:["Makes you stronger","Makes you weaker","Makes you happier","Makes you richer"], a:1}},
        {id:19, word:"Ephemeral", pos:"adj", def:"Lasting for a very short time.", example:"The ephemeral beauty of cherry blossoms reminds us to appreciate the moment.", diff:"easy", cat:"literary", synonyms:["fleeting","transient","momentary"], antonyms:["permanent","lasting","enduring"], etymology:"Greek ephēmeros = lasting a day", quiz:{q:"Ephemeral things:", opts:["Last forever","Last briefly","Are very large","Are very expensive"], a:1}},
        {id:20, word:"Fastidious", pos:"adj", def:"Very attentive to and concerned about accuracy and detail.", example:"She was fastidious about keeping her workspace organized.", diff:"hard", cat:"business", synonyms:["meticulous","punctilious","particular"], antonyms:["sloppy","careless","negligent"], etymology:"Latin fastidium = loathing, squeamishness", quiz:{q:"A fastidious person is:", opts:["Very messy","Extremely detail-oriented","Always late","Never prepared"], a:1}}
      ];

      // ====== STATE ======
      const state = {
        words: [],
        currentIndex: 0,
        mastered: JSON.parse(localStorage.getItem('vb-mastered') || '[]'),
        reviewQueue: JSON.parse(localStorage.getItem('vb-review') || '[]'),
        customWords: JSON.parse(localStorage.getItem('vb-custom') || '[]'),
        stats: JSON.parse(localStorage.getItem('vb-stats') || '{sessions:0,accuracy:0,streak:0,lastVisit:""}'),
        filters: { search: '', diff: 'all', cat: 'all' },
        quizMode: false,
        currentQuiz: null
      };

      // ====== DOM ======
      const els = {
        word: document.getElementById('vb-word'),
        pos: document.getElementById('vb-pos'),
        def: document.getElementById('vb-def'),
        example: document.getElementById('vb-example'),
        synonyms: document.getElementById('vb-synonyms'),
        antonyms: document.getElementById('vb-antonyms'),
        etymology: document.getElementById('vb-etymology'),
        diffBadge: document.getElementById('vb-diff-badge'),
        card: document.getElementById('vb-card'),
        review: document.getElementById('vb-review'),
        know: document.getElementById('vb-know'),
        speak: document.getElementById('vb-speak'),
        quizBtn: document.getElementById('vb-quiz-btn'),
        search: document.getElementById('vb-search'),
        diffFilter: document.getElementById('vb-diff-filter'),
        catFilter: document.getElementById('vb-cat-filter'),
        statsToggle: document.getElementById('vb-stats-toggle'),
        statsPanel: document.getElementById('vb-stats-panel'),
        addWord: document.getElementById('vb-add-word'),
        modal: document.getElementById('vb-modal'),
        modalClose: document.getElementById('vb-modal-close'),
        cancelAdd: document.getElementById('vb-cancel-add'),
        saveWord: document.getElementById('vb-save-word'),
        quiz: document.getElementById('vb-quiz'),
        quizQuestion: document.getElementById('vb-quiz-question'),
        quizOptions: document.getElementById('vb-quiz-options'),
        // Stats displays
        mastered: document.getElementById('vb-mastered'),
        remaining: document.getElementById('vb-remaining'),
        streak: document.getElementById('vb-streak'),
        totalWords: document.getElementById('vb-total-words'),
        accuracy: document.getElementById('vb-accuracy'),
        sessions: document.getElementById('vb-sessions'),
        currentStreak: document.getElementById('vb-current-streak'),
        progress: document.getElementById('vb-progress')
      };

      // ====== UTILS ======
      const saveState = () => {
        localStorage.setItem('vb-mastered', JSON.stringify(state.mastered));
        localStorage.setItem('vb-review', JSON.stringify(state.reviewQueue));
        localStorage.setItem('vb-custom', JSON.stringify(state.customWords));
        localStorage.setItem('vb-stats', JSON.stringify(state.stats));
      };

      const getAllWords = () => {
        const all = [...wordsDB, ...state.customWords];
        // Filter by search
        if(state.filters.search) {
          const q = state.filters.search.toLowerCase();
          return all.filter(w => w.word.toLowerCase().includes(q) || w.def.toLowerCase().includes(q));
        }
        // Filter by difficulty
        if(state.filters.diff !== 'all') {
          return all.filter(w => w.diff === state.filters.diff);
        }
        // Filter by category
        if(state.filters.cat !== 'all') {
          return all.filter(w => w.cat === state.filters.cat);
        }
        return all;
      };

      const getReviewPriority = () => {
        // Leitner-style: review queue first, then unmastered
        if(state.reviewQueue.length > 0) {
          const id = state.reviewQueue.shift();
          saveState();
          return getAllWords().find(w => w.id === id) || getAllWords()[0];
        }
        const unmastered = getAllWords().filter(w => !state.mastered.includes(w.id));
        return unmastered[Math.floor(Math.random() * unmastered.length)] || null;
      };

      const updateStats = () => {
        const all = getAllWords();
        els.mastered.textContent = state.mastered.length;
        els.remaining.textContent = all.filter(w => !state.mastered.includes(w.id)).length;
        els.totalWords.textContent = all.length;
        els.accuracy.textContent = state.stats.accuracy + '%';
        els.sessions.textContent = state.stats.sessions;
        els.streak.textContent = state.stats.streak;
        els.currentStreak.textContent = state.stats.streak;
        
        const pct = state.mastered.length / Math.max(1, all.length) * 100;
        els.progress.style.width = `${pct}%`;
      };

      const updateStreak = () => {
        const today = new Date().toDateString();
        if(state.stats.lastVisit !== today) {
          const yesterday = new Date(Date.now() - 86400000).toDateString();
          state.stats.streak = state.stats.lastVisit === yesterday ? state.stats.streak + 1 : 1;
          state.stats.lastVisit = today;
          saveState();
          updateStats();
        }
      };

      const renderWord = (word) => {
        if(!word) {
          els.word.textContent = '🎉 All words mastered!';
          els.pos.textContent = '';
          els.def.textContent = 'Add more words or reset progress to continue.';
          els.example.textContent = '';
          els.synonyms.innerHTML = '';
          els.antonyms.innerHTML = '';
          els.etymology.textContent = '';
          els.diffBadge.style.display = 'none';
          return;
        }
        
        els.diffBadge.style.display = 'inline-flex';
        els.diffBadge.textContent = `🟢🟡🔴`.split('')[['easy','medium','hard'].indexOf(word.diff)] + ' ' + word.diff.charAt(0).toUpperCase() + word.diff.slice(1);
        els.diffBadge.className = `vb-difficulty ${word.diff}`;
        
        els.word.textContent = word.word;
        els.pos.textContent = word.pos;
        els.def.textContent = word.def;
        els.example.textContent = `"${word.example}"`;
        els.synonyms.innerHTML = word.synonyms?.map(s => `<span class="vb-tag syn">${s}</span>`).join('') || '';
        els.antonyms.innerHTML = word.antonyms?.map(a => `<span class="vb-tag ant">${a}</span>`).join('') || '';
        els.etymology.textContent = word.etymology ? `📜 ${word.etymology}` : '';
        
        // Reset card flip
        els.card.classList.remove('flipped');
        
        // Update progress
        const all = getAllWords();
        const idx = all.findIndex(w => w.id === word.id);
        const pct = ((idx + 1) / all.length) * 100;
        els.progress.style.width = `${pct}%`;
      };

      const nextWord = () => {
        const word = getReviewPriority();
        state.currentWord = word;
        renderWord(word);
      };

      const markMastered = (word) => {
        if(!word || state.mastered.includes(word.id)) return;
        state.mastered.push(word.id);
        state.stats.accuracy = Math.round((state.mastered.length / Math.max(1, getAllWords().length)) * 100);
        state.stats.sessions++;
        saveState();
        updateStats();
        triggerConfetti();
        nextWord();
      };

      const markReview = (word) => {
        if(!word) return;
        // Add to review queue with spacing
        const nextReview = Date.now() + 24 * 60 * 60 * 1000; // 1 day later
        state.reviewQueue.push(word.id);
        saveState();
        nextWord();
      };

      const pronounceWord = (word) => {
        if(!word || !('speechSynthesis' in window)) {
          alert('🔊 Text-to-speech not supported in this browser.');
          return;
        }
        const utterance = new SpeechSynthesisUtterance(word.word);
        utterance.lang = 'en-US';
        utterance.rate = 0.8;
        speechSynthesis.speak(utterance);
      };

      const startQuiz = (word) => {
        if(!word?.quiz) {
          alert('🧠 No quiz available for this word.');
          return;
        }
        state.quizMode = true;
        state.currentQuiz = word;
        
        els.quizQuestion.textContent = word.quiz.q;
        els.quizOptions.innerHTML = word.quiz.opts.map((opt, i) => 
          `<button class="vb-quiz-opt" data-idx="${i}">${opt}</button>`
        ).join('');
        
        els.quizOptions.querySelectorAll('.vb-quiz-opt').forEach(btn => {
          btn.onclick = () => handleQuizAnswer(btn, parseInt(btn.dataset.idx), word.quiz.a);
        });
        
        els.quiz.classList.add('show');
        els.card.style.display = 'none';
        els.review.style.display = 'none';
        els.know.style.display = 'none';
      };

      const handleQuizAnswer = (btn, selected, correct) => {
        els.quizOptions.querySelectorAll('.vb-quiz-opt').forEach(b => {
          b.disabled = true;
          if(parseInt(b.dataset.idx) === correct) b.classList.add('correct');
          if(parseInt(b.dataset.idx) === selected && selected !== correct) b.classList.add('wrong');
        });
        
        const result = document.createElement('div');
        result.className = `vb-quiz-result ${selected === correct ? 'pass' : 'fail'}`;
        result.textContent = selected === correct ? '🎉 Correct! Great job!' : `❌ Answer: ${state.currentQuiz.quiz.opts[correct]}`;
        els.quizOptions.appendChild(result);
        
        if(selected === correct) {
          markMastered(state.currentQuiz);
        }
        
        setTimeout(() => {
          state.quizMode = false;
          els.quiz.classList.remove('show');
          els.card.style.display = 'block';
          els.review.style.display = 'flex';
          els.know.style.display = 'flex';
          nextWord();
        }, 2500);
      };

      const triggerConfetti = () => {
        const colors = ['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6'];
        for(let i=0; i<25; i++) {
          const c = document.createElement('div');
          c.className = 'vb-confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          c.style.animationDelay = Math.random() * 2 + 's';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 3000);
        }
      };

      const addCustomWord = () => {
        const word = document.getElementById('vb-new-word').value.trim();
        const pos = document.getElementById('vb-new-pos').value.trim() || 'n';
        const def = document.getElementById('vb-new-def').value.trim();
        const example = document.getElementById('vb-new-example').value.trim();
        const diff = document.getElementById('vb-new-diff').value;
        const cat = document.getElementById('vb-new-cat').value;
        
        if(!word || !def) {
          alert('⚠️ Word and definition are required!');
          return;
        }
        
        const newWord = {
          id: Date.now(),
          word, pos, def, example: example || `"Use ${word} in a sentence."`,
          diff, cat,
          synonyms: [], antonyms: [], etymology: '',
          quiz: { q: `What does '${word}' mean?`, opts: [def, "Opposite meaning", "Unrelated term", "Another word"], a: 0 }
        };
        
        state.customWords.push(newWord);
        saveState();
        closeModal();
        nextWord();
        alert('✅ Word added successfully!');
      };

      const openModal = () => els.modal.classList.add('show');
      const closeModal = () => {
        els.modal.classList.remove('show');
        // Clear form
        ['vb-new-word','vb-new-pos','vb-new-def','vb-new-example'].forEach(id => {
          document.getElementById(id).value = '';
        });
      };

      // ====== EVENTS ======
      els.card.onclick = () => els.card.classList.toggle('flipped');
      
      els.review.onclick = () => markReview(state.currentWord);
      els.know.onclick = () => markMastered(state.currentWord);
      els.speak.onclick = () => pronounceWord(state.currentWord);
      els.quizBtn.onclick = () => startQuiz(state.currentWord);
      
      els.search.oninput = (e) => { state.filters.search = e.target.value; nextWord(); };
      els.diffFilter.onchange = (e) => { state.filters.diff = e.target.value; nextWord(); };
      els.catFilter.onchange = (e) => { state.filters.cat = e.target.value; nextWord(); };
      
      els.statsToggle.onclick = () => els.statsPanel.classList.toggle('show');
      
      els.addWord.onclick = openModal;
      els.modalClose.onclick = closeModal;
      els.cancelAdd.onclick = closeModal;
      els.saveWord.onclick = addCustomWord;
      
      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if(e.code === 'Space') { e.preventDefault(); els.card.classList.toggle('flipped'); }
        if(e.key === 'ArrowLeft') markReview(state.currentWord);
        if(e.key === 'ArrowRight') markMastered(state.currentWord);
        if(e.key.toLowerCase() === 'p') pronounceWord(state.currentWord);
        if(e.key.toLowerCase() === 'q') startQuiz(state.currentWord);
        if(e.key === 'Escape') { closeModal(); if(state.quizMode) { els.quiz.classList.remove('show'); els.card.style.display = 'block'; } }
      });

      // Init
      updateStreak();
      updateStats();
      nextWord();
    })();
  </script>
</div>

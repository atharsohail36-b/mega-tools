<div class="personality-test-pro">
  <style>
    .personality-test-pro {
      --pt-bg: #0f172a;
      --pt-card: #1e293b;
      --pt-input: #334155;
      --pt-text: #f1f5f9;
      --pt-text-secondary: #94a3b8;
      --pt-accent: #3b82f6;
      --pt-success: #10b981;
      --pt-error: #ef4444;
      --pt-warning: #f59e0b;
      --pt-info: #06b6d4;
      --pt-purple: #8b5cf6;
      --pt-pink: #ec4899;
      --pt-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --pt-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      
      max-width: 650px;
      margin: 0 auto;
      padding: 1rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--pt-text);
      background: var(--pt-bg);
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    
    .personality-test-pro::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: var(--pt-gradient);
      animation: pt-shimmer 3s infinite linear;
    }
    @keyframes pt-shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    
    /* Header */
    .pt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0.8rem 1rem;
      background: var(--pt-card);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .pt-title { font-size: 1.2rem; font-weight: 700; background: var(--pt-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 0.5rem; }
    .pt-counter { font-size: 0.9rem; color: var(--pt-text-secondary); font-weight: 500; }
    
    /* Progress */
    .pt-progress { margin-bottom: 1.5rem; }
    .pt-progress-bar { height: 6px; background: var(--pt-input); border-radius: 3px; overflow: hidden; }
    .pt-progress-fill { height: 100%; background: var(--pt-gradient); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
    .pt-progress-text { display: flex; justify-content: space-between; margin-top: 0.4rem; font-size: 0.8rem; color: var(--pt-text-secondary); }
    
    /* Quiz Container */
    .pt-quiz { animation: pt-fadeIn 0.4s ease; }
    @keyframes pt-fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .pt-question-box {
      background: var(--pt-card);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
      text-align: center;
    }
    .pt-question { font-size: 1.3rem; font-weight: 600; line-height: 1.4; min-height: 3.5rem; display: flex; align-items: center; justify-content: center; }
    
    /* Likert Scale */
    .pt-scale-container { margin: 1.5rem 0; }
    .pt-scale-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--pt-text-secondary); margin-bottom: 0.6rem; padding: 0 0.5rem; }
    .pt-scale { display: flex; gap: 0.6rem; justify-content: center; }
    .pt-option {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--pt-card);
      border: 2px solid rgba(255,255,255,0.15);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 1rem;
      transition: var(--pt-transition);
      position: relative;
    }
    .pt-option:hover { transform: scale(1.1); border-color: var(--pt-accent); background: rgba(59, 130, 246, 0.1); }
    .pt-option.selected {
      background: var(--pt-accent);
      border-color: var(--pt-accent);
      color: white;
      transform: scale(1.15);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
    }
    .pt-option.selected::after {
      content: '';
      position: absolute;
      bottom: -10px;
      width: 6px; height: 6px;
      background: var(--pt-accent);
      border-radius: 50%;
    }
    
    /* Navigation */
    .pt-nav { display: flex; gap: 0.8rem; justify-content: center; margin-top: 1rem; }
    .pt-btn {
      padding: 0.8rem 1.8rem;
      background: var(--pt-gradient);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: var(--pt-transition);
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.95rem;
    }
    .pt-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4); }
    .pt-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .pt-btn.secondary { background: var(--pt-card); border: 1px solid rgba(255,255,255,0.2); color: var(--pt-text); }
    .pt-btn.secondary:hover:not(:disabled) { background: rgba(255,255,255,0.1); transform: none; }
    
    /* Results Section */
    .pt-results { display: none; animation: pt-slideUp 0.5s ease; }
    .pt-results.show { display: block; }
    @keyframes pt-slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    
    .pt-result-header {
      text-align: center;
      padding: 1.5rem;
      background: var(--pt-card);
      border-radius: 16px;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .pt-archetype-icon { font-size: 3.5rem; margin-bottom: 0.5rem; display: block; }
    .pt-archetype-title { font-size: 1.8rem; font-weight: 700; margin: 0.5rem 0; background: var(--pt-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .pt-archetype-desc { color: var(--pt-text-secondary); line-height: 1.5; max-width: 90%; margin: 0 auto; }
    
    .pt-trait-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
    .pt-trait-item {
      background: var(--pt-card);
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .pt-trait-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    .pt-trait-name { font-weight: 600; font-size: 1.05rem; }
    .pt-trait-percent { font-weight: 700; color: var(--pt-accent); }
    .pt-trait-bar { height: 8px; background: var(--pt-input); border-radius: 4px; overflow: hidden; margin-bottom: 0.5rem; }
    .pt-trait-fill { height: 100%; border-radius: 4px; transition: width 1s ease-out; width: 0%; }
    .pt-trait-desc { font-size: 0.85rem; color: var(--pt-text-secondary); line-height: 1.4; }
    
    .pt-actions { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
    .pt-actions .pt-btn { flex: 1; min-width: 140px; justify-content: center; }
    
    /* Responsive */
    @media (max-width: 480px) {
      .personality-test-pro { padding: 0.8rem; border-radius: 16px; }
      .pt-question { font-size: 1.15rem; }
      .pt-option { width: 42px; height: 42px; font-size: 0.9rem; }
      .pt-archetype-title { font-size: 1.5rem; }
    }
  </style>

  <!-- Header -->
  <div class="pt-header">
    <div class="pt-title">🧠 Personality Test Pro</div>
    <div class="pt-counter" id="pt-counter">0 / 15</div>
  </div>

  <!-- Progress -->
  <div class="pt-progress">
    <div class="pt-progress-bar"><div class="pt-progress-fill" id="pt-progress-fill"></div></div>
    <div class="pt-progress-text"><span>Progress</span><span id="pt-percent">0%</span></div>
  </div>

  <!-- Quiz Container -->
  <div class="pt-quiz" id="pt-quiz">
    <div class="pt-question-box">
      <div class="pt-question" id="pt-question">Loading question...</div>
    </div>
    
    <div class="pt-scale-container">
      <div class="pt-scale-labels">
        <span>Strongly Disagree</span>
        <span>Neutral</span>
        <span>Strongly Agree</span>
      </div>
      <div class="pt-scale" id="pt-scale"></div>
    </div>
    
    <div class="pt-nav">
      <button class="pt-btn secondary" id="pt-prev" disabled>← Back</button>
      <button class="pt-btn" id="pt-next" disabled>Next →</button>
    </div>
  </div>

  <!-- Results Container -->
  <div class="pt-results" id="pt-results">
    <div class="pt-result-header">
      <span class="pt-archetype-icon" id="pt-icon">🌟</span>
      <div class="pt-archetype-title" id="pt-title">Analyzing...</div>
      <p class="pt-archetype-desc" id="pt-desc">Please wait while we generate your profile.</p>
    </div>
    
    <div class="pt-trait-list" id="pt-traits"></div>
    
    <div class="pt-actions">
      <button class="pt-btn" id="pt-share">📤 Share Results</button>
      <button class="pt-btn secondary" id="pt-retake">🔄 Retake Test</button>
    </div>
  </div>

  <script>
    (function(){
      // ====== DATA ======
      const questions = [
        { q: "You enjoy brainstorming wild, unconventional ideas.", t: "creative", rev: false },
        { q: "You prefer following a structured plan over improvising.", t: "creative", rev: true },
        { q: "You often find beauty in everyday things others overlook.", t: "creative", rev: false },
        
        { q: "You love solving complex puzzles and logical problems.", t: "logical", rev: false },
        { q: "You make decisions based on emotions rather than data.", t: "logical", rev: true },
        { q: "You enjoy analyzing how systems and processes work.", t: "logical", rev: false },
        
        { q: "You easily sense when someone is feeling down.", t: "empath", rev: false },
        { q: "You find it hard to cry during emotional movies.", t: "empath", rev: true },
        { q: "People often come to you for advice and comfort.", t: "empath", rev: false },
        
        { q: "You feel energized after spending time in large groups.", t: "social", rev: false },
        { q: "You prefer quiet evenings alone over going out.", t: "social", rev: true },
        { q: "You naturally take the lead in team discussions.", t: "social", rev: false },
        
        { q: "You always complete tasks well before deadlines.", t: "disciplined", rev: false },
        { q: "You often procrastinate until the last minute.", t: "disciplined", rev: true },
        { q: "You keep your workspace highly organized and tidy.", t: "disciplined", rev: false }
      ];

      const traits = {
        creative: { name: "🎨 Creative", color: "#8b5cf6", desc: "You have a vivid imagination, love exploring new possibilities, and thrive when given freedom to innovate." },
        logical: { name: "🧠 Logical", color: "#3b82f6", desc: "You approach challenges analytically, value evidence over opinion, and excel at breaking down complex problems." },
        empath: { name: "💚 Empathetic", color: "#10b981", desc: "You deeply understand others' emotions, prioritize harmony, and naturally offer compassion and support." },
        social: { name: "🤝 Social", color: "#f59e0b", desc: "You draw energy from interactions, communicate effortlessly, and naturally connect people together." },
        disciplined: { name: "📋 Disciplined", color: "#ef4444", desc: "You value structure, meet goals consistently, and maintain high standards of personal responsibility." }
      };

      const archetypes = {
        creative: { icon: "🌌", title: "The Visionary Creator", desc: "You see the world through a unique lens. Your mind constantly generates fresh ideas, and you thrive in environments that reward innovation and self-expression." },
        logical: { icon: "🔍", title: "The Strategic Analyst", desc: "You are a master of patterns and problem-solving. Your methodical approach and critical thinking make you highly effective in technical and strategic roles." },
        empath: { icon: "💖", title: "The Compassionate Guide", desc: "Your emotional intelligence is exceptional. You create safe spaces for others, resolve conflicts naturally, and lead with empathy and authenticity." },
        social: { icon: "🎭", title: "The Dynamic Connector", desc: "You are a natural communicator and motivator. Your charisma and people skills allow you to build strong networks and inspire teams effortlessly." },
        disciplined: { icon: "⚙️", title: "The Reliable Architect", desc: "You are the foundation of any successful project. Your consistency, organization, and relentless drive ensure that visions become reality." }
      };

      // ====== STATE ======
      const state = {
        current: 0,
        answers: new Array(questions.length).fill(null),
        scores: { creative: 0, logical: 0, empath: 0, social: 0, disciplined: 0 }
      };

      // ====== DOM ======
      const els = {
        quiz: document.getElementById('pt-quiz'),
        results: document.getElementById('pt-results'),
        question: document.getElementById('pt-question'),
        scale: document.getElementById('pt-scale'),
        prev: document.getElementById('pt-prev'),
        next: document.getElementById('pt-next'),
        counter: document.getElementById('pt-counter'),
        progressFill: document.getElementById('pt-progress-fill'),
        percent: document.getElementById('pt-percent'),
        icon: document.getElementById('pt-icon'),
        title: document.getElementById('pt-title'),
        desc: document.getElementById('pt-desc'),
        traitsList: document.getElementById('pt-traits'),
        share: document.getElementById('pt-share'),
        retake: document.getElementById('pt-retake')
      };

      // ====== FUNCTIONS ======
      const updateProgress = () => {
        const pct = (state.current / questions.length) * 100;
        els.progressFill.style.width = `${pct}%`;
        els.percent.textContent = `${Math.round(pct)}%`;
        els.counter.textContent = `${state.current} / ${questions.length}`;
      };

      const loadQuestion = () => {
        const q = questions[state.current];
        els.question.textContent = q.q;
        els.scale.innerHTML = '';
        
        // Create scale options 1-5
        for(let i=1; i<=5; i++){
          const btn = document.createElement('button');
          btn.className = 'pt-option' + (state.answers[state.current] === i ? ' selected' : '');
          btn.textContent = i;
          btn.onclick = () => selectAnswer(i);
          els.scale.appendChild(btn);
        }
        
        // Update nav buttons
        els.prev.disabled = state.current === 0;
        els.next.disabled = state.answers[state.current] === null;
        els.next.textContent = state.current === questions.length - 1 ? 'Finish ✅' : 'Next →';
        updateProgress();
      };

      const selectAnswer = (val) => {
        state.answers[state.current] = val;
        document.querySelectorAll('.pt-option').forEach((b,i) => b.classList.toggle('selected', i+1 === val));
        els.next.disabled = false;
      };

      const calculateResults = () => {
        const traitCounts = { creative: 0, logical: 0, empath: 0, social: 0, disciplined: 0 };
        
        questions.forEach((q, i) => {
          const ans = state.answers[i];
          if(ans === null) return;
          // Reverse scoring if needed
          const normalized = q.rev ? 6 - ans : ans;
          // Score range per question: 1-5 → maps to -2 to +2 relative to neutral (3)
          const weighted = normalized - 3; 
          state.scores[q.t] += weighted;
          traitCounts[q.t]++;
        });

        // Convert to 0-100%
        const maxPossible = 3 * 2; // 3 questions * max +2 per question
        const percentages = {};
        Object.keys(state.scores).forEach(t => {
          // Clamp between 0 and 100
          percentages[t] = Math.max(5, Math.min(95, 50 + (state.scores[t] / maxPossible) * 50));
        });

        return { scores: percentages, counts: traitCounts };
      };

      const showResults = () => {
        const { scores, counts } = calculateResults();
        
        // Find dominant trait
        let maxTrait = 'logical', maxVal = 0;
        Object.entries(scores).forEach(([t, v]) => { if(v > maxVal){ maxTrait = t; maxVal = v; }});
        
        const arch = archetypes[maxTrait];
        els.icon.textContent = arch.icon;
        els.title.textContent = arch.title;
        els.desc.textContent = arch.desc;
        
        // Render trait bars
        els.traitsList.innerHTML = '';
        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        
        sorted.forEach(([t, val], idx) => {
          const tr = traits[t];
          const item = document.createElement('div');
          item.className = 'pt-trait-item';
          item.innerHTML = `
            <div class="pt-trait-header">
              <span class="pt-trait-name" style="color:${tr.color}">${tr.name}</span>
              <span class="pt-trait-percent">${Math.round(val)}%</span>
            </div>
            <div class="pt-trait-bar"><div class="pt-trait-fill" style="background:${tr.color}" id="fill-${t}"></div></div>
            <div class="pt-trait-desc">${tr.desc}</div>
          `;
          els.traitsList.appendChild(item);
          
          // Animate bars after render
          setTimeout(() => { document.getElementById(`fill-${t}`).style.width = `${val}%`; }, 100 + idx * 150);
        });
        
        els.quiz.style.display = 'none';
        els.results.classList.add('show');
        document.querySelector('.pt-progress').style.display = 'none';
      };

      const shareResults = async () => {
        const { scores } = calculateResults();
        const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
        const text = `🧠 My Personality Profile:\n${sorted.map(([t,v]) => `${traits[t].name}: ${Math.round(v)}%`).join('\n')}\n\nTake the test yourself!`;
        
        try {
          if(navigator.share) await navigator.share({ title: 'Personality Test Results', text });
          else await navigator.clipboard.writeText(text);
          els.share.textContent = '✅ Copied!';
          setTimeout(() => els.share.textContent = '📤 Share Results', 2000);
        } catch(e) {}
      };

      const resetTest = () => {
        state.current = 0;
        state.answers.fill(null);
        Object.keys(state.scores).forEach(t => state.scores[t] = 0);
        els.results.classList.remove('show');
        els.quiz.style.display = 'block';
        document.querySelector('.pt-progress').style.display = 'block';
        loadQuestion();
      };

      // ====== EVENTS ======
      els.prev.onclick = () => { if(state.current > 0) { state.current--; loadQuestion(); }};
      els.next.onclick = () => {
        if(state.answers[state.current] === null) return;
        if(state.current < questions.length - 1) { state.current++; loadQuestion(); }
        else showResults();
      };
      els.share.onclick = shareResults;
      els.retake.onclick = resetTest;

      // Keyboard navigation
      document.addEventListener('keydown', (e) => {
        if(els.results.classList.contains('show')) return;
        if(e.key >= '1' && e.key <= '5') selectAnswer(parseInt(e.key));
        if(e.key === 'Enter' && !els.next.disabled) els.next.click();
        if(e.key === 'ArrowLeft' && !els.prev.disabled) els.prev.click();
        if(e.key === 'ArrowRight' && !els.next.disabled) els.next.click();
      });

      // Init
      loadQuestion();
    })();
  </script>
</div>

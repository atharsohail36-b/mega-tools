<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AbOmniTools | Professional Digital Toolkit</title>
  <meta name="description" content="102+ Professional Tools - Calculators, Finance, AI, Productivity & More. Free, Fast, Offline Ready.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ========== PROFESSIONAL THEME VARIABLES ========== */
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-tertiary: #1e293b;
      --bg-card: rgba(30, 41, 59, 0.8);
      --bg-card-hover: rgba(56, 189, 248, 0.1);
      
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      --accent-primary: #38bdf8;
      --accent-secondary: #8b5cf6;
      --accent-success: #10b981;
      --accent-warning: #f59e0b;
      --accent-danger: #f43f5e;
      
      --gradient-primary: linear-gradient(135deg, #6366f1, #38bdf8, #06b6d4);
      --gradient-subtle: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(56,189,248,0.1));
      
      --glass: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-border-strong: rgba(56, 189, 248, 0.3);
      
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 32px rgba(56, 189, 248, 0.3);
      
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      
      --radius: 16px;
      --radius-lg: 24px;
      --radius-full: 9999px;
      
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
      --font-heading: 'Plus Jakarta Sans', 'Inter', sans-serif;
      
      --z-navbar: 100;
      --z-dropdown: 101;
      --z-workspace: 200;
      --z-toast: 999;
      --z-confetti: 1000;
    }

    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --bg-card: rgba(255, 255, 255, 0.9);
      --bg-card-hover: rgba(56, 189, 248, 0.08);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --glass: rgba(255, 255, 255, 0.9);
      --glass-border: rgba(0, 0, 0, 0.08);
      --glass-border-strong: rgba(56, 189, 248, 0.4);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.18);
    }

    /* ========== RESET & BASE ========== */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    html {
      scroll-behavior: smooth;
      scroll-padding-top: 80px;
      -webkit-text-size-adjust: 100%;
    }
    
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
      transition: background var(--transition-smooth), color var(--transition-smooth);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    ::selection { background: var(--accent-primary); color: #000; }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--gradient-primary);
      border-radius: var(--radius-full);
      border: 2px solid var(--bg-primary);
    }
    
    /* Focus States */
    :focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--bg-primary), 0 0 0 4px var(--accent-primary);
      border-radius: 8px;
    }

    /* ========== BACKGROUND EFFECTS ========== */
    #bg-canvas {
      position: fixed; inset: 0; z-index: -2;
      pointer-events: none; opacity: 0.4;
    }
    
    .ambient-glow {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(56,189,248,0.12) 0%, transparent 50%);
      animation: glowPulse 20s ease-in-out infinite alternate;
    }
    
    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.9; }
    }

    /* ========== GLASS UTILITIES ========== */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      transition: var(--transition);
    }
    
    .glass-strong {
      background: var(--bg-secondary);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border-strong);
      box-shadow: var(--shadow-md);
    }
    
    .gradient-text {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    /* ========== APP LAYOUT ========== */
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ========== NAVBAR - COMPACT & PROFESSIONAL ========== */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: var(--z-navbar);
      border-bottom: 1px solid var(--glass-border);
      background: rgba(10, 14, 23, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: var(--transition);
    }
    
    [data-theme="light"] .navbar {
      background: rgba(248, 250, 252, 0.95);
    }
    
    .navbar.scrolled {
      padding: 0.6rem 1.5rem;
      box-shadow: var(--shadow-md);
      background: rgba(10, 14, 23, 0.98);
    }
    
    [data-theme="light"] .navbar.scrolled {
      background: rgba(248, 250, 252, 0.98);
    }
    
    .logo {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: default;
    }
    
    .logo span { color: var(--accent-primary); }
    
    .nav-center {
      position: relative;
      z-index: var(--z-dropdown);
    }
    
    .nav-btn {
      padding: 0.5rem 1rem;
      border: 1px solid transparent;
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    .nav-btn:hover, .nav-btn.active {
      color: var(--text-primary);
      background: var(--bg-card);
      border-color: var(--glass-border-strong);
    }
    
    .nav-btn.active {
      color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(56,189,248,0.2);
    }
    
    /* Dropdown Menu - Mobile Optimized */
    .dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      width: min(95vw, 420px);
      max-height: 70vh;
      overflow-y: auto;
      background: var(--bg-secondary);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 1rem;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      pointer-events: none;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }
    
    .nav-center:hover .dropdown-menu,
    .nav-center.open .dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
    
    .cat-group { margin-bottom: 0.75rem; }
    
    .cat-group h4 {
      color: var(--accent-primary);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 0.5rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--glass-border);
      font-weight: 600;
      font-family: var(--font-heading);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    .dropdown-item {
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.85rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      min-height: 36px;
    }
    
    .dropdown-item:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
      transform: translateX(4px);
    }
    
    .dropdown-item .icon { font-size: 1rem; }
    
    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .search-bar {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.85rem;
      border-radius: var(--radius-full);
      transition: var(--transition);
      min-width: 180px;
      border: 1px solid var(--glass-border);
      background: var(--bg-card);
    }
    
    .search-bar:focus-within {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(56,189,248,0.2);
      background: var(--bg-secondary);
    }
    
    .search-bar input {
      background: transparent;
      border: none;
      color: var(--text-primary);
      outline: none;
      width: 140px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .search-bar input::placeholder { color: var(--text-muted); }
    
    .search-bar:focus-within input { width: 180px; }
    
    .nav-icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      font-size: 1.1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .nav-icon-btn:hover {
      background: var(--accent-primary);
      color: #000;
      border-color: transparent;
      transform: scale(1.05);
    }

    /* ========== HERO SECTION ========== */
    .hero {
      text-align: center;
      padding: 4rem 1.5rem 3rem;
      position: relative;
    }
    
    .hero-content { max-width: 700px; margin: 0 auto; }
    
    .hero-title {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    
    .hero-subtitle {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 550px;
      margin: 0 auto 2rem;
      line-height: 1.6;
    }
    
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }
    
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1.5rem;
      border-radius: var(--radius);
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      min-width: 100px;
    }
    
    .stat-num {
      font-size: 2rem;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      font-family: var(--font-heading);
    }
    
    .stat-suffix {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent-primary);
      margin-left: -3px;
    }
    
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.4rem;
      font-weight: 500;
    }
    
    .cta-btn {
      padding: 0.9rem 2.2rem;
      border: none;
      border-radius: var(--radius-full);
      background: var(--gradient-primary);
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-heading);
    }
    
    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    /* ========== SECTIONS ========== */
    .section {
      padding: 2.5rem 1.5rem 3rem;
      position: relative;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--glass-border);
    }
    
    .section-header h2 {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ========== TOOLS GRID ========== */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }
    
    .tool-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 1.4rem;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid var(--glass-border);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 160px;
    }
    
    .tool-card:hover {
      border-color: var(--accent-primary);
      box-shadow: var(--shadow-md), var(--shadow-glow);
      transform: translateY(-3px);
      background: var(--bg-card-hover);
    }
    
    .tool-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      display: inline-block;
    }
    
    .tool-card h3 {
      margin: 0.4rem 0 0.3rem;
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.3;
      font-family: var(--font-heading);
    }
    
    .tool-card p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.5;
      flex-grow: 1;
    }
    
    .tool-badge {
      position: absolute;
      top: 0.8rem;
      right: 0.8rem;
      padding: 0.25rem 0.6rem;
      background: rgba(56, 189, 248, 0.15);
      border-radius: var(--radius-full);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent-primary);
    }
    
    .tool-card .meta {
      margin-top: auto;
      padding-top: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px dashed var(--glass-border);
    }

    /* ========== UTILITIES GRID ========== */
    .util-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.8rem;
    }
    
    .util-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1rem 0.75rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .util-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent-primary);
      background: var(--bg-card-hover);
      box-shadow: var(--shadow-sm);
    }
    
    .util-icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
    .util-title { font-weight: 500; font-size: 0.85rem; }

    /* ========== TOOL WORKSPACE ========== */
    .tool-workspace {
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 23, 0.98);
      backdrop-filter: blur(24px);
      z-index: var(--z-workspace);
      display: none;
      padding: 1rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    [data-theme="light"] .tool-workspace {
      background: rgba(248, 250, 252, 0.98);
    }
    
    .tool-workspace.active {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
    }
    
    .tool-content {
      width: 100%;
      max-width: 1200px;
      height: 92vh;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border);
      overflow: auto;
      padding: 1.5rem;
      box-shadow: var(--shadow-lg);
      position: relative;
      animation: scaleIn 0.3s ease;
    }
    
    @keyframes scaleIn {
      from { transform: scale(0.98); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .close-tool {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--bg-primary);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 1.4rem;
      transition: var(--transition);
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .close-tool:hover {
      background: var(--accent-danger);
      color: #fff;
      border-color: transparent;
      transform: rotate(90deg);
    }
    
    /* Skeleton Loader */
    .skeleton-loader { display: grid; gap: 1rem; padding: 1rem; }
    .skel-block {
      background: linear-gradient(90deg, var(--bg-card) 25%, rgba(255,255,255,0.1) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: skeletonPulse 1.5s infinite;
      border-radius: var(--radius);
    }
    @keyframes skeletonPulse {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skel-title { height: 28px; width: 60%; margin-bottom: 1rem; }
    .skel-line { height: 16px; width: 100%; margin-bottom: 0.6rem; }
    .skel-line:last-child { width: 85%; }

    /* ========== TOAST ========== */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      right: 1.5rem;
      z-index: var(--z-toast);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      pointer-events: none;
      max-width: 400px;
      margin: 0 auto;
    }
    
    .toast {
      background: var(--bg-secondary);
      border: 1px solid var(--glass-border);
      padding: 0.9rem 1.2rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      animation: slideIn 0.3s ease forwards;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      pointer-events: auto;
      backdrop-filter: blur(12px);
    }
    
    @keyframes slideIn {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    .toast-icon { font-size: 1.3rem; flex-shrink: 0; }
    .toast-msg { font-size: 0.9rem; color: var(--text-primary); font-weight: 500; }

    /* ========== CONFETTI ========== */
    #confetti-canvas {
      position: fixed; inset: 0; pointer-events: none;
      z-index: var(--z-confetti);
    }

    /* ========== ERROR BOX ========== */
    .error-box {
      text-align: center;
      padding: 2.5rem 1.5rem;
      color: var(--accent-danger);
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      max-width: 480px;
      margin: 2rem auto;
    }
    
    .error-box h3 {
      margin-bottom: 0.75rem;
      font-size: 1.3rem;
      font-family: var(--font-heading);
    }
    
    .error-box p { color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.95rem; }
    .error-box code {
      background: rgba(56,189,248,0.15);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9em;
      color: var(--accent-primary);
    }
    .error-box button {
      margin-top: 1.2rem;
      padding: 0.7rem 1.8rem;
      background: var(--gradient-primary);
      color: #000;
      border: none;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-weight: 600;
      transition: var(--transition);
      font-size: 0.95rem;
    }
    .error-box button:hover { transform: scale(1.03); }

    /* ========== RESPONSIVE - MOBILE FIRST ========== */
    
    /* Tablet & Below */
    @media (max-width: 992px) {
      .navbar { padding: 0.7rem 1.2rem; }
      .nav-center { order: 3; width: 100%; margin-top: 0.5rem; }
      .dropdown-menu {
        position: static;
        transform: none !important;
        width: 100%;
        max-height: 300px;
        grid-template-columns: repeat(2, 1fr);
        margin-top: 0.5rem;
      }
      .search-bar { min-width: 160px; }
      .search-bar input { width: 120px; }
      .search-bar:focus-within input { width: 160px; }
      .hero { padding: 3rem 1.2rem 2.5rem; }
      .hero-stats { gap: 1.5rem; }
      .stat-item { padding: 0.8rem 1.2rem; min-width: 90px; }
      .stat-num { font-size: 1.7rem; }
      .tools-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    }
    
    /* Mobile - 640px & Below */
    @media (max-width: 640px) {
      .navbar {
        padding: 0.6rem 1rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .logo { font-size: 1.25rem; }
      .nav-btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
        min-height: 32px;
      }
      .dropdown-menu {
        grid-template-columns: 1fr;
        padding: 0.75rem;
        max-height: 45vh;
      }
      .dropdown-item {
        padding: 0.45rem 0.6rem;
        font-size: 0.82rem;
        min-height: 34px;
      }
      .search-bar {
        width: 100%;
        min-width: auto;
        padding: 0.4rem 0.75rem;
        order: 2;
      }
      .search-bar input {
        width: 100%;
        font-size: 0.9rem;
      }
      .search-bar:focus-within input { width: 100%; }
      .nav-right {
        width: 100%;
        justify-content: center;
        gap: 0.4rem;
        order: 3;
      }
      .nav-icon-btn {
        width: 34px;
        height: 34px;
        font-size: 1rem;
      }
      .hero { padding: 2.5rem 1rem 2rem; }
      .hero-title { font-size: clamp(1.7rem, 7vw, 2.6rem); }
      .hero-subtitle { font-size: 1rem; }
      .hero-stats { gap: 1.2rem; }
      .stat-item { padding: 0.7rem 1rem; min-width: 85px; }
      .stat-num { font-size: 1.5rem; }
      .stat-suffix { font-size: 1rem; }
      .stat-label { font-size: 0.7rem; }
      .cta-btn {
        padding: 0.8rem 1.8rem;
        font-size: 0.95rem;
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }
      .section { padding: 2rem 1rem 2.5rem; }
      .section-header h2 { font-size: 1.25rem; }
      .tools-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 0 0.25rem;
      }
      .tool-card {
        padding: 1.2rem;
        min-height: 145px;
        border-radius: var(--radius);
      }
      .tool-icon { font-size: 1.7rem; margin-bottom: 0.6rem; }
      .tool-card h3 { font-size: 1rem; }
      .tool-card p { font-size: 0.85rem; }
      .util-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.7rem;
        padding: 0 0.25rem;
      }
      .util-card { padding: 0.8rem 0.6rem; }
      .util-icon { font-size: 1.3rem; }
      .util-title { font-size: 0.8rem; }
      .tool-workspace { padding: 0.75rem; }
      .tool-content {
        height: 94vh;
        padding: 1.2rem 1rem;
        border-radius: var(--radius);
      }
      .close-tool {
        width: 36px;
        height: 36px;
        font-size: 1.2rem;
        top: 0.75rem;
        right: 0.75rem;
      }
      .toast-container {
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
      }
      .toast { padding: 0.8rem 1rem; }
      .error-box {
        padding: 2rem 1.2rem;
        margin: 1.5rem;
        border-radius: var(--radius);
      }
      .error-box h3 { font-size: 1.15rem; }
      .error-box button {
        padding: 0.65rem 1.5rem;
        font-size: 0.9rem;
        width: 100%;
      }
      /* Touch Optimization */
      .tool-card, .util-card, .dropdown-item, .nav-btn, .cta-btn, .close-tool {
        min-height: 40px;
      }
      input, textarea, select { font-size: 16px !important; }
    }

    /* ========== ACCESSIBILITY ========== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="ambient-glow"></div>
  <canvas id="confetti-canvas"></canvas>

  <div id="app">
    <!-- ========== NAVBAR ========== -->
    <header class="navbar glass" id="navbar">
      <div class="logo">Ab<span>OmniTools</span></div>
      
      <div class="nav-center" id="tools-dropdown">
        <button class="nav-btn" id="tools-btn">🛠️ Tools ▾</button>
        <div class="dropdown-menu glass-strong" id="dropdown-menu"></div>
      </div>
      
      <div class="nav-right">
        <div class="search-bar glass">
          <span>🔍</span>
          <input type="text" id="tool-search" placeholder="Search..." autocomplete="off">
        </div>
        <button class="nav-icon-btn" id="theme-toggle" aria-label="Toggle theme">🌓</button>
      </div>
    </header>

    <!-- ========== HERO ========== -->
    <section class="hero">
      <div class="hero-content">
        <h1 class="hero-title">Professional <span class="gradient-text">Digital Toolkit</span></h1>
        <p class="hero-subtitle">102+ powerful tools for productivity, finance, AI & more. Free, fast, and offline-ready.</p>
        
        <div class="hero-stats">
          <div class="stat-item">
            <span class="stat-num" data-target="102">0</span><span class="stat-suffix">+</span>
            <span class="stat-label">Tools</span>
          </div>
          <div class="stat-item">
            <span class="stat-num" data-target="0">0</span><span class="stat-suffix">₹</span>
            <span class="stat-label">Free</span>
          </div>
          <div class="stat-item">
            <span class="stat-num" data-target="100">0</span><span class="stat-suffix">%</span>
            <span class="stat-label">Offline</span>
          </div>
        </div>
        
        <button class="cta-btn" id="explore-btn">
          <span>Explore Tools</span>
          <span>→</span>
        </button>
      </div>
    </section>

    <!-- ========== FEATURED TOOLS ========== -->
    <main class="section" id="featured-section">
      <div class="section-header">
        <h2>🔥 Trending</h2>
      </div>
      <div class="tools-grid" id="tools-grid"></div>
    </main>

    <!-- ========== UTILITIES ========== -->
    <section class="section" id="utilities-section">
      <div class="section-header">
        <h2>🔧 Quick Links</h2>
      </div>
      <div class="util-grid" id="util-grid"></div>
    </section>

    <!-- ========== TOOL WORKSPACE ========== -->
    <div class="tool-workspace" id="tool-workspace">
      <button class="close-tool" id="close-tool" aria-label="Close">✕</button>
      <div class="tool-content" id="tool-content"></div>
    </div>

    <!-- ========== TOAST ========== -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <!-- ========== JAVASCRIPT ========== -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Live Server Check
      if(window.location.protocol === 'file:') {
        document.body.innerHTML = `<div class="error-box"><h3>🚨 Live Server Required</h3><p>Browsers block fetch() on local files. Use VS Code Live Server extension.</p><button onclick="location.reload()">Reload</button></div>`;
        return;
      }

      // ========== DATA ==========
      const categories = [
        { id: 'calculators', name: 'Calculators', icon: '🧮' },
        { id: 'student', name: 'Student', icon: '🎓' },
        { id: 'professional', name: 'Professional', icon: '💼' },
        { id: 'ai-tech', name: 'AI & Tech', icon: '🤖' },
        { id: 'finance', name: 'Finance', icon: '💰' },
        { id: 'productivity', name: 'Productivity', icon: '⚡' }
      ];

      const toolFiles = {
        calculators: ['basic','scientific','percentage','bmi','age','emi','compound-interest','gpa','tax','discount'],
        student: ['citation-generator','word-counter','pomodoro-timer','flashcard-maker','exam-planner','grade-predictor','assignment-tracker','resume-builder','formula-sheet','translator'],
        professional: ['invoice-generator','payroll-calc','break-even','roi-calculator','gantt-chart','meeting-agenda','email-templates','swot-maker','profit-margin','business-name-gen'],
        'ai-tech': ['ai-prompt-gen','image-prompt-helper','code-formatter','json-beautifier','password-checker','hash-generator','base64-tool','qr-code-gen','api-tester','ai-directory'],
        finance: ['sip-calculator','retirement-planner','budget-planner','debt-payoff','inflation-calc','net-worth','dividend-calc','forex-checker','crypto-converter','stock-tracker'],
        productivity: ['todo-list','habit-tracker','markdown-notes','color-palette','font-pairing','lorem-ipsum','random-generator','countdown-timer','focus-sounds','screen-size-calc']
      };

      const utilityLinks = [
        { id: 'about', name: 'About', icon: 'ℹ️' },
        { id: 'contact', name: 'Contact', icon: '📞' },
        { id: 'privacy', name: 'Privacy', icon: '🔒' },
        { id: 'favorites', name: 'Favorites', icon: '⭐' }
      ];

      // ========== ELEMENTS ==========
      const dropdownMenu = document.getElementById('dropdown-menu');
      const dropdownWrapper = document.getElementById('tools-dropdown');
      const grid = document.getElementById('tools-grid');
      const utilGrid = document.getElementById('util-grid');
      const searchInput = document.getElementById('tool-search');
      const workspace = document.getElementById('tool-workspace');
      const toolContent = document.getElementById('tool-content');
      const closeBtn = document.getElementById('close-tool');
      const toastContainer = document.getElementById('toast-container');
      const navbar = document.getElementById('navbar');
      const themeToggle = document.getElementById('theme-toggle');

      // ========== DROPDOWN ==========
      const buildDropdown = () => {
        dropdownMenu.innerHTML = '';
        categories.forEach(cat => {
          const group = document.createElement('div');
          group.className = 'cat-group';
          group.innerHTML = `<h4><span class="icon">${cat.icon}</span>${cat.name}</h4>`;
          
          toolFiles[cat.id].forEach((file, i) => {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.innerHTML = `<span class="icon">${cat.icon}</span>${file.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}`;
            item.onclick = () => {
              loadTool(`js/${cat.id}/${file}.html`, item.textContent);
              dropdownWrapper.classList.remove('open');
            };
            group.appendChild(item);
          });
          dropdownMenu.appendChild(group);
        });
      };
      buildDropdown();
      
      dropdownWrapper.addEventListener('click', e => {
        e.stopPropagation();
        dropdownWrapper.classList.toggle('open');
      });
      document.addEventListener('click', () => dropdownWrapper.classList.remove('open'));

      // ========== UTILITIES ==========
      utilityLinks.forEach(u => {
        const card = document.createElement('div');
        card.className = 'util-card';
        card.innerHTML = `<div class="util-icon">${u.icon}</div><div class="util-title">${u.name}</div>`;
        card.onclick = () => loadTool(`js/utilities/${u.id}.html`, u.name);
        utilGrid.appendChild(card);
      });

      // ========== TOOLS GRID ==========
      const renderGrid = (q='') => {
        grid.innerHTML = '';
        const trend = [];
        categories.forEach(c => toolFiles[c.id].slice(0,2).forEach(f => trend.push({cat:c.id, file:f})));
        const filtered = q ? trend.filter(t => t.file.toLowerCase().includes(q.toLowerCase())) : trend;
        
        if(filtered.length === 0) {
          grid.innerHTML = `<div class="error-box" style="grid-column:1/-1"><h3>🔍 No Results</h3><p>Try different keywords.</p></div>`;
          return;
        }
        
        filtered.forEach((t, i) => {
          const c = categories.find(x => x.id === t.cat);
          const name = t.file.replace(/-/g,' ').replace(/\b\w/g,x=>x.toUpperCase());
          const card = document.createElement('div');
          card.className = 'tool-card';
          card.innerHTML = `
            <span class="tool-badge">${c.name}</span>
            <span class="tool-icon">${c.icon}</span>
            <h3>${name}</h3>
            <p>Quick ${c.name.toLowerCase()} utility.</p>
            <div class="meta"><span>Popular</span><span>→</span></div>
          `;
          card.onclick = () => loadTool(`js/${c.id}/${t.file}.html`, name);
          grid.appendChild(card);
        });
      };
      renderGrid();
      searchInput.addEventListener('input', e => renderGrid(e.target.value));

      // ========== SKELETON ==========
      const skeletonHTML = `<div class="skeleton-loader"><div class="skel-block skel-title"></div><div class="skel-block skel-line"></div><div class="skel-block skel-line" style="width:85%"></div></div>`;

      // ========== TOAST ==========
      window.showToast = (message, type='info') => {
        const toast = document.createElement('div');
        toast.className = 'toast';
        const icons = { info:'ℹ️', success:'✅', error:'❌', warning:'⚠️' };
        toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><span class="toast-msg">${message}</span>`;
        toastContainer.appendChild(toast);
        setTimeout(()=>{ toast.style.opacity='0'; setTimeout(()=>toast.remove(),300); }, 4000);
      };

      // ========== TOOL LOADER ==========
      const loadTool = async (path, title) => {
        workspace.classList.add('active');
        document.body.style.overflow = 'hidden';
        toolContent.innerHTML = skeletonHTML;
        
        try {
          const res = await fetch(path);
          if(!res.ok) throw new Error(`HTTP ${res.status}`);
          const html = await res.text();
          
          const contentDiv = document.createElement('div');
          contentDiv.innerHTML = html;
          contentDiv.querySelectorAll('script').forEach(s => s.remove());
          toolContent.innerHTML = contentDiv.innerHTML;
          
          // Execute scripts
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          doc.querySelectorAll('script').forEach(s => {
            const ns = document.createElement('script');
            if(s.src) ns.src = s.src; else ns.textContent = s.textContent;
            document.body.appendChild(ns);
          });
          
          if(typeof window.fireConfetti === 'function') window.fireConfetti();
          showToast('✅ Tool loaded', 'success');
        } catch(e) {
          console.error(e);
          toolContent.innerHTML = `<div class="error-box"><h3>🚧 Load Failed</h3><p>${e.message}</p><p style="color:var(--text-secondary)">Check if <code>${path}</code> exists.</p><button onclick="document.getElementById('close-tool').click()">Close</button></div>`;
        }
      };

      const closeWorkspace = () => {
        workspace.classList.remove('active');
        document.body.style.overflow = '';
        toolContent.innerHTML = '';
      };

      closeBtn.addEventListener('click', closeWorkspace);
      document.addEventListener('keydown', e => {
        if(e.key === 'Escape' && workspace.classList.contains('active')) closeWorkspace();
      });

      document.getElementById('explore-btn').onclick = () =>
        document.getElementById('featured-section').scrollIntoView({behavior:'smooth'});

      // ========== THEME ==========
      const applyTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('ab-theme', theme);
        themeToggle.textContent = theme === 'light' ? '☀️' : '🌓';
      };
      
      themeToggle.onclick = () => {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = current === 'light' ? 'dark' : 'light';
        applyTheme(next);
        showToast(next === 'light' ? '☀️ Light mode' : '🌙 Dark mode');
      };
      
      const savedTheme = localStorage.getItem('ab-theme');
      if(savedTheme) applyTheme(savedTheme);
      else {
        const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        applyTheme(prefersLight ? 'light' : 'dark');
      }

      // ========== COUNTERS ==========
      setTimeout(()=>{
        document.querySelectorAll('.stat-num').forEach(c => {
          const target = +c.dataset.target;
          if(!target) return;
          let cur = 0, step = target/100;
          const run = () => {
            cur += step;
            if(cur < target) { c.textContent = Math.ceil(cur); requestAnimationFrame(run); }
            else c.textContent = target;
          };
          run();
        });
      }, 500);

      // ========== PARTICLES ==========
      const cvs = document.getElementById('bg-canvas'), ctx = cvs.getContext('2d');
      let particles = [];
      
      const resize = () => { cvs.width = innerWidth; cvs.height = innerHeight; };
      window.onresize = resize; resize();
      
      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * cvs.width;
          this.y = Math.random() * cvs.height;
          this.s = Math.random() * 1.8 + 0.4;
          this.vx = (Math.random()-0.5)*0.3;
          this.vy = (Math.random()-0.5)*0.3;
          this.o = Math.random()*0.5+0.2;
        }
        update() {
          this.x += this.vx; this.y += this.vy;
          if(this.x<-10||this.x>cvs.width+10||this.y<-10||this.y>cvs.height+10) this.reset();
        }
        draw() {
          ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2);
          ctx.fillStyle = `rgba(56,189,248,${this.o})`; ctx.fill();
        }
      }
      
      for(let i=0;i<80;i++) particles.push(new Particle());
      
      function animate() {
        ctx.clearRect(0,0,cvs.width,cvs.height);
        particles.forEach(p => {
          p.update(); p.draw();
          for(let q of particles) {
            const dx=p.x-q.x, dy=p.y-q.y, d=Math.hypot(dx,dy);
            if(d<120) {
              ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
              ctx.strokeStyle = `rgba(56,189,248,${0.08-d/3000})`; ctx.lineWidth=0.5; ctx.stroke();
            }
          }
        });
        requestAnimationFrame(animate);
      }
      animate();

      // ========== CONFETTI ==========
      const cCvs = document.getElementById('confetti-canvas'), cCtx = cCvs.getContext('2d');
      let conf = [];
      
      window.fireConfetti = () => {
        for(let i=0;i<100;i++) {
          conf.push({
            x: cCvs.width/2, y: cCvs.height/2,
            vx: (Math.random()-0.5)*20, vy: Math.random()*-20-10,
            w: 6+Math.random()*4, h: 6+Math.random()*4,
            c: ['#6366f1','#38bdf8','#06b6d4','#10b981','#f59e0b'][Math.floor(Math.random()*5)],
            r: Math.random()*Math.PI*2, s: 0.1+Math.random()*0.3, life: 80+Math.random()*60
          });
        }
      };
      
      function animConfetti() {
        cCtx.clearRect(0,0,cCvs.width,cCvs.height);
        conf = conf.filter(p => p.life>0);
        conf.forEach(p => {
          p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.r+=p.s; p.life--;
          cCtx.save(); cCtx.translate(p.x,p.y); cCtx.rotate(p.r);
          cCtx.fillStyle = p.c; cCtx.globalAlpha = p.life/100;
          cCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cCtx.restore();
        });
        requestAnimationFrame(animConfetti);
      }
      animConfetti();

      // ========== SCROLL ==========
      window.addEventListener('scroll', () => {
        if(window.scrollY > 50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
      }, {passive:true});

      // ========== KEYBOARD ==========
      document.addEventListener('keydown', e => {
        if((e.ctrlKey||e.metaKey) && e.key==='k') {
          e.preventDefault(); searchInput.focus(); searchInput.select();
        }
      });

      console.log('✅ AbOmniTools loaded - Professional & Mobile Ready');
    });
  </script>
</body>
</html>

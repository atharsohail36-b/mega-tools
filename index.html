<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AbOmniTools | Premium Digital Toolkit</title>
  <meta name="description" content="102+ Professional Tools - Calculators, Finance, AI, Productivity & More. Free, Fast, Offline Ready.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ========== PROFESSIONAL THEME ========== */
    :root {
      --bg: #0a0e17; --bg-s: #111827; --bg-card: rgba(30,41,59,0.85); --bg-hover: rgba(56,189,248,0.08);
      --text: #f1f5f9; --text-m: #94a3b8; --text-d: #64748b; --accent: #38bdf8;
      --grad: linear-gradient(135deg, #6366f1, #38bdf8, #06b6d4);
      --glass: rgba(30,41,59,0.7); --glass-strong: rgba(17,24,39,0.95);
      --border: rgba(255,255,255,0.08); --border-s: rgba(56,189,248,0.25);
      --sh-sm: 0 2px 8px rgba(0,0,0,0.3); --sh-md: 0 8px 24px rgba(0,0,0,0.4); --sh-lg: 0 16px 48px rgba(0,0,0,0.5); --sh-glow: 0 0 24px rgba(56,189,248,0.25);
      --tr: all 0.3s cubic-bezier(0.4,0,0.2,1); --rad: 16px; --rad-lg: 24px; --rad-f: 999px;
      --font: 'Inter', system-ui, sans-serif; --head: 'Plus Jakarta Sans', var(--font);
      --z-nav: 100; --z-dd: 101; --z-ws: 200; --z-toast: 999; --z-conf: 1000;
    }
    [data-theme="light"] {
      --bg: #f8fafc; --bg-s: #ffffff; --bg-card: rgba(255,255,255,0.9); --bg-hover: rgba(56,189,248,0.06);
      --text: #0f172a; --text-m: #475569; --text-d: #64748b;
      --glass: rgba(255,255,255,0.9); --glass-strong: rgba(255,255,255,0.98);
      --border: rgba(0,0,0,0.06); --border-s: rgba(56,189,248,0.3);
      --sh-sm: 0 2px 8px rgba(0,0,0,0.06); --sh-md: 0 8px 24px rgba(0,0,0,0.08); --sh-lg: 0 16px 48px rgba(0,0,0,0.12);
    }

    /* ========== RESET & BASE ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; scroll-padding-top: 60px; -webkit-text-size-adjust: 100%; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; min-height: 100vh; transition: background var(--tr), color var(--tr); -webkit-font-smoothing: antialiased; }
    ::selection { background: var(--accent); color: #000; }
    ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--grad); border-radius: var(--rad-f); border: 2px solid var(--bg); }
    :focus-visible { outline: none; box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent); border-radius: 8px; }

    /* ========== BACKGROUND MOTION ========== */
    #bg-canvas { position: fixed; inset: 0; z-index: -2; pointer-events: none; opacity: 0.45; }
    .orb { position: fixed; border-radius: 50%; filter: blur(45px); pointer-events: none; z-index: -1; animation: orbF 24s ease-in-out infinite alternate; }
    .orb1 { top: -8%; left: -6%; width: 38vw; height: 38vw; background: radial-gradient(circle, rgba(99,102,241,0.16), transparent 70%); }
    .orb2 { bottom: -12%; right: -8%; width: 42vw; height: 42vw; background: radial-gradient(circle, rgba(56,189,248,0.14), transparent 70%); animation-delay: -9s; }
    .orb3 { top: 45%; left: 55%; width: 28vw; height: 28vw; background: radial-gradient(circle, rgba(16,185,129,0.10), transparent 70%); animation-delay: -16s; }
    @keyframes orbF { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(4%,3%) scale(1.06); } 66% { transform: translate(-3%,5%) scale(0.94); } }

    /* ========== UTILITIES ========== */
    .glass { background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); transition: var(--tr); }
    .glass-strong { background: var(--glass-strong); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); border: 1px solid var(--border-s); box-shadow: var(--sh-md); }
    .grad-text { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 700; }
    #app { min-height: 100vh; display: flex; flex-direction: column; position: relative; }

    /* ========== NAVBAR - COMPACT & MOBILE PERFECT ========== */
    .navbar { display: flex; align-items: center; justify-content: space-between; padding: 0.65rem 1.2rem; position: sticky; top: 0; z-index: var(--z-nav); border-bottom: 1px solid var(--border); background: rgba(10,14,23,0.92); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); transition: var(--tr); gap: 0.6rem; }
    [data-theme="light"] .navbar { background: rgba(248,250,252,0.92); }
    .navbar.scrolled { padding: 0.55rem 1.2rem; box-shadow: var(--sh-sm); background: rgba(10,14,23,0.98); }
    [data-theme="light"] .navbar.scrolled { background: rgba(248,250,252,0.98); }
    .logo { font-family: var(--head); font-size: 1.3rem; font-weight: 700; letter-spacing: -0.2px; display: flex; align-items: center; gap: 0.25rem; white-space: nowrap; }
    .logo span { color: var(--accent); }

    .nav-center { position: relative; z-index: var(--z-dd); }
    .nav-btn { padding: 0.45rem 0.85rem; border: 1px solid transparent; border-radius: var(--rad-f); background: transparent; color: var(--text-m); cursor: pointer; transition: var(--tr); font-weight: 500; font-size: 0.88rem; display: flex; align-items: center; gap: 0.4rem; min-height: 36px; }
    .nav-btn:hover, .nav-btn.active { color: var(--text); background: var(--bg-card); border-color: var(--border-s); }
    .nav-btn.active { color: var(--accent); box-shadow: 0 0 0 2px rgba(56,189,248,0.15); }

    .dropdown-menu { position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(-6px); width: min(95vw, 380px); max-height: 60vh; overflow-y: auto; background: var(--bg-s); border: 1px solid var(--border); border-radius: var(--rad-lg); padding: 0.7rem; box-shadow: var(--sh-lg); opacity: 0; visibility: hidden; transition: all 0.25s ease; pointer-events: none; display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.35rem; }
    .nav-center.open .dropdown-menu { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .cat-group { margin-bottom: 0.5rem; }
    .cat-group h4 { color: var(--accent); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.3rem; padding-bottom: 0.25rem; border-bottom: 1px solid var(--border); font-weight: 600; font-family: var(--head); display: flex; align-items: center; gap: 0.3rem; }
    .dropdown-item { padding: 0.4rem 0.55rem; border-radius: var(--rad); cursor: pointer; transition: var(--tr); font-size: 0.8rem; color: var(--text-m); display: flex; align-items: center; gap: 0.4rem; font-weight: 500; min-height: 32px; }
    .dropdown-item:hover { background: var(--bg-hover); color: var(--text); transform: translateX(3px); }
    .dropdown-item .icon { font-size: 0.9rem; }

    .nav-right { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
    .search-bar { position: relative; display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.65rem; border-radius: var(--rad-f); transition: var(--tr); min-width: 140px; border: 1px solid var(--border); background: var(--bg-card); }
    .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(56,189,248,0.15); background: var(--bg-s); }
    .search-bar input { background: transparent; border: none; color: var(--text); outline: none; width: 100px; font-size: 0.88rem; font-weight: 500; min-height: 24px; }
    .search-bar input::placeholder { color: var(--text-d); }
    .search-bar:focus-within input { width: 130px; }
    .nav-icon-btn { width: 34px; height: 34px; border-radius: var(--rad-f); background: var(--bg-card); border: 1px solid var(--border); color: var(--text); font-size: 1rem; cursor: pointer; transition: var(--tr); display: flex; align-items: center; justify-content: center; min-height: 36px; }
    .nav-icon-btn:hover { background: var(--accent); color: #000; border-color: transparent; transform: scale(1.05); }

    /* ========== HERO ========== */
    .hero { text-align: center; padding: 3rem 1.2rem 2.2rem; position: relative; }
    .hero-content { max-width: 620px; margin: 0 auto; }
    .hero-title { font-family: var(--head); font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 700; line-height: 1.2; margin-bottom: 0.7rem; }
    .hero-sub { font-size: 1rem; color: var(--text-m); max-width: 500px; margin: 0 auto 1.6rem; line-height: 1.6; }
    .stats { display: flex; justify-content: center; gap: 1.2rem; margin-bottom: 1.8rem; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; align-items: center; padding: 0.7rem 1rem; border-radius: var(--rad); background: var(--bg-card); border: 1px solid var(--border); min-width: 85px; }
    .stat-n { font-size: 1.7rem; font-weight: 700; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1; font-family: var(--head); }
    .stat-s { font-size: 1rem; font-weight: 600; color: var(--accent); margin-left: -3px; }
    .stat-l { font-size: 0.68rem; color: var(--text-d); text-transform: uppercase; letter-spacing: 1px; margin-top: 0.25rem; font-weight: 500; }
    .cta { padding: 0.75rem 1.8rem; border: none; border-radius: var(--rad-f); background: var(--grad); color: #000; font-weight: 600; cursor: pointer; transition: var(--tr); font-size: 0.95rem; display: inline-flex; align-items: center; gap: 0.4rem; font-family: var(--head); }
    .cta:hover { transform: translateY(-2px); box-shadow: var(--sh-glow); }

    /* ========== SECTIONS & GRIDS ========== */
    .section { padding: 1.8rem 1rem 2.2rem; }
    .sec-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .sec-h h2 { font-family: var(--head); font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 0.4rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
    .card { background: var(--bg-card); border-radius: var(--rad-lg); padding: 1.1rem; cursor: pointer; transition: var(--tr); border: 1px solid var(--border); position: relative; overflow: hidden; display: flex; flex-direction: column; min-height: 145px; }
    .card:hover { border-color: var(--accent); box-shadow: var(--sh-md), var(--sh-glow); transform: translateY(-2px); background: var(--bg-hover); }
    .card-i { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .card h3 { margin: 0.25rem 0 0.2rem; font-size: 1rem; font-weight: 600; line-height: 1.3; font-family: var(--head); }
    .card p { color: var(--text-m); font-size: 0.85rem; line-height: 1.5; flex-grow: 1; }
    .badge { position: absolute; top: 0.6rem; right: 0.6rem; padding: 0.2rem 0.45rem; background: rgba(56,189,248,0.12); border-radius: var(--rad-f); font-size: 0.65rem; font-weight: 600; color: var(--accent); }
    .meta { margin-top: auto; padding-top: 0.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: var(--text-d); border-top: 1px dashed var(--border); }
    .util-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.7rem; }
    .util { background: var(--glass); border: 1px solid var(--border); border-radius: var(--rad); padding: 0.8rem 0.6rem; text-align: center; cursor: pointer; transition: var(--tr); }
    .util:hover { transform: translateY(-2px); border-color: var(--accent); background: var(--bg-hover); }
    .util-i { font-size: 1.3rem; margin-bottom: 0.25rem; }
    .util-t { font-weight: 500; font-size: 0.78rem; }

    /* ========== WORKSPACE ========== */
    .ws { position: fixed; inset: 0; background: rgba(10,14,23,0.98); backdrop-filter: blur(18px); z-index: var(--z-ws); display: none; padding: 0.6rem; opacity: 0; transition: opacity 0.2s ease; }
    [data-theme="light"] .ws { background: rgba(248,250,252,0.98); }
    .ws.active { display: flex; align-items: center; justify-content: center; opacity: 1; }
    .ws-c { width: 100%; max-width: 1050px; height: 92vh; background: var(--bg-s); border-radius: var(--rad-lg); border: 1px solid var(--border); overflow: auto; padding: 1rem; box-shadow: var(--sh-lg); position: relative; animation: sc 0.25s ease; }
    @keyframes sc { from { transform: scale(0.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .cls { position: absolute; top: 0.6rem; right: 0.6rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); width: 34px; height: 34px; border-radius: var(--rad-f); cursor: pointer; font-size: 1.2rem; transition: var(--tr); z-index: 15; display: flex; align-items: center; justify-content: center; }
    .cls:hover { background: var(--accent); color: #000; border-color: transparent; transform: rotate(90deg); }
    .skel { display: grid; gap: 0.6rem; padding: 0.6rem; }
    .skel-b { background: linear-gradient(90deg, var(--bg-card) 25%, rgba(255,255,255,0.08) 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: sp 1.4s infinite; border-radius: var(--rad); }
    @keyframes sp { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .skel-t { height: 22px; width: 45%; margin-bottom: 0.6rem; }
    .skel-l { height: 12px; width: 100%; margin-bottom: 0.4rem; }

    /* ========== TOAST & CONFETTI ========== */
    .toast-c { position: fixed; bottom: 1rem; left: 1rem; right: 1rem; z-index: var(--z-toast); display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; max-width: 360px; margin: 0 auto; }
    .toast { background: var(--bg-s); border: 1px solid var(--border); padding: 0.7rem 0.9rem; border-radius: var(--rad); box-shadow: var(--sh-md); animation: sl 0.2s ease forwards; display: flex; align-items: center; gap: 0.5rem; pointer-events: auto; }
    @keyframes sl { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .t-i { font-size: 1.1rem; flex-shrink: 0; } .t-m { font-size: 0.85rem; color: var(--text); font-weight: 500; }
    #conf-canvas { position: fixed; inset: 0; pointer-events: none; z-index: var(--z-conf); }
    .err { text-align: center; padding: 1.8rem 1rem; color: #f43f5e; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--rad-lg); max-width: 420px; margin: 1.5rem auto; }
    .err h3 { margin-bottom: 0.5rem; font-size: 1.15rem; font-family: var(--head); } .err p { color: var(--text-m); margin-top: 0.3rem; font-size: 0.9rem; } .err code { background: rgba(56,189,248,0.12); padding: 0.2rem 0.4rem; border-radius: 6px; font-family: monospace; font-size: 0.9em; color: var(--accent); } .err button { margin-top: 0.8rem; padding: 0.6rem 1.4rem; background: var(--grad); color: #000; border: none; border-radius: var(--rad-f); cursor: pointer; font-weight: 600; transition: var(--tr); font-size: 0.9rem; } .err button:hover { transform: scale(1.03); }

    /* ========== MOBILE OPTIMIZATION ========== */
    @media (max-width: 768px) {
      .navbar { padding: 0.6rem 0.9rem; gap: 0.5rem; }
      .nav-center { order: 4; width: 100%; margin-top: 0.3rem; }
      .dropdown-menu { width: 100%; max-height: 45vh; grid-template-columns: 1fr; }
      .search-bar { min-width: 120px; flex: 1; }
      .hero { padding: 2.5rem 0.9rem 1.8rem; }
      .stats { gap: 0.9rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.9rem; }
    }
    @media (max-width: 540px) {
      .navbar { flex-wrap: wrap; padding: 0.5rem 0.7rem; gap: 0.4rem; }
      .logo { font-size: 1.15rem; }
      .nav-btn { padding: 0.35rem 0.7rem; font-size: 0.8rem; min-height: 34px; width: 100%; justify-content: center; }
      .dropdown-menu { position: fixed !important; top: 48px !important; left: 0 !important; right: 0 !important; transform: none !important; width: 100% !important; max-height: 55vh !important; border-radius: 0 0 var(--rad-lg) var(--rad-lg) !important; margin: 0 !important; padding: 0.6rem !important; }
      .dropdown-item { padding: 0.4rem 0.5rem; font-size: 0.78rem; min-height: 30px; }
      .search-bar { width: 100%; min-width: auto; order: 2; padding: 0.35rem 0.5rem; }
      .search-bar input { width: 100%; font-size: 16px !important; }
      .search-bar:focus-within input { width: 100%; }
      .nav-right { order: 3; width: 100%; justify-content: center; gap: 0.3rem; margin-top: 0.2rem; }
      .nav-icon-btn { width: 32px; height: 32px; font-size: 0.95rem; }
      .hero { padding: 2rem 0.7rem 1.4rem; }
      .hero-title { font-size: clamp(1.5rem, 8vw, 2.2rem); }
      .hero-sub { font-size: 0.92rem; }
      .stat { padding: 0.6rem 0.8rem; min-width: 75px; }
      .stat-n { font-size: 1.4rem; } .stat-s { font-size: 0.95rem; } .stat-l { font-size: 0.65rem; }
      .cta { padding: 0.7rem 1.5rem; font-size: 0.9rem; width: 100%; max-width: 240px; justify-content: center; }
      .section { padding: 1.4rem 0.6rem 1.8rem; }
      .sec-h h2 { font-size: 1.1rem; }
      .grid { grid-template-columns: 1fr; gap: 0.8rem; padding: 0 0.1rem; }
      .card { padding: 0.9rem; min-height: 135px; border-radius: var(--rad); }
      .card-i { font-size: 1.5rem; margin-bottom: 0.4rem; }
      .card h3 { font-size: 0.95rem; } .card p { font-size: 0.82rem; }
      .util-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
      .util { padding: 0.6rem 0.4rem; } .util-i { font-size: 1.2rem; } .util-t { font-size: 0.75rem; }
      .ws { padding: 0.4rem; }
      .ws-c { height: 93vh; padding: 0.8rem 0.6rem; border-radius: var(--rad); }
      .cls { width: 30px; height: 30px; font-size: 1rem; top: 0.5rem; right: 0.5rem; }
      .toast-c { left: 0.6rem; right: 0.6rem; bottom: 0.6rem; }
      .toast { padding: 0.65rem 0.8rem; } .t-m { font-size: 0.82rem; }
      .err { padding: 1.5rem 0.8rem; margin: 1rem; border-radius: var(--rad); } .err h3 { font-size: 1.05rem; } .err button { padding: 0.55rem 1.2rem; font-size: 0.85rem; width: 100%; }
      .card, .util, .dropdown-item, .nav-btn, .cta, .cls { min-height: 36px; touch-action: manipulation; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } html { scroll-behavior: auto; } }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
  <canvas id="conf-canvas"></canvas>

  <div id="app">
    <header class="navbar glass" id="navbar">
      <div class="logo">Ab<span>OmniTools</span></div>
      <div class="nav-center" id="tools-dd">
        <button class="nav-btn" id="tools-btn">🛠️ All Tools ▾</button>
        <div class="dropdown-menu glass-strong" id="dropdown-menu"></div>
      </div>
      <div class="nav-right">
        <div class="search-bar glass"><span>🔍</span><input type="text" id="tool-search" placeholder="Search..." autocomplete="off"></div>
        <button class="nav-icon-btn" id="theme-toggle" aria-label="Toggle theme">🌓</button>
      </div>
    </header>

    <section class="hero"><div class="hero-content">
      <h1 class="hero-title">Premium <span class="grad-text">Digital Toolkit</span></h1>
      <p class="hero-sub">102+ powerful tools for productivity, finance, AI & more. Free, fast, and offline-ready.</p>
      <div class="stats">
        <div class="stat"><span class="stat-n" data-target="102">0</span><span class="stat-s">+</span><span class="stat-l">Tools</span></div>
        <div class="stat"><span class="stat-n" data-target="0">0</span><span class="stat-s">₹</span><span class="stat-l">Free</span></div>
        <div class="stat"><span class="stat-n" data-target="100">0</span><span class="stat-s">%</span><span class="stat-l">Offline</span></div>
      </div>
      <button class="cta" id="explore-btn"><span>Explore Tools</span><span>→</span></button>
    </div></section>

    <main class="section" id="featured-section"><div class="sec-h"><h2>🔥 Trending</h2></div><div class="grid" id="tools-grid"></div></main>
    <section class="section" id="utilities-section"><div class="sec-h"><h2>🔧 Quick Links</h2></div><div class="util-grid" id="util-grid"></div></section>

    <div class="ws" id="tool-ws"><button class="cls" id="close-ws" aria-label="Close">✕</button><div class="ws-c" id="tool-c"></div></div>
    <div class="toast-c" id="toast-c"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if(window.location.protocol === 'file:') {
        document.body.innerHTML = `<div class="err"><h3>🚨 Live Server Required</h3><p>Browsers block fetch() on local files. Use VS Code Live Server.</p><button onclick="location.reload()">Reload</button></div>`;
        return;
      }

      const cats = [
        {id:'calculators',name:'Calculators',icon:'🧮'},{id:'student',name:'Student',icon:'🎓'},{id:'professional',name:'Professional',icon:'💼'},
        {id:'kids-games',name:'Kids Games',icon:'🧸'},{id:'ai-tech',name:'AI & Tech',icon:'🤖'},{id:'finance',name:'Finance',icon:'💰'},
        {id:'productivity',name:'Productivity',icon:'⚡'},{id:'learning',name:'Learning',icon:'📚'},{id:'lifestyle',name:'Lifestyle',icon:'🌴'},{id:'utilities',name:'Utilities',icon:'🔧'}
      ];
      const tools = {
        calculators:['basic','scientific','percentage','bmi','age','emi','compound-interest','gpa','tax','discount'],
        student:['citation-generator','word-counter','pomodoro-timer','flashcard-maker','exam-planner','grade-predictor','assignment-tracker','resume-builder','formula-sheet','translator'],
        professional:['invoice-generator','payroll-calc','break-even','roi-calculator','gantt-chart','meeting-agenda','email-templates','swot-maker','profit-margin','business-name-gen'],
        'kids-games':['snake','tic-tac-toe','memory-cards','sliding-puzzle','math-quiz','spelling-bee','color-match','kids-typing','dino-run','drawing-canvas'],
        'ai-tech':['ai-prompt-gen','image-prompt-helper','code-formatter','json-beautifier','password-checker','hash-generator','base64-tool','qr-code-gen','api-tester','ai-directory'],
        finance:['sip-calculator','retirement-planner','budget-planner','debt-payoff','inflation-calc','net-worth','dividend-calc','forex-checker','crypto-converter','stock-tracker'],
        productivity:['todo-list','habit-tracker','markdown-notes','color-palette','font-pairing','lorem-ipsum','random-generator','countdown-timer','focus-sounds','screen-size-calc'],
        learning:['gk-quiz','personality-test','vocab-builder','typing-test','math-drill','coding-challenge','history-timeline','geography-quiz','science-facts','reading-speed'],
        lifestyle:['horoscope','recipe-converter','event-budget','travel-itinerary','weather-forecast','fuel-cost','carbon-footprint','sleep-cycle','moon-phase','bookmark-manager'],
        utilities:['dashboard-home','favorites','settings','print-export','share-tool','feedback-form','newsletter','offline-mode','recent-tools','about','contact','privacy-policy']
      };
      const utLinks = [{id:'about',name:'About',icon:'ℹ️'},{id:'contact',name:'Contact',icon:'📞'},{id:'privacy-policy',name:'Privacy',icon:'🔒'},{id:'newsletter',name:'Newsletter',icon:'📧'},{id:'favorites',name:'Favorites',icon:'⭐'},{id:'recent-tools',name:'Recent',icon:'🕒'}];

      const dd = document.getElementById('dropdown-menu'), ddW = document.getElementById('tools-dd'), grid = document.getElementById('tools-grid'), uGrid = document.getElementById('util-grid'), sIn = document.getElementById('tool-search'), ws = document.getElementById('tool-ws'), wsC = document.getElementById('tool-c'), cls = document.getElementById('close-ws'), tC = document.getElementById('toast-c'), nav = document.getElementById('navbar'), tt = document.getElementById('theme-toggle');

      // Build Dropdown
      const buildDD = () => { dd.innerHTML=''; cats.forEach(c=>{ const g=document.createElement('div'); g.className='cat-group'; g.innerHTML=`<h4><span class="icon">${c.icon}</span>${c.name}</h4>`; tools[c.id].forEach(f=>{ const i=document.createElement('div'); i.className='dropdown-item'; i.innerHTML=`<span class="icon">${c.icon}</span>${f.replace(/-/g,' ').replace(/\b\w/g,x=>x.toUpperCase())}`; i.onclick=()=>load(`js/${c.id}/${f}.html`, i.textContent); ddW.classList.remove('open'); g.appendChild(i); }); dd.appendChild(g); }); }; buildDD();
      ddW.addEventListener('click', e=>{ e.stopPropagation(); ddW.classList.toggle('open'); });
      document.addEventListener('click', ()=> ddW.classList.remove('open'));

      utLinks.forEach(u=>{ const c=document.createElement('div'); c.className='util'; c.innerHTML=`<div class="util-i">${u.icon}</div><div class="util-t">${u.name}</div>`; c.onclick=()=>load(`js/utilities/${u.id}.html`,u.name); uGrid.appendChild(c); });

      // Render Grid
      const render = (q='')=>{ grid.innerHTML=''; const t=[], f=[]; cats.filter(x=>x.id!=='utilities').forEach(c=>tools[c.id].slice(0,2).forEach(f=>t.push({c:c.id,f:f}))); const filt=q?t.filter(x=>x.f.toLowerCase().includes(q.toLowerCase())):t; if(!filt.length){grid.innerHTML=`<div class="err" style="grid-column:1/-1"><h3>🔍 No Results</h3><p>Try different keywords.</p></div>`;return;} filt.forEach((x,i)=>{const c=cats.find(y=>y.id===x.c),n=x.f.replace(/-/g,' ').replace(/\b\w/g,z=>z.toUpperCase()),d=document.createElement('div');d.className='card';d.innerHTML=`<span class="badge">${c.name}</span><span class="card-i">${c.icon}</span><h3>${n}</h3><p>Quick ${c.name.toLowerCase()} utility.</p><div class="meta"><span>Popular</span><span>→</span></div>`;d.onclick=()=>load(`js/${c.id}/${x.f}.html`,n);grid.appendChild(d);}); }; render(); sIn.addEventListener('input',e=>render(e.target.value));

      const skel=`<div class="skel"><div class="skel-b skel-t"></div><div class="skel-b skel-l"></div><div class="skel-b skel-l" style="width:85%"></div></div>`;
      window.toast=(m,t='info')=>{const d=document.createElement('div');d.className='toast';const i={info:'ℹ️',success:'✅',error:'❌',warning:'⚠️'};d.innerHTML=`<span class="t-i">${i[t]}</span><span class="t-m">${m}</span>`;tC.appendChild(d);setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),250);},3000);};

      const load=async(p,t)=>{ws.classList.add('active');document.body.style.overflow='hidden';wsC.innerHTML=skel;try{const r=await fetch(p);if(!r.ok)throw new Error(`HTTP ${r.status}`);const h=await r.text(),c=document.createElement('div');c.innerHTML=h;c.querySelectorAll('script').forEach(s=>s.remove());wsC.innerHTML=c.innerHTML;const pr=new DOMParser(),doc=pr.parseFromString(h,'text/html');doc.querySelectorAll('script').forEach(s=>{const ns=document.createElement('script');if(s.src)ns.src=s.src;else ns.textContent=s.textContent;document.body.appendChild(ns);});if(typeof fireConfetti==='function')fireConfetti();toast('✅ Loaded','success');}catch(e){console.error(e);wsC.innerHTML=`<div class="err"><h3>🚧 Failed</h3><p>${e.message}</p><p style="color:var(--text-m)">Check if <code>${p}</code> exists.</p><button onclick="document.getElementById('close-ws').click()">Close</button></div>`;}};
      cls.onclick=()=>{ws.classList.remove('active');document.body.style.overflow='';wsC.innerHTML='';};
      document.addEventListener('keydown',e=>{if(e.key==='Escape'&&ws.classList.contains('active'))cls.click();});
      document.getElementById('explore-btn').onclick=()=>document.getElementById('featured-section').scrollIntoView({behavior:'smooth'});

      const applyT=(t)=>{document.documentElement.setAttribute('data-theme',t);localStorage.setItem('ab-t',t);tt.textContent=t==='light'?'☀️':'🌓';};
      tt.onclick=()=>{const c=document.documentElement.getAttribute('data-theme')||'dark',n=c==='light'?'dark':'light';applyT(n);toast(n==='light'?'☀️ Light':'🌙 Dark');};
      const sv=localStorage.getItem('ab-t'); if(sv)applyT(sv); else { const pl=window.matchMedia('(prefers-color-scheme: light)').matches; applyT(pl?'light':'dark'); }

      setTimeout(()=>{document.querySelectorAll('.stat-n').forEach(c=>{const t=+c.dataset.target;if(!t)return;let cu=0,st=t/90;const r=()=>{cu+=st;if(cu<t){c.textContent=Math.ceil(cu);requestAnimationFrame(r);}else c.textContent=t;};r();});},300);

      // Background Particles
      const cv=document.getElementById('bg-canvas'),ct=cv.getContext('2d');let pts=[];const res=()=>{cv.width=innerWidth;cv.height=innerHeight;};window.onresize=res;res();
      class P{constructor(){this.reset();}reset(){this.x=Math.random()*cv.width;this.y=Math.random()*cv.height;this.s=Math.random()*1.2+0.4;this.vx=(Math.random()-0.5)*0.2;this.vy=(Math.random()-0.5)*0.2;this.o=Math.random()*0.35+0.1;}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<-5||this.x>cv.width+5||this.y<-5||this.y>cv.height+5)this.reset();}draw(){ct.beginPath();ct.arc(this.x,this.y,this.s,0,Math.PI*2);ct.fillStyle=`rgba(56,189,248,${this.o})`;ct.fill();}}
      for(let i=0;i<50;i++)pts.push(new P());
      function anim(){ct.clearRect(0,0,cv.width,cv.height);pts.forEach(p=>{p.update();p.draw();for(let q of pts){const dx=p.x-q.x,dy=p.y-q.y,d=Math.hypot(dx,dy);if(d<90){ct.beginPath();ct.moveTo(p.x,p.y);ct.lineTo(q.x,q.y);ct.strokeStyle=`rgba(56,189,248,${0.05-d/2200})`;ct.lineWidth=0.35;ct.stroke();}}});requestAnimationFrame(anim);}anim();

      // Confetti
      const cc=document.getElementById('conf-canvas'),cx=cc.getContext('2d');let conf=[];window.fireConfetti=()=>{for(let i=0;i<60;i++)conf.push({x:cc.width/2,y:cc.height/2,vx:(Math.random()-0.5)*12,vy:Math.random()*-12-6,w:4+Math.random()*3,h:4+Math.random()*3,c:['#6366f1','#38bdf8','#06b6d4','#10b981','#f59e0b'][Math.floor(Math.random()*5)],r:Math.random()*Math.PI*2,s:0.1+Math.random()*0.15,life:60+Math.random()*30});};function animC(){cx.clearRect(0,0,cc.width,cc.height);conf=conf.filter(p=>p.life>0);conf.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.r+=p.s;p.life--;cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;cx.globalAlpha=p.life/80;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();});requestAnimationFrame(animC);}animC();

      window.addEventListener('scroll',()=>{if(window.scrollY>40)nav.classList.add('scrolled');else nav.classList.remove('scrolled');},{passive:true});
      document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();sIn.focus();sIn.select();}});
      console.log('✅ AbOmniTools | 102 Tools | Mobile Perfect');
    });
  </script>
</body>
